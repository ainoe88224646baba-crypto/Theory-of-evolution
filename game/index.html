        while (fRow * chunkLen < fullDesc.length && fRow < 4) {
          ctx.fillText(fullDesc.slice(fRow*chunkLen,(fRow+1)*chunkLen), px2+12, py2+62+fRow*16);
          fRow++;
        }
        // 冷却状态
        ctx.fillStyle=ready?'#2ecc71':'#e74c3c';
        ctx.font='bold 11px "Microsoft YaHei",sans-serif';
        ctx.fillText(ready ? '✓ 技能就绪' : `⏱ 冷却中 ${cd.toFixed(1)}s`, px2+12, py2+ph-12);
      }
    });
  },

  // 手机虚拟摇杆和技能按钮
  _renderMobileHUD() {
    const p = game.player;
    if (!p || !p.alive) return;
    const spec = p.spec ? p.spec : EVODATA[p.specId];
    const skills = spec.skills || [];

    // ---- 虚拟摇杆（屏幕左下） ----
    const JR = 70; // 摇杆外圈半径
    const bx = game.joyStick.active ? game.joyStick.baseX : JR + 30;
    const by = game.joyStick.active ? game.joyStick.baseY : H - JR - 30;

    // 外圈底座
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(bx, by, JR, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    // 内圈把手
    const jx = game.joyStick.active ? game.joyStick.curX : bx;
    const jy = game.joyStick.active ? game.joyStick.curY : by;
    ctx.fillStyle = game.joyStick.active ? '#2ecc71' : 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(jx, jy, JR * 0.42, 0, Math.PI * 2); ctx.fill();

    // 方向指示线
    if (game.joyStick.active) {
      const dx = jx - bx, dy = jy - by, d = Math.hypot(dx, dy);
      if (d > 5) {
        ctx.strokeStyle = 'rgba(46,204,113,0.8)';
        ctx.lineWidth = 4; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(bx, by);
        ctx.lineTo(bx + (dx/d)*(JR+12), by + (dy/d)*(JR+12)); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // ---- 右下角按钮区 ----
    const BTN = 88;   // 技能按钮尺寸
    const EVO = 72;   // 进化按钮尺寸
    const PAD = 14;   // 间距

    // 技能按钮 0 和 1（右下，从右往左排）
    for (let i = 0; i < 2; i++) {
      const sk = skills[i];
      if (!sk) continue;
      const cd = p.skillCds[i] || 0;
      const ready = cd <= 0;
      const touching = game.mobileSkillTouch[i] !== null;
      // 按钮X：最右边是技能1，往左是技能0
      const bx2 = W - PAD - BTN - i * (BTN + PAD);
      const by2 = H - PAD - BTN;
      // 存下坐标供触控检测用
      game._mobileSkillBtns = game._mobileSkillBtns || [];
      game._mobileSkillBtns[i] = { x: bx2, y: by2, w: BTN, h: BTN };

      ctx.save();
      ctx.globalAlpha = touching ? 1 : 0.88;
      // 背景
      ctx.fillStyle = ready ? 'rgba(46,204,113,0.3)' : 'rgba(30,30,30,0.7)';
      ctx.strokeStyle = touching ? '#f1c40f' : (ready ? '#2ecc71' : '#555');
      ctx.lineWidth = touching ? 4 : 2;
      ctx.beginPath(); ctx.roundRect(bx2, by2, BTN, BTN, 14); ctx.fill(); ctx.stroke();

      // 冷却扇形
      if (!ready) {
        const prog = cd / (sk.cooldown || 10);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.moveTo(bx2 + BTN/2, by2 + BTN/2);
        ctx.arc(bx2 + BTN/2, by2 + BTN/2, BTN*0.6, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2);
        ctx.closePath(); ctx.fill();
      }

      // 图标
      ctx.font = '34px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = ready ? 0.95 : 0.4;
      ctx.fillStyle = '#fff';
      ctx.fillText(sk.icon, bx2 + BTN/2, by2 + BTN/2 - 4);

      // 冷却时间文字 / 快捷键标签
      ctx.font = `bold 13px "Microsoft YaHei",sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = 0.9;
      if (!ready) {
        ctx.fillStyle = '#e74c3c';
        ctx.fillText(cd.toFixed(1)+'s', bx2 + BTN/2, by2 + BTN - 6);
      } else {
        ctx.fillStyle = '#2ecc71';
        ctx.fillText(i===0?'技能1':'技能2', bx2 + BTN/2, by2 + BTN - 6);
      }
      ctx.restore();
    }

    // ---- 进化按钮（右下技能按钮上方） ----
    const evoBx = W - PAD - EVO;
    const ewoBy = H - PAD - BTN - PAD - EVO;
    game._mobileEvoBtn = { x: evoBx, y: ewoBy, w: EVO, h: EVO };

    const canEvo = (() => {
      const sp = EVODATA[p.specId];
      if (!sp.evolvesTo || !sp.evolvesTo.length) return false;
      for (const id of sp.evolvesTo) if (canEvolve(p.resources, sp.evoReqs[id])) return true;
      return false;
    })();

    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = canEvo ? 'rgba(155,89,182,0.45)' : 'rgba(30,30,30,0.65)';
    ctx.strokeStyle = canEvo ? '#9b59b6' : '#555';
    ctx.lineWidth = canEvo ? 3 : 1.5;
    // 进化可用时闪光
    if (canEvo) {
      const pulse = 0.7 + Math.sin(Date.now()/300)*0.3;
      ctx.shadowColor = '#9b59b6'; ctx.shadowBlur = 18 * pulse;
    }
    ctx.beginPath(); ctx.roundRect(evoBx, ewoBy, EVO, EVO, 14); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = '28px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = canEvo ? '#fff' : 'rgba(255,255,255,0.35)';
    ctx.fillText('🧬', evoBx + EVO/2, ewoBy + EVO/2 - 4);
    ctx.font = `bold 11px "Microsoft YaHei",sans-serif`;
    ctx.fillStyle = canEvo ? '#c39bd3' : '#666';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(canEvo?'可进化':'进化', evoBx + EVO/2, ewoBy + EVO - 6);
    ctx.restore();
  },

  _renderGameInfo() {
    const gx=W-168, gy=175;
    const boxes=[
      {icon:'👥', val:`${game.aliveCount}`, label:'存活', color:'#e74c3c'},
      {icon:'⚔️', val:`${game.stats.kills}`, label:'击杀', color:'#f39c12'},
      {icon:'🧬', val:`${game.stats.evoCount}`, label:'进化', color:'#2ecc71'},
    ];
    boxes.forEach((b,i)=>{
      const by=gy+i*62;
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.beginPath(); ctx.roundRect(gx,by,158,52,8); ctx.fill();
      ctx.fillStyle=b.color; ctx.font='bold 22px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`${b.icon} ${b.val}`, gx+79, by+22);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px "Microsoft YaHei",sans-serif'; ctx.textBaseline='alphabetic';
      ctx.fillText(b.label, gx+79, by+44);
    });

    // 时间
    const t=game.stats.time;
    const mins=Math.floor(t/60), secs=Math.floor(t%60);
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.beginPath(); ctx.roundRect(gx,gy+186,158,40,8); ctx.fill();
    ctx.fillStyle='#ecf0f1'; ctx.font='bold 17px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`⏱ ${mins}:${secs.toString().padStart(2,'0')}`, gx+79, gy+206);

    // 音效开关按钮（游戏中）
    const sBx=gx, sBy=gy+234, sBw=158, sBh=34;
    const smx=game.mouse.x, smy=game.mouse.y;
    const sHov=smx>=sBx&&smx<=sBx+sBw&&smy>=sBy&&smy<=sBy+sBh;
    ctx.fillStyle=sound.enabled?(sHov?'rgba(46,204,113,0.85)':'rgba(46,204,113,0.5)'):(sHov?'rgba(231,76,60,0.85)':'rgba(231,76,60,0.4)');
    ctx.beginPath(); ctx.roundRect(sBx,sBy,sBw,sBh,8); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 13px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sound.enabled?'🔊 音效:开':'🔇 音效:关', sBx+sBw/2, sBy+sBh/2);
    game._soundBtn = {x:sBx, y:sBy, w:sBw, h:sBh};
  },

  _renderSzTimer() {
    const sz=game.safeZone;
    const bw=220, bx=(W-bw)/2, by=10;
    const shrinking = sz.timer>=sz.shrinkStart;
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.beginPath(); ctx.roundRect(bx-6,by-4,bw+12,30,7); ctx.fill();
    if (!shrinking) {
      const pct=sz.timer/sz.shrinkStart;
      ctx.fillStyle=pct<0.4?'#e74c3c':pct<0.7?'#f39c12':'#3498db';
      ctx.fillRect(bx,by,bw*(1-pct),22);
      ctx.fillStyle='#fff'; ctx.font='12px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(`🔵 安全区缩圈倒计时: ${(sz.shrinkStart-sz.timer).toFixed(0)}s`, W/2, by+11);
    } else {
      const pa=Math.sin(Date.now()/200)*0.45+0.55;
      ctx.fillStyle=`rgba(231,76,60,${pa})`; ctx.fillRect(bx,by,bw,22);
      ctx.fillStyle='#fff'; ctx.font='bold 13px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('⚠️ 安全区正在缩小！', W/2, by+11);
    }
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='9px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(`半径: ${Math.round(sz.radius)}`, W/2, by+36);
  },

  _renderDisasters() {
    // 注意：灾难数据存在 game.disasters 里，ui 本身没有 disasters 属性
    if (!game.disasters || !game.disasters.length) return;
    const now = Date.now();
    for (const d of game.disasters) {
      const sx = d.cx; // 世界空间（相机变换生效中）
      const sy = d.cy;
      const sr = d.radius;
      const cfg = d.cfg;

      if (d.phase === 'warn') {
        // 预兆：闪烁警告区域 + 感叹号标记（世界空间）
        if (d.warnPulse) {
          ctx.fillStyle = cfg.bgColor;
          ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = cfg.color;
          ctx.lineWidth = 3;
          ctx.setLineDash([12, 6]);
          ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.stroke();
          ctx.setLineDash([]);
          // 感叹号标记
          const pulse = 0.7 + Math.sin(now/100)*0.3;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = cfg.color;
          ctx.font = 'bold 28px serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('⚠', sx, sy);
          ctx.globalAlpha = 1;
        }
        // 屏幕空间警告条/倒计时 → ui._renderDisasterUI()
      }

      if (d.phase === 'active') {
        const prog = d.timer / cfg.activeDur;
        const pulse = 0.55 + Math.sin(now/80)*0.45;
        // ---------- 底层区域 ----------
        ctx.globalAlpha = 0.22 + pulse*0.12;
        ctx.fillStyle = cfg.bgColor;
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 0.7 + pulse*0.3;
        ctx.strokeStyle = cfg.color;
        ctx.lineWidth = 4+pulse*2;
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.stroke();
        // 扩散冲击圈
        for (let ri=0;ri<3;ri++) {
          const rProg = (prog + ri*0.33) % 1;
          ctx.globalAlpha = (1-rProg)*0.5;
          ctx.strokeStyle = cfg.color;
          ctx.lineWidth = 2;
          ctx.setLineDash([]);
          ctx.beginPath(); ctx.arc(sx, sy, sr*rProg, 0, Math.PI*2); ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // ===== 各天灾独立特效 =====
        if (d.type === 'meteor') {
          // 陨石雨：多颗陨石从高空下落，带火焰尾巴，落地爆炸坑
          if (!d.meteorList) d.meteorList = [];
          if (d.meteorList.length < 10 && Math.random() < 0.4) {
            const ang = Math.random()*Math.PI*2, dist = Math.random()*sr*0.9;
            d.meteorList.push({
              wx: d.cx + Math.cos(ang)*dist, wy: d.cy + Math.sin(ang)*dist,
              startY: -200, life: 0, dur: 0.6+Math.random()*0.4,
              size: 10+Math.random()*18
            });
          }
          for (const m of d.meteorList) {
            m.life += 0.016;
            const t = Math.min(1, m.life/m.dur);
            // 世界空间坐标（canvas已translate）
            const mx2 = m.wx;
            const my2 = m.wy;
            // 陨石从屏幕上方200px世界高度落下到落点
            const startWorldY = my2 - H + m.startY;
            const curY = startWorldY + (my2 - startWorldY)*t;
            // 火焰尾迹
            for (let fi=0;fi<8;fi++) {
              const ft = fi/8;
              const tx2 = mx2 + (Math.random()-0.5)*10*ft;
              const ty2 = curY - fi*14 + (Math.random()-0.5)*6*ft;
              ctx.globalAlpha = (1-ft)*0.7;
              ctx.fillStyle = ft<0.4 ? '#f1c40f' : ft<0.7 ? '#e67e22' : '#c0392b';
              ctx.beginPath(); ctx.arc(tx2, ty2, m.size*(1-ft*0.6), 0, Math.PI*2); ctx.fill();
            }
            // 陨石本体
            ctx.globalAlpha = 1;
            const grad = ctx.createRadialGradient(mx2, curY, 0, mx2, curY, m.size);
            grad.addColorStop(0, '#f1c40f'); grad.addColorStop(0.5, '#e74c3c'); grad.addColorStop(1, '#7f0000');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(mx2, curY, m.size, 0, Math.PI*2); ctx.fill();
            // 落地爆炸坑
            if (t >= 1) {
              const r2 = m.size*3+Math.sin(now/50)*3;
              ctx.globalAlpha = 0.7*(1-m.life*0.5);
              ctx.fillStyle = 'rgba(255,80,0,0.35)';
              ctx.beginPath(); ctx.arc(mx2, my2, r2, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = '#e74c3c'; ctx.lineWidth=2;
              ctx.beginPath(); ctx.arc(mx2, my2, r2, 0, Math.PI*2); ctx.stroke();
              ctx.globalAlpha = 1;
            }
          }
          d.meteorList = d.meteorList.filter(m=>m.life < m.dur*2);
          // 中央爆炸光晕
          const boom = Math.sin(now/50)*0.5+0.5;
          const grad2 = ctx.createRadialGradient(sx,sy,0,sx,sy,sr*0.5);
          grad2.addColorStop(0,`rgba(255,150,0,${boom*0.6})`); grad2.addColorStop(1,'transparent');
          ctx.fillStyle=grad2; ctx.beginPath(); ctx.arc(sx,sy,sr*0.5,0,Math.PI*2); ctx.fill();
        }

        if (d.type === 'earthquake') {
          // 地震：放射状裂缝 + 碎石飞溅 + 地面波纹
          const numCracks = 12;
          for (let i=0;i<numCracks;i++) {
            const ang = (i/numCracks)*Math.PI*2 + prog*0.3;
            ctx.save();
            ctx.strokeStyle = `rgba(${160+Math.floor(Math.random()*40)},${82+Math.floor(Math.random()*20)},${45+Math.floor(Math.random()*15)},0.85)`;
            ctx.lineWidth = 3+Math.random()*3;
            ctx.shadowBlur = 8; ctx.shadowColor = '#7f4a1e';
            ctx.beginPath();
            let cx2=sx, cy2=sy;
            const crackLen = sr*(0.4+Math.random()*0.5);
            const steps = 8;
            ctx.moveTo(cx2,cy2);
            for (let s=0;s<steps;s++) {
              cx2 += Math.cos(ang+(Math.random()-0.5)*0.7) * crackLen/steps;
              cy2 += Math.sin(ang+(Math.random()-0.5)*0.7) * crackLen/steps;
              ctx.lineTo(cx2,cy2);
            }
            ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
          }
          // 碎石
          if (!d.rocks) d.rocks = Array.from({length:30},()=>({
            x: d.cx+(Math.random()-0.5)*2*sr, y: d.cy+(Math.random()-0.5)*2*sr,
            vx:(Math.random()-0.5)*80, vy:-40-Math.random()*100,
            s:4+Math.random()*8, life:0
          }));
          for (const r of d.rocks) {
            r.vy += 120*0.016; r.x+=r.vx*0.016; r.y+=r.vy*0.016; r.life+=0.016;
            ctx.globalAlpha = Math.max(0,1-r.life*0.5);
            ctx.fillStyle='#8B6914';
            ctx.beginPath(); ctx.arc(r.x, r.y, r.s, 0, Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha=1;
          // 地面震动圈
          for (let ri=0;ri<4;ri++) {
            const rr = sr*(0.25+ri*0.22)*((prog+ri*0.2)%1 + 0.01);
            ctx.globalAlpha = 0.4*(1-(rr/sr));
            ctx.strokeStyle='#a0522d'; ctx.lineWidth=3;
            ctx.setLineDash([10,6]);
            ctx.beginPath(); ctx.arc(sx,sy,rr,0,Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
          }
          ctx.globalAlpha=1;
        }

        if (d.type === 'thunderstorm') {
          // 雷暴：多条分叉闪电 + 周期性全屏闪光
          if (!d.lightningTimer) d.lightningTimer = 0;
          d.lightningTimer += 0.016;
          if (d.lightningTimer > 0.15) {
            d.lightningTimer = 0;
            if (!d.bolts) d.bolts = [];
            for (let nb=0;nb<3;nb++) {
              const ang = Math.random()*Math.PI*2, dist = Math.random()*sr*0.85;
              const bx2 = d.cx+Math.cos(ang)*dist, by3 = d.cy+Math.sin(ang)*dist;
              d.bolts.push({ x:bx2, y:by3, life:0.25, branches: [] });
              // 分叉
              for (let b=0;b<2;b++) {
                d.bolts[d.bolts.length-1].branches.push({
                  ang: Math.random()*Math.PI*2, len: 30+Math.random()*60
                });
              }
            }
          }
          if (d.bolts) {
            for (const bolt of d.bolts) {
              bolt.life -= 0.016;
              if (bolt.life <= 0) continue;
              const bx2=bolt.x, by3=bolt.y;
              const alpha = Math.min(1, bolt.life*5);
              // 主闪电（世界空间渲染）
              ctx.save();
              ctx.globalAlpha = alpha;
              ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowBlur=25; ctx.shadowColor='#9b59b6';
              ctx.beginPath(); ctx.moveTo(bx2, by3-sr*0.5);
              let zy=by3-sr*0.5;
              for (let seg=0;seg<8;seg++) {
                const nz = zy + sr*0.06;
                ctx.lineTo(bx2+(Math.random()-0.5)*20, nz); zy=nz;
              }
              ctx.stroke();
              // 外层紫色光晕
              ctx.strokeStyle='#9b59b6'; ctx.lineWidth=8; ctx.globalAlpha=alpha*0.4;
              ctx.stroke();
              // 分叉
              if (bolt.branches) for (const br of bolt.branches) {
                ctx.globalAlpha=alpha*0.6; ctx.strokeStyle='#f1c40f'; ctx.lineWidth=1.5; ctx.shadowBlur=10;
                ctx.beginPath(); ctx.moveTo(bx2, by3-20);
                ctx.lineTo(bx2+Math.cos(br.ang)*br.len, by3-20+Math.sin(br.ang)*br.len); ctx.stroke();
              }
              ctx.shadowBlur=0; ctx.restore();
              // 落雷光晕
              const grd=ctx.createRadialGradient(bx2,by3,0,bx2,by3,40);
              grd.addColorStop(0,`rgba(241,196,15,${alpha*0.8})`); grd.addColorStop(1,'transparent');
              ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(bx2,by3,40,0,Math.PI*2); ctx.fill();
            }
            d.bolts = d.bolts.filter(b=>b.life>0);
          }
          // 周期闪光
          const flashIntensity = Math.max(0, Math.sin(now/200)*0.5);
          if (flashIntensity > 0.3) {
            ctx.globalAlpha = flashIntensity*0.15;
            ctx.fillStyle='#fff';
            ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=1;
          }
        }

        if (d.type === 'tornado') {
          // 龙卷风：多层旋转粒子柱，底部宽顶部窄，尘土飞扬
          if (!d.tornadoAngle) d.tornadoAngle=0;
          d.tornadoAngle += 0.06;
          const layers = 12;
          for (let li=0;li<layers;li++) {
            const layerH = li/layers;  // 0=底部 1=顶部
            const r = sr*(0.65-layerH*0.5); // 底宽顶窄
            const numDots = Math.floor(12-li*0.5);
            for (let di=0;di<numDots;di++) {
              const a = d.tornadoAngle*3 + (di/numDots)*Math.PI*2 + li*0.35;
              const px2 = sx + Math.cos(a)*r;
              const py2 = sy - layerH*sr*1.2 + Math.sin(a)*r*0.25;
              const dotR = (3+li*0.5)*(1-layerH*0.4);
              const alpha2 = 0.4+layerH*0.5;
              ctx.globalAlpha=alpha2;
              ctx.fillStyle = li<4 ? '#7f8c8d' : li<8 ? '#3498db' : 'rgba(255,255,255,0.8)';
              ctx.beginPath(); ctx.arc(px2,py2,dotR,0,Math.PI*2); ctx.fill();
            }
          }
          // 中心漩涡暗影
          const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,sr*0.5);
          grd.addColorStop(0,'rgba(0,30,80,0.5)'); grd.addColorStop(1,'transparent');
          ctx.globalAlpha=0.6; ctx.fillStyle=grd;
          ctx.beginPath(); ctx.arc(sx,sy,sr*0.5,0,Math.PI*2); ctx.fill();
          ctx.globalAlpha=1;
          // 底部尘土圈
          const dustAngle = d.tornadoAngle*2;
          for (let i=0;i<16;i++) {
            const da = dustAngle + (i/16)*Math.PI*2;
            const dr = sr*(0.6+Math.sin(da*3)*0.05);
            ctx.globalAlpha=0.3+Math.random()*0.2;
            ctx.fillStyle='#bdc3c7';
            ctx.beginPath(); ctx.arc(sx+Math.cos(da)*dr, sy+Math.sin(da)*dr*0.3, 4+Math.random()*6, 0, Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha=1;
        }

        if (d.type === 'volcanic') {
          // 火山喷发：岩浆喷射弧线 + 灰烬飘落 + 熔岩池
          if (!d.lavaRocks) d.lavaRocks=[];
          if (d.lavaRocks.length < 20 && Math.random() < 0.5) {
            const ang2 = Math.random()*Math.PI*2;
            d.lavaRocks.push({
              x: d.cx, y: d.cy,
              vx: Math.cos(ang2)*(80+Math.random()*200),
              vy: -(150+Math.random()*200),
              s: 6+Math.random()*14, life:0,
              color: Math.random()<0.5?'#e74c3c':'#e67e22'
            });
          }
          // 中央熔岩池
          const pools = 5;
          for (let i=0;i<pools;i++) {
            const pa = (i/pools)*Math.PI*2 + now/800;
            const pr = sr*(0.15+Math.sin(now/300+i)*0.08);
            const grd=ctx.createRadialGradient(sx+Math.cos(pa)*pr*0.5, sy+Math.sin(pa)*pr*0.5, 0, sx, sy, sr*0.55);
            grd.addColorStop(0,'rgba(255,200,0,0.9)'); grd.addColorStop(0.4,'rgba(230,100,0,0.7)'); grd.addColorStop(1,'transparent');
            ctx.globalAlpha=0.55+Math.sin(now/150+i)*0.2;
            ctx.fillStyle=grd;
            ctx.beginPath(); ctx.arc(sx,sy,sr*0.55,0,Math.PI*2); ctx.fill();
          }
          // 岩浆弹道（世界空间）
          for (const r of d.lavaRocks) {
            r.vy += 200*0.016; r.x+=r.vx*0.016; r.y+=r.vy*0.016; r.life+=0.016;
            const a2 = Math.max(0,1-r.life*0.6);
            ctx.globalAlpha=a2;
            const grd2=ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, r.s);
            grd2.addColorStop(0,'#f1c40f'); grd2.addColorStop(0.5,r.color); grd2.addColorStop(1,'transparent');
            ctx.fillStyle=grd2;
            ctx.beginPath(); ctx.arc(r.x, r.y, r.s, 0, Math.PI*2); ctx.fill();
            // 落点灼烧圈
            if (r.vy > 0 && r.y > d.cy) {
              ctx.globalAlpha=a2*0.5;
              ctx.fillStyle='rgba(255,80,0,0.4)';
              ctx.beginPath(); ctx.arc(r.x, r.y, r.s*2.5, 0, Math.PI*2); ctx.fill();
            }
          }
          d.lavaRocks = d.lavaRocks.filter(r=>r.life<2.5);
          // 灰烬粒子（慢速下落）
          if (!d.ash) d.ash=[];
          if (d.ash.length<40 && Math.random()<0.6) {
            const aa = Math.random()*Math.PI*2, ad = Math.random()*sr;
            d.ash.push({ x:d.cx+Math.cos(aa)*ad, y:d.cy-sr*0.5, vy:20+Math.random()*40, life:0, s:2+Math.random()*4 });
          }
          for (const a of d.ash) {
            a.y+=a.vy*0.016; a.life+=0.016;
            ctx.globalAlpha=Math.max(0,0.6-a.life*0.25);
            ctx.fillStyle='#7f8c8d';
            ctx.beginPath(); ctx.arc(a.x, a.y, a.s, 0, Math.PI*2); ctx.fill();
          }
          d.ash = d.ash.filter(a=>a.life<3);
          ctx.globalAlpha=1;
        }

        this._renderDisasterEdgeWarning(d, false); // 世界空间
      }
    }
  },

  _renderDisasterEdgeWarning(d, inScreenSpace) {
    // 屏幕空间：红色闪烁，提示天灾方向（两套坐标系统）
    const pulse = 0.4+Math.sin(Date.now()/120)*0.3;
    if (inScreenSpace) {
      // 屏幕空间（ctx.restore()之后，W/H就是屏幕坐标）
      const angle = Math.atan2(d.cy - H/2, d.cx - W/2);
      const ex = W/2 + Math.cos(angle)*W*0.4;
      const ey = H/2 + Math.sin(angle)*H*0.4;
      const grad = ctx.createRadialGradient(ex,ey,0,ex,ey,120);
      grad.addColorStop(0, d.cfg.color+Math.round(pulse*80).toString(16).padStart(2,'0'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(ex, ey, 120, 0, Math.PI*2); ctx.fill();
    } else {
      // 世界空间（ctx.translate(-cam.x,-cam.y)之后，屏幕中心是W/2,H/2）
      const angle = Math.atan2(d.cy - H/2, d.cx - W/2);
      const ex = W/2 + Math.cos(angle)*W*0.4;
      const ey = H/2 + Math.sin(angle)*H*0.4;
      const grad = ctx.createRadialGradient(ex,ey,0,ex,ey,120);
      grad.addColorStop(0, d.cfg.color+Math.round(pulse*80).toString(16).padStart(2,'0'));
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(ex, ey, 120, 0, Math.PI*2); ctx.fill();
    }
  },

  // 屏幕空间的天灾UI（警告条/倒计时/边缘提示）
  _renderDisasterUI() {
    if (!game.disasters || !game.disasters.length) return;
    const now = Date.now();
    for (const d of game.disasters) {
      const cfg = d.cfg;

      if (d.phase === 'warn') {
        // 顶部倒计时警告条
        const remaining = Math.max(0, cfg.warnDur - d.timer);
        const bw = 240, bx = (W-bw)/2, by = 50;
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.beginPath(); ctx.roundRect(bx-4, by-4, bw+8, 34, 6); ctx.fill();
        const pct = remaining / cfg.warnDur;
        ctx.fillStyle = cfg.color;
        ctx.fillRect(bx, by, bw*pct, 26);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px "Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${cfg.name}来袭！ ${remaining.toFixed(1)}s`, W/2, by+13);
        // 屏幕边缘提示
        this._renderDisasterEdgeWarning(d, true); // 屏幕空间
      }

      if (d.phase === 'active') {
        // 顶部"进行中"条
        const bw = 200, bx2 = (W-bw)/2, by2 = 50;
        const pa = 0.5+Math.sin(now/150)*0.5;
        ctx.globalAlpha=1;
        ctx.fillStyle = `rgba(${d.type==='meteor'?'231,76,60':d.type==='earthquake'?'160,82,45':d.type==='thunderstorm'?'155,89,182':d.type==='tornado'?'52,152,219':'230,126,34'},${pa*0.9})`;
        ctx.fillRect(bx2, by2, bw, 26);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px "Microsoft YaHei",sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${cfg.name}进行中！`, W/2, by2+13);
        this._renderDisasterEdgeWarning(d, true); // 屏幕空间
      }
    }
  },

  _renderMsgs() {
    this.msgs.forEach((m,i)=>{
      const alpha=Math.min(1,m.timer/400);
      ctx.globalAlpha=alpha; ctx.fillStyle=m.color;
      ctx.font='bold 17px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.shadowBlur=8; ctx.shadowColor=m.color;
      ctx.fillText(m.text, W/2, H/2-65-i*28);
      ctx.shadowBlur=0; ctx.globalAlpha=1;
    });
  },

  _renderResPickups() {
    this.resPickups.forEach((p,i)=>{
      const a=Math.min(1,p.timer/400);
      ctx.globalAlpha=a; ctx.fillStyle=p.type.color;
      ctx.font='bold 14px "Microsoft YaHei",sans-serif'; ctx.textAlign='right'; ctx.textBaseline='alphabetic';
      ctx.fillText(`${p.type.icon}+${p.amount} ${p.type.name}`, W-180, 200+i*22);
      ctx.globalAlpha=1;
    });
  },

  _renderEvoPanel() {
    const p=game.player;
    if(!p||!p.alive) return;
    const spec=EVODATA[p.specId];
    if(!spec.evolvesTo.length) { game.evoPanelOpen=false; return; }

    ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);

    const pw=Math.min(W-40, spec.evolvesTo.length*320+60);
    const ph=440, px=(W-pw)/2, py=(H-ph)/2;

    ctx.fillStyle='#0d1b0e'; ctx.strokeStyle='#27ae60'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,14); ctx.fill(); ctx.stroke();

    ctx.fillStyle='#2ecc71'; ctx.font='bold 24px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(`🧬 进化选择  当前：${spec.icon} ${spec.name}`, W/2, py+38);
    ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='13px "Microsoft YaHei",sans-serif';
    ctx.fillText('点击"确认进化" | 手机点🧬按钮关闭', W/2, py+60);

    const ncards=spec.evolvesTo.length;
    const cardW=Math.min(280,(pw-40)/ncards-20);
    // 存储各卡片进化按钮坐标供触控用
    game._mobileEvoBtns = [];
    spec.evolvesTo.forEach((id,i)=>{
      const tgt=EVODATA[id], req=spec.evoReqs[id], ok=canEvolve(p.resources,req);
      const cx=px+30+i*(cardW+20)+cardW/2;
      const cy=py+80+170;

      ctx.fillStyle=ok?`${tgt.color}28`:'rgba(15,15,15,0.6)';
      ctx.strokeStyle=ok?tgt.color:'rgba(255,255,255,0.12)'; ctx.lineWidth=ok?3:1;
      ctx.beginPath(); ctx.roundRect(cx-cardW/2,py+78,cardW,330,12); ctx.fill(); ctx.stroke();

      ctx.font='58px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle=ok?'#fff':'rgba(255,255,255,0.4)';
      ctx.fillText(tgt.icon, cx, py+128);

      ctx.fillStyle=tgt.color; ctx.font='bold 17px "Microsoft YaHei",sans-serif'; ctx.textBaseline='alphabetic'; ctx.textAlign='center';
      ctx.fillText(tgt.name, cx, py+168);

      const tierNames=['◇初级','◈tier1','★tier2','★★tier3','★★★tier4','✦tier5','✦✦tier6','✦✦✦tier7','💎tier8','👑tier9','🌟神格'];
      const tierTxt = `Lv.${tgt.tier||0} ${tierNames[tgt.tier||0]||''}`;
      ctx.fillStyle=tgt.tier===10?'#00bcd4':tgt.tier===9?'#f1c40f':tgt.tier>=7?'#9b59b6':tgt.tier>=5?'#e67e22':tgt.tier>=3?'#f39c12':'#95a5a6'; ctx.font='11px "Microsoft YaHei",sans-serif';
      ctx.fillText(tierTxt, cx, py+185);

      ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='11px "Microsoft YaHei",sans-serif';
      ctx.fillText(`❤️${tgt.hp} ⚔️${tgt.attack} 🛡️${tgt.defense} 💨${tgt.speed}`, cx, py+203);

      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px "Microsoft YaHei",sans-serif';
      const words=tgt.desc;
      ctx.fillText(words.slice(0,22), cx, py+220);
      if(words.length>22) ctx.fillText(words.slice(22,44), cx, py+234);

      ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='10px "Microsoft YaHei",sans-serif';
      ctx.fillText('技能：', cx-cardW/2+8, py+252);
      (tgt.skills||[]).forEach((sk,si)=>{
        ctx.fillStyle='#f1c40f'; ctx.textAlign='left';
        ctx.fillText(`${sk.icon} ${sk.name}`, cx-cardW/2+8, py+266+si*13);
      });

      ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='10px "Microsoft YaHei",sans-serif';
      ctx.fillText('需要物资：', cx, py+300);
      let rx=cx-(Object.keys(req).length-1)*30;
      for (const [rk,need] of Object.entries(req)) {
        const rd=RESOURCES[rk]; const have=p.resources[rk]||0;
        ctx.fillStyle=have>=need?'#2ecc71':'#e74c3c'; ctx.font='11px "Microsoft YaHei",sans-serif';
        ctx.fillText(`${rd?.icon}${have}/${need}`, rx, py+316);
        rx+=60;
      }

      // 进化按钮 — 存坐标供触控
      const btnX = cx-52, btnY = py+328, btnW = 104, btnH = 30;
      game._mobileEvoBtns.push({ id, ok, x: btnX, y: btnY, w: btnW, h: btnH });

      if (ok) {
        const pa2=Math.sin(Date.now()/300)*0.3+0.7; ctx.globalAlpha=pa2;
        ctx.fillStyle='#2ecc71';
        ctx.beginPath(); ctx.roundRect(btnX,btnY,btnW,btnH,7); ctx.fill();
        ctx.globalAlpha=1; ctx.fillStyle='#000'; ctx.font='bold 13px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('确认进化', cx, py+343);

        const mx=game.mouse.x, my=game.mouse.y;
        if(mx>=btnX&&mx<=btnX+btnW&&my>=btnY&&my<=btnY+btnH) {
          if(game.mouse.btn[0]) { game.mouse.btn[0]=false; p.evolve(id); }
        }
      } else {
        ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='12px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('物资不足', cx, py+343);
      }
    });
  },
};

// ==================== 输入 ====================
window.addEventListener('keydown', e=>{
  game.keys[e.key]=true; game.keys[e.code]=true;
  if ((e.code==='Space'||e.key===' ')&&game.state==='menu') game.init();
  if (game.state==='playing'&&game.player && game.player.alive) {
    if (e.key==='r'||e.key==='R') { game.evoPanelOpen = !game.evoPanelOpen; return; }

    // ---- PC两步技能系统 ----
    // 直接释放的技能（无目标参数，按下即放）
    const INSTANT_TYPES = new Set([
      'buff','heal','rage','parry','spin','chain','summon','reflect','invincible','aoePoison'
    ]);
    if (e.key==='q'||e.key==='Q') {
      if (game.pcSkillAim === 0) {
        game.pcSkillAim = -1; // 再次按Q：取消瞄准
      } else if (game.player.skillCds[0] <= 0) {
        const skType = game.player.spec.skills[0] && game.player.spec.skills[0].type;
        if (INSTANT_TYPES.has(skType)) {
          game.player.useSkill(0); // 直接释放
        } else {
          game.pcSkillAim = 0; game.skillKeyHeld = 0; // 进入瞄准模式
        }
      }
      return;
    }
    if (e.key==='e'||e.key==='E') {
      if (game.pcSkillAim === 1) {
        game.pcSkillAim = -1; // 再次按E：取消瞄准
      } else if (game.player.skillCds[1] <= 0) {
        const skType = game.player.spec.skills[1] && game.player.spec.skills[1].type;
        if (INSTANT_TYPES.has(skType)) {
          game.player.useSkill(1); // 直接释放
        } else {
          game.pcSkillAim = 1; game.skillKeyHeld = 1; // 进入瞄准模式
        }
      }
      return;
    }
    if (e.key==='Escape') {
      // ESC取消瞄准
      if (game.pcSkillAim >= 0) game.pcSkillAim = -1;
    }
  }
  if (e.code==='Space') e.preventDefault();
});
window.addEventListener('keyup', e=>{
  game.keys[e.key]=false; game.keys[e.code]=false;
  if (e.key==='q'||e.key==='Q') { if (game.pcSkillAim !== 0) game.skillKeyHeld = -1; }
  if (e.key==='e'||e.key==='E') { if (game.pcSkillAim !== 1) game.skillKeyHeld = -1; }
});
// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
  };
}

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  game.mouse.x=(e.clientX-r.left)*(W/r.width);
  game.mouse.y=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('mousedown', e=>{
  game.mouse.btn[e.button]=true;
  // 音效开关点击检测
  if (e.button === 0 && game._soundBtn) {
    const sb = game._soundBtn;
    const mx = game.mouse.x, my = game.mouse.y;
    if (mx >= sb.x && mx <= sb.x + sb.w && my >= sb.y && my <= sb.y + sb.h) {
      sound.enabled = !sound.enabled;
      if (sound.enabled && !sound.ctx) sound._initOnInteraction();
      e.stopPropagation();
      return;
    }
  }
  if (game.state==='menu') { game.init(); return; }
  if (game.state==='playing' && game.player && game.player.alive) {
    // PC瞄准模式下：左键点击确认释放技能
    if (!game.isMobile && game.pcSkillAim >= 0 && e.button === 0) {
      game.player.useSkill(game.pcSkillAim);
      game.pcSkillAim = -1;
      game.skillKeyHeld = -1;
      return;
    }
    // 左键点击进化面板外的区域关闭面板
    if (e.button === 0 && game.evoPanelOpen) {
      const evoBtns = game._mobileEvoBtns || [];
      const mx = game.mouse.x, my = game.mouse.y;
      let hit = false;
      for (const btn of evoBtns) {
        if (btn.ok && mx >= btn.x && mx <= btn.x + btn.w &&
            my >= btn.y && my <= btn.y + btn.h) {
          game.player.evolve(btn.id);
          game.evoPanelOpen = false;
          hit = true;
          break;
        }
      }
      if (!hit) game.evoPanelOpen = false;
    }
  }
});
canvas.addEventListener('mouseup', e=>{ game.mouse.btn[e.button]=false; });
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// ==================== 手机触控 ====================
const JOYSTICK_R = 60;
const JOYSTICK_ZONE_X = 120;
const JOYSTICK_ZONE_Y = H - 180;

function getTouchPos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) * (W / r.width),
    y: (e.clientY - r.top) * (H / r.height)
  };
}

function handleTouchStart(e) {
  e.preventDefault();
  if (game.state === 'menu') {
    // 检测音效按钮
    if (game._soundBtn && e.changedTouches.length > 0) {
      const pos = getTouchPos(e.changedTouches[0]);
      const sb = game._soundBtn;
      if (pos.x >= sb.x && pos.x <= sb.x + sb.w && pos.y >= sb.y && pos.y <= sb.y + sb.h) {
        sound.enabled = !sound.enabled;
        return;
      }
    }
    game.init(); return;
  }
  if (!game.player || !game.player.alive) return;

  for (const t of e.changedTouches) {
    const pos = getTouchPos(t);
    // 检测音效开关按钮（游戏中）
    if (game._soundBtn) {
      const sb = game._soundBtn;
      if (pos.x >= sb.x && pos.x <= sb.x + sb.w && pos.y >= sb.y && pos.y <= sb.y + sb.h) {
        sound.enabled = !sound.enabled;
        continue;
      }
    }
    const p = game.player;

    // 0. 进化面板已开启：检测面板内按钮
    if (game.evoPanelOpen) {
      const evoBtns = game._mobileEvoBtns || [];
      let hitPanel = false;
      for (const btn of evoBtns) {
        if (btn.ok && pos.x >= btn.x && pos.x <= btn.x + btn.w &&
            pos.y >= btn.y && pos.y <= btn.y + btn.h) {
          p.evolve(btn.id);
          game.evoPanelOpen = false;
          hitPanel = true;
          break;
        }
      }
      if (!hitPanel) {
        // 点面板外区域关闭面板
        game.evoPanelOpen = false;
      }
      continue;
    }

    // 1. 进化按钮（右下角上方）
    const evoBtn = game._mobileEvoBtn;
    if (evoBtn && pos.x >= evoBtn.x && pos.x <= evoBtn.x + evoBtn.w &&
        pos.y >= evoBtn.y && pos.y <= evoBtn.y + evoBtn.h) {
      game.evoPanelOpen = !game.evoPanelOpen;
      continue;
    }

    // 2. 技能按钮（右下角）
    let usedForSkill = false;
    const skillBtns = game._mobileSkillBtns || [];
    // 需要目标选择的技能类型
    const AIMED_TYPES = new Set(['cone','leap','teleport','execute','dash','zone','trap']);
    for (let i = 0; i < skillBtns.length; i++) {
      const btn = skillBtns[i];
      if (!btn) continue;
      if (pos.x >= btn.x && pos.x <= btn.x + btn.w &&
          pos.y >= btn.y && pos.y <= btn.y + btn.h) {
        if (p.skillCds[i] <= 0) {
          const skType = p.spec.skills[i] && p.spec.skills[i].type;
          if (AIMED_TYPES.has(skType)) {
            // 进入瞄准模式（或取消瞄准）
            if (game.skillAimMode === i) {
              game.skillAimMode = -1; // 再次点击取消
            } else {
              game.skillAimMode = i;
              // 默认指向玩家前方
              game.skillAimTouchX = p.x + Math.cos(p.facingAngle) * 200;
              game.skillAimTouchY = p.y + Math.sin(p.facingAngle) * 200;
            }
          } else {
            // 无需瞄准的技能：直接释放
            p.useSkill(i);
            game.skillAimMode = -1;
          }
        }
        usedForSkill = true;
        break;
      }
    }
    if (usedForSkill) continue;

    // 3. 左半屏：摇杆区
    if (pos.x < W * 0.5) {
      // 如果正在瞄准，左半屏触控也更新瞄准目标方向
      if (game.skillAimMode >= 0) {
        game.skillAimTouchX = pos.x + game.cam.x;
        game.skillAimTouchY = pos.y + game.cam.y;
      } else {
        game.joyStick.active = true;
        game.joyStick.touchId = t.identifier;
        game.joyStick.baseX = pos.x;
        game.joyStick.baseY = pos.y;
        game.joyStick.curX = pos.x;
        game.joyStick.curY = pos.y;
      }
    }
    // 4. 右半屏（非按钮区）：瞄准模式下确认释放，否则移动/攻击
    else {
      if (game.skillAimMode >= 0) {
        // 确认释放：以触控坐标为目标
        const worldX = pos.x + game.cam.x;
        const worldY = pos.y + game.cam.y;
        // 临时把鼠标坐标设为触控坐标
        const origMx = game.mouse.x, origMy = game.mouse.y;
        game.mouse.x = pos.x; game.mouse.y = pos.y;
        p.useSkill(game.skillAimMode);
        game.mouse.x = origMx; game.mouse.y = origMy;
        game.skillAimMode = -1;
      } else {
        const now = Date.now();
        if (now - game.lastTap < 300) {
          // 双击：攻击最近的敌人
          let nearest = null, nd = Infinity;
          for (const e of game.bots) {
            if (!e.alive) continue;
            const d = Math.hypot(e.x - p.x, e.y - p.y);
            if (d < nd) { nd = d; nearest = e; }
          }
          if (nearest && nd < 500) p.attack(nearest);
        } else {
          // 单击：移动到目标位置
          const worldX = pos.x + game.cam.x;
          const worldY = pos.y + game.cam.y;
          const dx = worldX - p.x, dy = worldY - p.y;
          if (Math.hypot(dx, dy) > 5) {
            p.moveTargetX = worldX;
            p.moveTargetY = worldY;
          }
        }
        game.lastTap = now;
      }
    }
  }
}

function handleTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const pos = getTouchPos(t);
    // 摇杆移动
    if (game.joyStick.touchId === t.identifier) {
      const dx = pos.x - game.joyStick.baseX;
      const dy = pos.y - game.joyStick.baseY;
      const dist = Math.hypot(dx, dy);
      const clamp = Math.min(dist, JOYSTICK_R);
      if (dist > 0) {
        game.joyStick.curX = game.joyStick.baseX + (dx / dist) * clamp;
        game.joyStick.curY = game.joyStick.baseY + (dy / dist) * clamp;
      }
    }
    // 瞄准模式：任意手指滑动都更新瞄准目标
    if (game.skillAimMode >= 0) {
      game.skillAimTouchX = pos.x + game.cam.x;
      game.skillAimTouchY = pos.y + game.cam.y;
    }
  }
}

function handleTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (game.joyStick.touchId === t.identifier) {
      game.joyStick.active = false;
      game.joyStick.touchId = null;
    }
    for (let i = 0; i < game.mobileSkillTouch.length; i++) {
      if (game.mobileSkillTouch[i] && game.mobileSkillTouch[i].touchId === t.identifier) {
        game.mobileSkillTouch[i] = null;
      }
    }
  }
}

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });

// ==================== 主循环 ====================
let lastT=0;
function loop(ts) {
  const dt=Math.min((ts-lastT)/1000, 0.05);
  lastT=ts;
  if (game.state==='playing') {
    game.update(dt);
    game.ui.update(dt);
  }
  game.render();
  requestAnimationFrame(loop);
}

// 隐藏加载屏幕
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    requestAnimationFrame(ts=>{lastT=ts; loop(ts);});
  }, 500);
});
</script>

// ==================== 音效引擎 ====================
class SoundFX {
  constructor() {
    this.enabled = true;
    this.ctx = null;
    this.masterGain = null;
    this._szWarnCooldown = 0;
    this._initOnInteraction();
  }

  _initOnInteraction() {
    const init = () => {
      if (this.ctx) return;
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.55;
        this.masterGain.connect(this.ctx.destination);
      } catch(e) { this.enabled = false; }
    };
    ['click','keydown','touchstart'].forEach(ev => window.addEventListener(ev, init, {once:true}));
  }

  _ac() {
    if (!this.enabled || !this.ctx) return null;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    return this.ctx;
  }

  // 基础正弦音调
  _tone(freq, dur, vol=0.4, type='sine', attack=0.01, decay=0.08) {
    const ac = this._ac(); if (!ac) return;
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(now); osc.stop(now + dur + 0.05);
  }

  // 调频扫描
  _sweep(startF, endF, dur, vol=0.35, type='sawtooth') {
    const ac = this._ac(); if (!ac) return;
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(startF, now);
    osc.frequency.exponentialRampToValueAtTime(endF, now + dur);
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(now); osc.stop(now + dur + 0.05);
  }

  // 噪声爆炸（用于打击感）
  _noise(dur, vol=0.3, freqCutoff=2000) {
    const ac = this._ac(); if (!ac) return;
    const bufSize = Math.floor(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<bufSize; i++) data[i] = (Math.random()*2-1);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = freqCutoff;
    const gain = ac.createGain();
    const now = ac.currentTime;
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(filt); filt.connect(gain); gain.connect(this.masterGain);
    src.start(now); src.stop(now + dur + 0.05);
  }

  // ---- 游戏音效 ----

  // 攻击（玩家发出）- 快速钝击
  playAttack() {
    this._noise(0.08, 0.25, 3500);
    this._tone(220, 0.06, 0.2, 'square', 0.001, 0.06);
  }

  // 受击 - 短促碰撞
  playHit() {
    this._noise(0.12, 0.35, 1800);
    this._tone(180, 0.1, 0.18, 'square', 0.001, 0.1);
  }

  // 死亡 - 低沉下降
  playDeath() {
    this._sweep(380, 80, 0.6, 0.5, 'sawtooth');
    this._noise(0.5, 0.45, 900);
    setTimeout(() => this._tone(60, 0.4, 0.4, 'sine', 0.01, 0.4), 200);
  }

  // 进化 - 升调光环
  playEvolution() {
    const ac = this._ac(); if (!ac) return;
    const notes = [261, 329, 392, 523, 659, 880, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => {
        this._tone(freq, 0.25, 0.3, 'sine', 0.01, 0.22);
        this._tone(freq * 1.5, 0.2, 0.15, 'sine', 0.01, 0.18);
      }, i * 80);
    });
    setTimeout(() => {
      this._sweep(523, 1568, 0.6, 0.4, 'sine');
      this._noise(0.15, 0.12, 8000);
    }, notes.length * 80);
  }

  // 拾取资源 - 清脆一声
  playPickup() {
    this._tone(880, 0.12, 0.25, 'sine', 0.005, 0.1);
    this._tone(1320, 0.1, 0.18, 'sine', 0.005, 0.09);
  }

  // 技能音效（根据类型）
  playSkill(type) {
    switch(type) {
      case 'dash':
        this._sweep(800, 2400, 0.2, 0.4, 'sawtooth');
        this._noise(0.15, 0.2, 5000);
        break;
      case 'leap':
        this._sweep(300, 900, 0.12, 0.35, 'sine');
        this._noise(0.2, 0.3, 3000);
        setTimeout(() => this._noise(0.15, 0.4, 1500), 200);
        break;
      case 'aoe':
        this._noise(0.25, 0.5, 2500);
        this._sweep(500, 150, 0.4, 0.4, 'sawtooth');
        break;
      case 'aoePoison':
        this._sweep(200, 600, 0.3, 0.3, 'sine');
        this._tone(400, 0.4, 0.2, 'sawtooth', 0.01, 0.35);
        break;
      case 'rage':
        this._noise(0.08, 0.4, 4000);
        this._sweep(200, 600, 0.3, 0.45, 'sawtooth');
        break;
      case 'buff':
        this._tone(523, 0.15, 0.3, 'sine', 0.01, 0.12);
        this._tone(659, 0.15, 0.28, 'sine', 0.01, 0.12);
        this._tone(784, 0.2, 0.25, 'sine', 0.01, 0.18);
        break;
      case 'heal':
      case 'healBurst':
        this._tone(659, 0.18, 0.3, 'sine', 0.01, 0.15);
        this._tone(880, 0.18, 0.28, 'sine', 0.01, 0.15);
        this._tone(1047, 0.22, 0.25, 'sine', 0.01, 0.2);
        break;
      case 'stealth':
      case 'stealthAmbush':
        this._sweep(1200, 300, 0.4, 0.18, 'sine');
        this._tone(300, 0.3, 0.1, 'sine', 0.05, 0.25);
        break;
      case 'lightning':
      case 'chainLightning':
        this._noise(0.08, 0.6, 8000);
        this._sweep(2000, 800, 0.15, 0.5, 'sawtooth');
        break;
      case 'freeze':
      case 'iceField':
        this._tone(1200, 0.08, 0.3, 'sine', 0.001, 0.07);
        this._sweep(1400, 400, 0.3, 0.25, 'sine');
        this._noise(0.1, 0.15, 2000);
        break;
      case 'teleport':
        this._sweep(400, 2400, 0.15, 0.35, 'sine');
        this._noise(0.08, 0.2, 6000);
        setTimeout(() => this._sweep(2400, 400, 0.15, 0.25, 'sine'), 160);
        break;
      case 'shield':
      case 'parry':
      case 'barrier':
        this._tone(660, 0.1, 0.35, 'sine', 0.001, 0.08);
        this._noise(0.06, 0.2, 2000);
        break;
      case 'summon':
      case 'vortex':
        this._sweep(80, 400, 0.5, 0.4, 'sawtooth');
        this._noise(0.2, 0.3, 1200);
        break;
      default:
        this._tone(440, 0.15, 0.25, 'sine', 0.005, 0.12);
    }
  }

  // 游戏开始 - 进场号角
  playGameStart() {
    const fanfare = [
      [261, 0],   [329, 120], [392, 240], [523, 380],
      [659, 520], [784, 640], [1047, 780]
    ];
    fanfare.forEach(([f, delay]) => {
      setTimeout(() => {
        this._tone(f, 0.3, 0.32, 'sine', 0.01, 0.25);
        this._tone(f * 0.5, 0.35, 0.15, 'sine', 0.01, 0.3);
      }, delay);
    });
    setTimeout(() => {
      this._noise(0.08, 0.15, 4000);
      this._sweep(880, 1760, 0.5, 0.3, 'sine');
    }, 900);
  }

  // 游戏结束（失败）- 悲鸣
  playGameOver() {
    this._sweep(523, 196, 1.2, 0.45, 'sine');
    setTimeout(() => this._sweep(330, 110, 0.9, 0.35, 'sawtooth'), 400);
    setTimeout(() => {
      this._tone(130, 0.8, 0.4, 'sine', 0.02, 0.75);
      this._noise(0.3, 0.2, 600);
    }, 900);
  }

  // 游戏胜利 - 凯歌
  playVictory() {
    const melody = [
      [784, 0], [880, 180], [1047, 360],
      [880, 540], [1047, 680], [1319, 820],
      [1047, 1000], [1319, 1120], [1568, 1280]
    ];
    melody.forEach(([f, delay]) => {
      setTimeout(() => {
        this._tone(f, 0.35, 0.35, 'sine', 0.01, 0.3);
        this._tone(f * 0.5, 0.3, 0.15, 'sine', 0.01, 0.25);
      }, delay);
    });
    setTimeout(() => {
      this._noise(0.12, 0.2, 5000);
      this._sweep(523, 1568, 0.6, 0.3, 'sine');
    }, 1600);
  }

  // 安全区警告 - 脉冲报警（有冷却防刷屏）
  playSzWarning(dt) {
    this._szWarnCooldown -= dt;
    if (this._szWarnCooldown > 0) return;
    this._szWarnCooldown = 3.0;
    this._tone(880, 0.1, 0.35, 'square', 0.001, 0.08);
    setTimeout(() => this._tone(660, 0.12, 0.3, 'square', 0.001, 0.1), 150);
    setTimeout(() => this._tone(880, 0.1, 0.35, 'square', 0.001, 0.08), 300);
  }

  // 格挡反击音
  playParry() {
    this._noise(0.05, 0.5, 6000);
    this._tone(1320, 0.12, 0.45, 'sine', 0.001, 0.1);
    this._sweep(1320, 440, 0.25, 0.3, 'sine');
  }

  // 治愈/回血
  playHeal() {
    this._tone(659, 0.15, 0.28, 'sine', 0.01, 0.12);
    this._tone(880, 0.18, 0.25, 'sine', 0.01, 0.15);
    this._tone(1047, 0.2, 0.2, 'sine', 0.01, 0.18);
  }
}

function canEvolve(res, req) {
  for (const [k, v] of Object.entries(req)) {
    if ((res[k] || 0) < v) return false;

  return true;
}

// ==================== 粒子系统 ====================
class Particles {
  constructor() { this.list = []; }
  add(x, y, vx, vy, color, size, life, opts={}) {
    this.list.push({ x, y, vx, vy, color, size, maxS:size, life, maxLife:life,
      gravity:opts.gravity||0, drag:opts.drag||0.93, glow:opts.glow||false,
      type:opts.type||'circle', text:opts.text||'' });
  }
  update(dt) {
    this.list = this.list.filter(p => {
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vy += p.gravity * dt;
      p.vx *= p.drag; p.vy *= p.drag;
      p.life -= dt;
      p.size = p.maxS * (p.life / p.maxLife);
      return p.life > 0;
    });
  }
  render(ctx) {
    for (const p of this.list) {
      ctx.globalAlpha = Math.min(1, p.life / p.maxLife);
      if (p.glow) { ctx.shadowBlur = 10; ctx.shadowColor = p.color; }
      ctx.fillStyle = p.color;
      if (p.type === 'text') {
        ctx.font = `bold ${Math.max(8, p.size * 2)}px "Microsoft YaHei", sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI*2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }
  burst(x, y, color, n=12) {
    for (let i=0;i<n;i++) {
      const a = Math.random()*Math.PI*2, s = 1.5+Math.random()*3;
      this.add(x,y,Math.cos(a)*s,Math.sin(a)*s,color,3+Math.random()*4,0.5+Math.random()*0.4,{glow:true,drag:0.88});
    }
  }
  explosion(x, y, color, n=18) {
    for (let i=0;i<n;i++) {
      const a = Math.random()*Math.PI*2, s = 2+Math.random()*5;
      this.add(x,y,Math.cos(a)*s,Math.sin(a)*s,color,5+Math.random()*8,0.8+Math.random(),{glow:true,gravity:0.15,drag:0.87});
    }
  }
  evoEffect(x, y, color) {
    for (let i=0;i<50;i++) {
      const a = Math.random()*Math.PI*2, s = 3+Math.random()*6;
      this.add(x,y,Math.cos(a)*s,Math.sin(a)*s,color,5+Math.random()*10,1.5+Math.random(),{glow:true,gravity:-0.05,drag:0.90});
    }
    for (let i=0;i<20;i++) {
      this.add(x,y,(Math.random()-0.5)*2,(Math.random()-0.5)*2-1.5,'#f1c40f',4,1.2,{glow:true,gravity:-0.08,drag:0.98});
    }
  }
  ring(x, y, color, radius, n=16) {
    for (let i=0;i<n;i++) {
      const a = (i/n)*Math.PI*2;
      this.add(x+Math.cos(a)*radius*0.5, y+Math.sin(a)*radius*0.5,
        Math.cos(a)*1.5, Math.sin(a)*1.5, color, 4, 0.6, {glow:true});
    }
  }
  hit(x, y, color, n=5) {
    for (let i=0;i<n;i++) {
      const a = Math.random()*Math.PI*2;
      this.add(x,y,Math.cos(a)*2.5,Math.sin(a)*2.5,color,2.5,0.3,{drag:0.85});
    }
  }
  number(x, y, text, color) {
    this.add(x, y-20, (Math.random()-0.5)*0.8, -1.2, color, 12, 1.0, {type:'text', text, drag:0.99, gravity:-0.04});
  }
  lightning(x1,y1,x2,y2) {
    const steps=8;
    let px=x1,py=y1;
    for (let i=1;i<=steps;i++) {
      const t=i/steps;
      const nx=x1+(x2-x1)*t+(Math.random()-0.5)*28, ny=y1+(y2-y1)*t+(Math.random()-0.5)*28;
      this.add((px+nx)/2,(py+ny)/2,0,0,'#f1c40f',3,0.3,{glow:true});
      px=nx;py=ny;
    }
  }
}

// ==================== 资源掉落 ====================
class ResDrop {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.amount = 1 + Math.floor(Math.random() * 3);
    this.size = 14;
    this.phase = Math.random() * Math.PI * 2;
  }
  render(ctx) {
    const by = Math.sin(Date.now()/600 + this.phase) * 4;
    const ps = Math.sin(Date.now()/400 + this.phase) * 0.12 + 0.88;
    const x = this.x, y = this.y + by;
    const g = ctx.createRadialGradient(x,y,0,x,y,this.size*2.2);
    g.addColorStop(0, this.type.color+'50');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,this.size*2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.arc(x,y,this.size*ps,0,Math.PI*2); ctx.fill();
    ctx.font = `${this.size*1.5}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.type.icon, x, y);
    if (this.amount > 1) {
      ctx.fillStyle = '#f1c40f';
      ctx.font = 'bold 10px sans-serif';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(`×${this.amount}`, x, y + this.size + 4);
    }
  }
}

// ==================== 玩家/Bot ====================
class Entity {
  constructor(x, y, isPlayer, game) {
    this.x = x; this.y = y;
    this.isPlayer = isPlayer;
    this.game = game;
    this.alive = true;
    this.isBot = !isPlayer;
    this.name = isPlayer ? '玩家' : this._rndName();
    this.kills = 0;
    this.resources = {};

    this.vx = 0; this.vy = 0;
    this.botVx = 0; this.botVy = 0;
    this.facingAngle = 0;

    // 状态效果
    this.stunTimer = 0;
    this.frozenTimer = 0;
    this.rootTimer = 0;
    this.silTimer = 0;
    this.poisonTimer = 0; this.poisonDps = 0;
    this.invisTimer = 0;
    this.rageTimer = 0; this.rageMult = 1;
    this.speedMult = 1; this.speedMultTimer = 0;
    this.defRedMult = 1; this.defRedTimer = 0;
    this.nextAtkMult = 1;
    this.parrying = false; this.parryTimer = 0; this.parryEff = null;

    // 技能
    this.skillCds = [0, 0];
    this._atkCd = 0;
    this._atkCdProgress = 1; // 攻击动画进度 0=刚攻击完, 1=可以攻击
    this._atkCdMax = 0.8;

    this._evoNotified = false;

    // 进化
    this.applySpec(EVODATA.PRIMORDIAL);

    // bot ai state
    this.ai = { updateTimer:0, targetRes:null, targetEnemy:null, wanderX:x, wanderY:y, aggroTimer:0 };

    // anim
    this.animFrame = 0; this.animTimer = 0;
    // 位移动画状态（冲刺/跳跃/传送）
    this.skillAnim = { active:false, type:'', startX:0, startY:0, endX:0, endY:0, prog:0, dur:0 };
  }

  _rndName() {
    const A=['迅猛','强悍','古老','黑暗','凶猛','神秘','危险','血腥','疯狂','史前','上古'];
    const B=['猎手','战士','霸主','领主','杀手','统治者','破坏者'];
    return A[Math.floor(Math.random()*A.length)]+B[Math.floor(Math.random()*B.length)];
  }

  // ========== 写实渲染辅助函数 ==========
  _hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r, g, b];
  }
  _lighten(hex) {
    const [r,g,b] = this._hexToRgb(hex);
    return `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
  }
  _darken(hex) {
    const [r,g,b] = this._hexToRgb(hex);
    return `rgb(${Math.round(r*.55)},${Math.round(g*.55)},${Math.round(b*.55)})`;
  }

  applySpec(data) {
    this.specId = data.id;
    this.spec = data;
    const hpPct = this.maxHp ? this.hp / this.maxHp : 1;
    this.maxHp = data.hp;
    this.hp = this.maxHp * hpPct;
    this.baseSpd = data.speed;
    this.baseAtk = data.attack;
    this.baseDef = data.defense;
    this.size = data.size;
    this.color = data.color;
    this.icon = data.icon;
    this.moveType = data.moveType || 'walk';
    this.atkRange = data.atkRange + data.size;
    this.atkDmg = data.atkDmg;
    this.atkCdMax = data.atkCd;
    this._atkCdMax = data.atkCd;
    this.skillCds = [0, 0];
  }

  get curSpd() {
    const base = this.baseSpd * (this.speedMultTimer > 0 ? this.speedMult : 1);
    if (!game || !game.getTerrainAt) return base;
    const terrainType = game.getTerrainAt(this.x, this.y);
    const moveMods = TERRAIN_SPEED_MOD[this.moveType] || TERRAIN_SPEED_MOD.walk;
    const terrainMod = moveMods[terrainType] !== undefined ? moveMods[terrainType] : 1.0;
    return base * terrainMod;
  }
  get curAtk() { return this.baseAtk * (this.rageTimer > 0 ? this.rageMult : 1); }
  get curDef() { return this.baseDef * (this.defRedTimer > 0 ? this.defRedMult : 1); }

  update(dt, keys, mouse) {
    this.animTime = (this.animTime || 0) + dt;
    // 状态计时器
    if (this.stunTimer > 0) this.stunTimer -= dt;
    if (this.frozenTimer > 0) this.frozenTimer -= dt;
    if (this.rootTimer > 0) this.rootTimer -= dt;
    if (this.silTimer > 0) this.silTimer -= dt;
    if (this.poisonTimer > 0) {
      this.poisonTimer -= dt;
      this.hp -= this.poisonDps * dt;
      if (this.hp <= 0) { this.hp = 0; this.die(null); return; }
    }
    if (this.invisTimer > 0) this.invisTimer -= dt;
    if (this.rageTimer > 0) this.rageTimer -= dt;
    if (this.speedMultTimer > 0) this.speedMultTimer -= dt;
    if (this.defRedTimer > 0) this.defRedTimer -= dt;
    if (this.parryTimer > 0) this.parryTimer -= dt; else this.parrying = false;

    this._atkCd = Math.max(0, this._atkCd - dt);
    this._atkCdProgress = this._atkCdMax > 0 ? 1 - (this._atkCd / this._atkCdMax) : 1;
    this.skillCds[0] = Math.max(0, this.skillCds[0] - dt);
    this.skillCds[1] = Math.max(0, this.skillCds[1] - dt);

    // 移动
    const stunned = this.stunTimer > 0 || this.frozenTimer > 0;
    if (!stunned) {
      // === 位移动画处理 ===
      if (this.skillAnim && this.skillAnim.active) {
        this.skillAnim.prog += dt / this.skillAnim.dur;
        if (this.skillAnim.prog >= 1) {
          this.skillAnim.prog = 1;
          this.skillAnim.active = false;
          this.x = this.skillAnim.endX;
          this.y = this.skillAnim.endY;
        } else {
          // 缓动：ease-out
          const p = 1 - Math.pow(1 - this.skillAnim.prog, 2);
          this.x = this.skillAnim.startX + (this.skillAnim.endX - this.skillAnim.startX) * p;
          this.y = this.skillAnim.startY + (this.skillAnim.endY - this.skillAnim.startY) * p;
          // 面向移动方向
          this.facingAngle = Math.atan2(this.skillAnim.endY - this.skillAnim.startY, this.skillAnim.endX - this.skillAnim.startX);
        }
        // 冲刺粒子特效
        if (this.isPlayer && Math.random() < 0.6) {
          game.par.add(this.x, this.y, '#27ae60', 2, 0.3);
        }
      } else {
        // 正常移动
        if (this.isPlayer) {
          let vx=0, vy=0;
          // 键盘
          if (keys['w']||keys['W']||keys['ArrowUp']) vy-=1;
          if (keys['s']||keys['S']||keys['ArrowDown']) vy+=1;
          if (keys['a']||keys['A']||keys['ArrowLeft']) vx-=1;
          if (keys['d']||keys['D']||keys['ArrowRight']) vx+=1;
          // 手机虚拟摇杆
          if (game.isMobile && game.joyStick.active) {
            const jdx = game.joyStick.curX - game.joyStick.baseX;
            const jdy = game.joyStick.curY - game.joyStick.baseY;
            const jlen = Math.hypot(jdx, jdy);
            if (jlen > 5) {
              vx = jdx / jlen;
              vy = jdy / jlen;
            }
          }
          const len = Math.sqrt(vx*vx+vy*vy);
          if (len>0) {
            const spd = this.curSpd;
            this.x += (vx/len)*spd*dt*60;
            this.y += (vy/len)*spd*dt*60;
            this.facingAngle = Math.atan2(vy/len, vx/len);
          }
          // 移动目标（手机点击移动）
          if (this.moveTargetX !== undefined) {
            const dx = this.moveTargetX - this.x, dy = this.moveTargetY - this.y;
            const d = Math.hypot(dx, dy);
            if (d > 10) {
              const spd = this.curSpd;
              this.x += (dx/d)*spd*dt*60;
              this.y += (dy/d)*spd*dt*60;
              this.facingAngle = Math.atan2(dy/d, dx/d);
            } else {
              delete this.moveTargetX; delete this.moveTargetY;
            }
          }
          // 鼠标朝向（PC）
          if (!game.isMobile) {
            const wx = game.mouse.x + game.cam.x, wy = game.mouse.y + game.cam.y;
            this.facingAngle = Math.atan2(wy - this.y, wx - this.x);
          }
        } else {
          const len = Math.sqrt(this.botVx*this.botVx+this.botVy*this.botVy);
          if (len > 0.1) {
            const spd = this.curSpd;
            this.x += (this.botVx/len)*spd*dt*60;
            this.y += (this.botVy/len)*spd*dt*60;
            this.facingAngle = Math.atan2(this.botVy/len, this.botVx/len);
          }
        }
      }
    }

    // 边界
    const W = game.worldW, H = game.worldH;
    this.x = Math.max(this.size, Math.min(W-this.size, this.x));
    this.y = Math.max(this.size, Math.min(H-this.size, this.y));

    // 进化检测
    if (this.isPlayer) this._checkEvo();

    // 动画
    this.animTimer += dt;
    if (this.animTimer > 0.15) { this.animTimer = 0; this.animFrame = (this.animFrame+1)%4; }
  }

  _checkEvo() {
    const spec = EVODATA[this.specId];
    if (!spec.evolvesTo.length) return;
    for (const id of spec.evolvesTo) {
      const req = spec.evoReqs[id];
      if (canEvolve(this.resources, req)) {
        if (!this._evoNotified) {
          this._evoNotified = true;
          game.ui.msg('🧬 可以进化！按 R 键打开进化面板', 3000, '#2ecc71');
        }
        return;
      }
    }
    this._evoNotified = false;
  }

  canAtk() { return this._atkCd <= 0 && this.stunTimer <= 0 && this.frozenTimer <= 0; }

  attack(target) {
    if (!this.canAtk()) return;
    let dmg = this.curAtk;

    // 潜水突袭
    if (this.nextAtkMult > 1) {
      dmg *= this.nextAtkMult;
      this.nextAtkMult = 1;
      this.invisTimer = 0;
      game.par.burst(this.x - game.cam.x, this.y - game.cam.y, '#1abc9c', 15);
    }

    const killed = target.takeDmg(dmg, this);
    if (this.isPlayer) sound.playAttack();

    // 嗜血回血
    if (this.rageTimer > 0 && killed && this.spec.skills[0]?.id === 'bloodrage') {
      this.heal(this.spec.skills[0].killHeal);
    }

    // 自动附毒
    if (this.spec.atkPoison) {
      const p = this.spec.atkPoison;
      target.applyPoison(p.dps, p.dur);
    }

    this._atkCd = this.atkCdMax;
    game.par.hit(target.x - game.cam.x, target.y - game.cam.y, this.color, 5);
  }

  takeDmg(amount, attacker) {
    if (!this.alive) return false;

    // 格挡
    if (this.parrying && this.parryTimer > 0 && attacker) {
      // 反击
      const eff = this.parryEff;
      if (eff) {
        attacker.takeDmg(eff.counterDmg, this);
        game.ui.msg('🛡️ 完美格挡！反击！', 1000, '#8e44ad');
        game.par.ring(this.x - game.cam.x, this.y - game.cam.y, '#8e44ad', 55, 10);
        if (this.isPlayer) sound.playParry();
        this.parrying = false;
        this.parryTimer = 0;
      }
      return false;
    }

    const defRed = 1 - Math.min(0.75, this.curDef * 0.018);
    let dmg = Math.max(1, amount * defRed);
    this.hp -= dmg;

    if (this.isPlayer) {
      game.par.number(this.x - game.cam.x, this.y - game.cam.y, `-${Math.round(dmg)}`, '#e74c3c');
      sound.playHit();
    }

    if (this.hp <= 0) {
      this.hp = 0;
      this.die(attacker);
      return true;
    }
    return false;
  }

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount);
    if (this.isPlayer) {
      game.par.number(this.x - game.cam.x, this.y - game.cam.y, `+${Math.round(amount)}`, '#2ecc71');
    }
  }

  applyPoison(dps, durSec) {
    if (dps > this.poisonDps) this.poisonDps = dps;
    if (durSec > this.poisonTimer) this.poisonTimer = durSec;
  }

  die(killer) {
    this.alive = false;
    this.hp = 0;
    if (killer) {
      killer.kills = (killer.kills||0) + 1;
      if (killer.isPlayer) {
        game.stats.kills++;
        game.ui.msg(`⚔️ 击杀 ${this.name}！`, 1500, '#f39c12');
      }
    }
    if (this.isPlayer) sound.playDeath();
    game.par.explosion(this.x - game.cam.x, this.y - game.cam.y, this.color, 20);
    // 掉落资源
    const allRes = Object.values(RESOURCES);
    for (let i=0; i<3+Math.floor(Math.random()*4); i++) {
      const t = allRes[Math.floor(Math.random()*allRes.length)];
      const ox=(Math.random()-0.5)*60, oy=(Math.random()-0.5)*60;
      game.drops.push(new ResDrop(this.x+ox, this.y+oy, t));
    }
  }

  useSkill(idx) {
    if (this.silTimer > 0) { if (this.isPlayer) game.ui.msg('技能被沉默！', 800,'#e74c3c'); return; }
    const skills = this.spec.skills;
    if (!skills || !skills[idx]) return;
    if (this.skillCds[idx] > 0) { if (this.isPlayer) game.ui.msg(`冷却 ${this.skillCds[idx].toFixed(1)}s`, 700,'#95a5a6'); return; }

    const sk = skills[idx];
    const tx = game.mouse.x + game.cam.x;
    const ty = game.mouse.y + game.cam.y;

    this._doSkill(sk, tx, ty);
    this.skillCds[idx] = sk.cd;
    if (this.isPlayer) {
      sound.playSkill(sk.type);
      game.ui.msg(`${sk.icon} ${sk.name}！`, 1000,'#f1c40f');
      game.par.burst(this.x-game.cam.x, this.y-game.cam.y,'#f1c40f',12);
    }
  }

  _doSkill(sk, tx, ty) {
    switch(sk.type) {
      case 'buff':
        this.speedMult = sk.speedMult;
        this.speedMultTimer = sk.duration;
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#27ae60',50,14);
        break;
      case 'rage':
        this.rageTimer = sk.duration;
        this.rageMult = sk.atkMult;
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#e74c3c',50,14);
        break;
      case 'dash': {
        // 使用鼠标点击目标作为冲刺方向，动画过程约0.35秒
        const ang = Math.atan2(ty-this.y, tx-this.x);
        const ex = Math.max(this.size, Math.min(game.worldW-this.size, this.x + Math.cos(ang)*sk.dashDist));
        const ey = Math.max(this.size, Math.min(game.worldH-this.size, this.y + Math.sin(ang)*sk.dashDist));
        this.skillAnim = { active:true, type:'dash', startX:this.x, startY:this.y, endX:ex, endY:ey, prog:0, dur:0.35 };
        this._aoeHit(ex, ey, sk.dashW, sk.dashDmg);
        game.par.explosion(ex-game.cam.x, ey-game.cam.y,'#27ae60',14);
        break;
      }
      case 'aoe':
        this._aoeHit(this.x, this.y, sk.radius, sk.dmg, {kb:sk.kb, stun:sk.stun});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y, this.color, sk.radius, 20);
        break;
      case 'aoePoison':
        this._aoeHit(this.x, this.y, sk.radius, 0, {poisonDps:sk.poisonDps, poisonDur:sk.poisonDur});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#2ecc71', sk.radius, 20);
        break;
      case 'leap': {
        const la = Math.atan2(ty-this.y, tx-this.x);
        const ld = Math.min(sk.leapRange, Math.hypot(tx-this.x, ty-this.y));
        const ex = Math.max(this.size, Math.min(game.worldW-this.size, this.x + Math.cos(la)*ld));
        const ey = Math.max(this.size, Math.min(game.worldH-this.size, this.y + Math.sin(la)*ld));
        // 跳跃动画 0.25秒
        this.skillAnim = { active:true, type:'leap', startX:this.x, startY:this.y, endX:ex, endY:ey, prog:0, dur:0.25 };
        this._aoeHit(ex, ey, this.size+45, this.curAtk*sk.dmgMult, {stun:sk.stun});
        game.par.explosion(ex-game.cam.x, ey-game.cam.y,'#e74c3c',14);
        break;
      }
      case 'stealth':
        this.invisTimer = sk.duration;
        this.nextAtkMult = sk.nextAtkMult;
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#1abc9c',45,12);
        break;
      case 'heal':
        this.heal(sk.healAmt);
        this.stunTimer = 0; this.frozenTimer = 0; this.poisonTimer = 0;
        this.defRedMult = 0.05; this.defRedTimer = sk.invDur;
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#8e44ad',55,14);
        break;
      case 'proj':
        game.addProjectile(this, this.x, this.y, tx, ty, sk);
        break;
      case 'cone':
        this._coneHit(tx, ty, sk.angle, sk.range, sk.dmg, {freeze:sk.freezeDur});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#85c1e9', sk.range*0.5, 16);
        break;
      case 'multiHit': {
        let n=0;
        const doHit=()=>{
          if(n>=sk.hits) return;
          this._aoeHit(this.x, this.y, this.size+65, sk.dmgPerHit);
          game.par.burst(this.x-game.cam.x, this.y-game.cam.y,'#f1c40f',6);
          n++;
          setTimeout(doHit, sk.interval);
        };
        doHit();
        break;
      }
      case 'debuff':
        this._debuffArea(this.x, this.y, sk.radius, {speedRed:sk.speedRed, dur:sk.dur});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#f39c12', sk.radius, 18);
        break;
      case 'execute':
        this._executeAtk(tx, ty, sk);
        break;
      case 'teleport': {
        const ta = Math.atan2(ty-this.y, tx-this.x);
        const td = Math.min(sk.range, Math.hypot(tx-this.x, ty-this.y));
        const ex = Math.max(this.size, Math.min(game.worldW-this.size, this.x + Math.cos(ta)*td));
        const ey = Math.max(this.size, Math.min(game.worldH-this.size, this.y + Math.sin(ta)*td));
        game.par.burst(this.x-game.cam.x, this.y-game.cam.y,'#e67e22',10);
        // 传送动画 0.3秒（快速冲刺效果）
        this.skillAnim = { active:true, type:'teleport', startX:this.x, startY:this.y, endX:ex, endY:ey, prog:0, dur:0.3 };
        this._aoeHit(ex, ey, this.size+32, sk.dmg);
        game.par.burst(ex-game.cam.x, ey-game.cam.y,'#e67e22',12);
        break;
      }
      case 'parry':
        this.parrying = true;
        this.parryTimer = sk.window;
        this.parryEff = sk;
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#8e44ad',50,12);
        break;
      case 'spin': {
        let sn=0;
        const doSpin=()=>{
          if(sn>=sk.hits) return;
          this._aoeHit(this.x, this.y, sk.radius, sk.dmgPerHit);
          game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#8e44ad', sk.radius, 8);
          sn++;
          setTimeout(doSpin, sk.dur*1000/sk.hits);
        };
        doSpin();
        break;
      }
      case 'chain':
        this._chainLightning(sk);
        break;
      case 'silence':
        this._debuffArea(this.x, this.y, sk.radius, {silence:true, silDur:sk.silDur});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'#f1c40f', sk.radius, 20);
        break;
      case 'zone':
        game.traps.push({ owner:this, x:tx, y:ty, radius:sk.radius, dps:sk.dmg/6, rootDur:0, life:sk.dur, pull:sk.pullForce });
        game.par.ring(tx-game.cam.x, ty-game.cam.y,'#16a085',sk.radius,16);
        break;
      case 'visionBlock':
        this._debuffArea(this.x, this.y, sk.radius, {speedRed:sk.speedRed, dur:sk.dur});
        game.par.ring(this.x-game.cam.x, this.y-game.cam.y,'rgba(0,0,0,0.8)', sk.radius, 18);
        break;
      case 'summon':
        for (let i=0;i<sk.count;i++) {
          const ma = (i/sk.count)*Math.PI*2;
          game.minions.push({ owner:this, x:this.x+Math.cos(ma)*60, y:this.y+Math.sin(ma)*60,
            hp:sk.minionHp, atk:sk.minionAtk, spd:sk.minionSpd, life:30, atkCd:0 });
        }
        game.par.burst(this.x-game.cam.x, this.y-game.cam.y,'#f39c12',20);
        break;
      case 'trap':
        game.traps.push({ owner:this, x:tx, y:ty, radius:sk.trapRadius, dps:sk.dps, rootDur:sk.rootDur, life:sk.trapLife, pull:0 });
        game.par.burst(tx-game.cam.x, ty-game.cam.y,'#f39c12',10);
        break;
    }
  }

  _aoeHit(cx, cy, radius, dmg, opts={}) {
    const enemies = game.allAlive(this);
    for (const e of enemies) {
      const dx=e.x-cx, dy=e.y-cy, d=Math.hypot(dx,dy);
      if (d <= radius) {
        if (dmg > 0) e.takeDmg(dmg, this);
        if (opts.kb && d>0) { e.x+=(dx/d)*opts.kb*0.05; e.y+=(dy/d)*opts.kb*0.05; }
        if (opts.stun) { e.stunTimer = Math.max(e.stunTimer, opts.stun); }
        if (opts.freeze) { e.frozenTimer = Math.max(e.frozenTimer, opts.freeze); }
        if (opts.poisonDps) e.applyPoison(opts.poisonDps, opts.poisonDur||3);
      }
    }
  }

  _debuffArea(cx, cy, radius, opts={}) {
    const enemies = game.allAlive(this);
    for (const e of enemies) {
      const d=Math.hypot(e.x-cx, e.y-cy);
      if (d <= radius) {
        if (opts.speedRed) { e.speedMult = 1-opts.speedRed; e.speedMultTimer = opts.dur||3; }
        if (opts.silence) { e.silTimer = Math.max(e.silTimer, opts.silDur||3); }
      }
    }
  }

  _coneHit(tx, ty, angleDeg, range, dmg, opts={}) {
    const aimA = Math.atan2(ty-this.y, tx-this.x);
    const half = (angleDeg/2)*Math.PI/180;
    const enemies = game.allAlive(this);
    for (const e of enemies) {
      const dx=e.x-this.x, dy=e.y-this.y, d=Math.hypot(dx,dy);
      if (d<=range) {
        let diff = Math.abs(Math.atan2(dy,dx)-aimA);
        if (diff>Math.PI) diff=Math.PI*2-diff;
        if (diff<=half) {
          e.takeDmg(dmg,this);
          if (opts.freeze) e.frozenTimer=Math.max(e.frozenTimer, opts.freeze);
          game.par.burst(e.x-game.cam.x, e.y-game.cam.y,'#85c1e9',6);
        }
      }
    }
  }

  _executeAtk(tx, ty, sk) {
    const enemies = game.allAlive(this);
    for (const e of enemies) {
      if (Math.hypot(e.x-tx, e.y-ty) < 120) {
        let d = sk.dmg;
        if (e.hp/e.maxHp < sk.thresh) {
          d = sk.dmg * sk.bonusMult;
          if(this.isPlayer) game.ui.msg('💀 斩首！',1200,'#e67e22');
        }
        e.takeDmg(d, this);
        game.par.burst(e.x-game.cam.x, e.y-game.cam.y,'#e67e22',15);
      }
    }
  }

  _chainLightning(sk) {
    const enemies = game.allAlive(this);
    let cur = null, minD = Infinity;
    for (const e of enemies) {
      const d=Math.hypot(e.x-this.x, e.y-this.y);
      if (d<minD) { minD=d; cur=e; }
    }
    const hit = new Set();
    let prevX = this.x-game.cam.x, prevY = this.y-game.cam.y;
    let rem = sk.chains;
    const chain = (from, target) => {
      if (!target||hit.has(target)||rem<=0) return;
      hit.add(target); rem--;
      target.takeDmg(sk.dmg, this);
      game.par.lightning(prevX, prevY, target.x-game.cam.x, target.y-game.cam.y);
      prevX=target.x-game.cam.x; prevY=target.y-game.cam.y;
      let next=null, nd=sk.chainRange;
      for (const e of enemies) {
        if (hit.has(e)) continue;
        const d=Math.hypot(e.x-target.x, e.y-target.y);
        if (d<nd) { nd=d; next=e; }
      }
      setTimeout(()=>chain(target,next),150);
    };
    chain(this, cur);
  }

  evolve(toId) {
    const newD = EVODATA[toId];
    if (!newD) return;
    const req = EVODATA[this.specId].evoReqs[toId];
    for (const [k,v] of Object.entries(req)) this.resources[k] = (this.resources[k]||0)-v;
    const hpPct = this.hp/this.maxHp;
    this.applySpec(newD);
    this.hp = this.maxHp * hpPct;
    this.skillCds=[0,0];
    if (this.isPlayer) {
      game.stats.evoCount++;
      // 查找进化来源
      const fromId = Object.keys(EVODATA).find(k => k !== toId && EVODATA[k].evolvesTo?.includes(toId));
      const fromData = fromId ? EVODATA[fromId] : EVODATA[this.specId] || EVODATA.PRIMORDIAL;
      game.evoAnim = { from: fromData, to: newD, timer: 2.5 };
      game.par.evoEffect(this.x-game.cam.x, this.y-game.cam.y, newD.color);
      sound.playEvolution();
    }
    this._evoNotified = false;
    game.evoPanelOpen = false;
  }


  render(ctx) {
    const sx = this.x, sy = this.y;
    const screenX = sx - game.cam.x, screenY = sy - game.cam.y;
    const CW = ctx.canvas.width, CH = ctx.canvas.height;
    if (screenX<-120||screenX>CW+120||screenY<-120||screenY>CH+120) return;

    if (this.invisTimer>0) ctx.globalAlpha = this.isPlayer ? 0.4 : 0.12;
    if (this.frozenTimer>0) { ctx.shadowBlur=15; ctx.shadowColor='#85c1e9'; }
    if (this.rageTimer>0) { ctx.shadowBlur=20; ctx.shadowColor='#e74c3c'; }

    const t = this.animTime || 0;

    // =============================================
    // 写实风格技能动画增强
    // =============================================
    if (this.skillAnim && this.skillAnim.active) {
      const anim = this.skillAnim;
      const ang = Math.atan2(anim.endY - anim.startY, anim.endX - anim.startX);
      const gx0 = anim.startX - game.cam.x, gy0 = anim.startY - game.cam.y;
      const gxc = this.x - game.cam.x, gyc = this.y - game.cam.y;
      // 根据技能类型确定特效颜色
      const skillColors = {
        dash: { main: '#27ae60', glow: '#2ecc7188', trail: '#a9dfbf44' },
        leap: { main: '#e74c3c', glow: '#e74c3c88', trail: '#f5b7b144' },
        teleport: { main: '#8e44ad', glow: '#9b59b688', trail: '#d7bde244' },
      };
      const cols = skillColors[anim.type] || skillColors.dash;
      const prog = anim.prog;
      const easeOut = 1 - Math.pow(1 - prog, 2);

      // 起点光晕爆炸
      ctx.save();
      const pulseR = this.size * (2 + prog * 3);
      const pulseG = ctx.createRadialGradient(gx0, gy0, 0, gx0, gy0, pulseR);
      pulseG.addColorStop(0, cols.glow);
      pulseG.addColorStop(0.4, cols.main + '44');
      pulseG.addColorStop(1, cols.main + '00');
      ctx.fillStyle = pulseG;
      ctx.globalAlpha = (1 - prog) * 0.6;
      ctx.beginPath(); ctx.arc(gx0, gy0, pulseR, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // 速度线（轨迹两侧）
      ctx.save();
      ctx.globalAlpha = 0.25 * (1 - prog * 0.5);
      const lineLen = Math.hypot(gxc - gx0, gyc - gy0);
      const perpX = -(gyc - gy0) / lineLen, perpY = (gxc - gx0) / lineLen;
      const lineW = this.size * 1.2;
      ctx.strokeStyle = cols.main; ctx.lineWidth = 2; ctx.lineCap = 'round';
      for (let li = 0; li < 6; li++) {
        const lt = li / 6;
        const lx = gx0 + (gxc - gx0) * lt, ly = gy0 + (gyc - gy0) * lt;
        const lw = lineW * lt * (1 - lt * 0.5);
        ctx.beginPath();
        ctx.moveTo(lx + perpX * lw, ly + perpY * lw);
        ctx.lineTo(lx - perpX * lw, ly - perpY * lw);
        ctx.stroke();
      }
      ctx.restore();

      // 轨迹渐变光带
      ctx.save();
      const trailG = ctx.createLinearGradient(gx0, gy0, gxc, gyc);
      trailG.addColorStop(0, cols.trail);
      trailG.addColorStop(1, cols.main + '22');
      ctx.strokeStyle = trailG;
      ctx.lineWidth = this.size * 1.4 * (1 - prog * 0.5);
      ctx.lineCap = 'round';
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(gx0, gy0); ctx.lineTo(gxc, gyc); ctx.stroke();
      ctx.restore();

      // 多层级残影（淡出）
      for (let gi = 3; gi >= 1; gi--) {
        ctx.save();
        ctx.globalAlpha = (0.15 / gi) * (1 - prog);
        const gix = gx0 + (gxc - gx0) * (gi / 4);
        const giy = gy0 + (gyc - gy0) * (gi / 4);
        ctx.translate(gix, giy);
        ctx.rotate(ang + Math.PI / 2);
        const sg = ctx.createRadialGradient(-this.size * 0.1, -this.size * 0.1, 0, 0, 0, this.size * 0.85);
        sg.addColorStop(0, this._lighten(this.color));
        sg.addColorStop(1, this.color);
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.ellipse(0, 0, this.size * 0.85, this.size * 0.52, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      // 终点到达冲击波
      if (prog > 0.85) {
        ctx.save();
        const shockA = (prog - 0.85) / 0.15;
        ctx.globalAlpha = (1 - shockA) * 0.7;
        ctx.strokeStyle = cols.main;
        ctx.lineWidth = 4 * (1 - shockA);
        ctx.beginPath(); ctx.arc(gxc, gyc, this.size * (1 + shockA * 2.5), 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }
    }

    this._drawAnim(ctx, sx, sy, t);

    // =============================================
    // 状态效果身体叠加层（写实效果）
    // =============================================
    // 中毒：绿色毒雾笼罩
    if (this.poisonTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.18 * (this.poisonTimer / 5);
      const pg = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.size * 1.4);
      pg.addColorStop(0, '#27ae60');
      pg.addColorStop(0.6, '#1e8449');
      pg.addColorStop(1, '#27ae6000');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(sx, sy, this.size * 1.4, 0, Math.PI * 2); ctx.fill();
      // 毒气泡
      ctx.globalAlpha = 0.5;
      for (let bi = 0; bi < 5; bi++) {
        const ba = (bi / 5) * Math.PI * 2 + t * 2;
        const br = this.size * 0.6 + Math.sin(t * 4 + bi) * this.size * 0.3;
        const bx2 = sx + Math.cos(ba) * br, by2 = sy + Math.sin(ba) * br;
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.arc(bx2, by2, this.size * 0.06, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
    // 冰冻：蓝色冰霜包裹
    if (this.frozenTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.25 * (this.frozenTimer / 3);
      const ig = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.size * 1.5);
      ig.addColorStop(0, '#85c1e9');
      ig.addColorStop(0.5, '#3498db');
      ig.addColorStop(1, '#3498db00');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.arc(sx, sy, this.size * 1.5, 0, Math.PI * 2); ctx.fill();
      // 冰晶
      ctx.globalAlpha = 0.6;
      ctx.strokeStyle = '#aed6f1'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      for (let ci = 0; ci < 8; ci++) {
        const ca = (ci / 8) * Math.PI * 2 + t;
        const cr = this.size * 1.1 + Math.sin(t * 3 + ci) * this.size * 0.15;
        ctx.beginPath();
        ctx.moveTo(sx + Math.cos(ca) * (this.size * 0.7), sy + Math.sin(ca) * (this.size * 0.7));
        ctx.lineTo(sx + Math.cos(ca) * cr, sy + Math.sin(ca) * cr);
        ctx.stroke();
      }
      ctx.restore();
    }
    // 狂暴：红色火焰光晕
    if (this.rageTimer > 0) {
      ctx.save();
      ctx.globalAlpha = 0.22 * (this.rageTimer / 4);
      const rg = ctx.createRadialGradient(sx, sy, 0, sx, sy, this.size * 1.6);
      rg.addColorStop(0, '#e74c3c');
      rg.addColorStop(0.5, '#c0392b');
      rg.addColorStop(1, '#c0392b00');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(sx, sy, this.size * 1.6, 0, Math.PI * 2); ctx.fill();
      // 火焰粒子
      ctx.globalAlpha = 0.7;
      for (let fi = 0; fi < 6; fi++) {
        const fa = (fi / 6) * Math.PI * 2 + t * 3;
        const fr = this.size * 0.8 + Math.sin(t * 5 + fi * 2) * this.size * 0.2;
        const fx = sx + Math.cos(fa) * fr, fy = sy + Math.sin(fa) * fr;
        ctx.fillStyle = Math.random() > 0.5 ? '#f39c12' : '#e74c3c';
        ctx.beginPath(); ctx.arc(fx, fy, this.size * 0.08, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // 玩家高亮外圈
    if (this.isPlayer) {
      ctx.shadowBlur=0;
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 3;
      ctx.setLineDash([6,3]);
      ctx.beginPath(); ctx.arc(sx, sy, this.size+4, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.shadowBlur=0; ctx.globalAlpha=1;

    // HP条
    const bw=this.size*2.6, bh=6, bx=sx-bw/2, by=sy-this.size-15;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    const pct=Math.max(0,this.hp/this.maxHp);
    ctx.fillStyle = pct>0.5?'#2ecc71':pct>0.25?'#f39c12':'#e74c3c';
    ctx.fillRect(bx,by,bw*pct,bh);

    // 状态图标
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    let si=0;
    if (this.poisonTimer>0) { ctx.fillText('☠',sx+this.size+4,sy-this.size+5); si++; }
    if (this.frozenTimer>0) { ctx.fillText('❄',sx+this.size+4,sy-this.size+5+si*14); si++; }
    if (this.rageTimer>0)   { ctx.fillText('🔥',sx+this.size+4,sy-this.size+5+si*14); si++; }
    if (this.parrying)      { ctx.fillText('🛡️',sx+this.size+4,sy-this.size+5+si*14); si++; }

    // 地形状态提示（玩家才显示）
    if (this.isPlayer) {
      const ttype = game.getTerrainAt&&game.getTerrainAt(sx,sy);
      const mods = TERRAIN_SPEED_MOD[this.moveType]||TERRAIN_SPEED_MOD.walk;
      const mod = mods[ttype]||1.0;
      if (ttype && ttype !== 'plain' && Math.abs(mod-1.0)>0.05) {
        const terrainLabel = {water:'💧水域',mountain:'⛰️山地',swamp:'🌿沼泽',forest:'🌲森林'}[ttype]||ttype;
        const modStr = mod>1 ? `+${Math.round((mod-1)*100)}%速` : `${Math.round((mod-1)*100)}%速`;
        ctx.fillStyle = mod>1?'#2ecc71':'#e74c3c';
        ctx.font='bold 10px "Microsoft YaHei",sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText(`${terrainLabel} ${modStr}`, sx, by-5);
      }
    }

    // Bot名字
    if (!this.isPlayer) {
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.font='11px "Microsoft YaHei",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText(this.name, sx, sy-this.size-18);
    }
  }

  _drawAnim(ctx, x, y, t) {
    // =====================================================
    // 完整动物 Canvas 渲染系统
    // 每个动物都有：头、身体、四肢（或鳍/翅膀）、尾巴
    // =====================================================
    const sz = (isFinite(this.size) && this.size > 0) ? this.size : 20;
    const ang = isFinite(this.facingAngle) ? this.facingAngle : 0;
    const c = (typeof this.color === 'string' && this.color.startsWith('#')) ? this.color : '#888888';
    const ap = this._atkCdProgress;
    const movePhase = t * 8 + (isFinite(this.id) ? this.id : 0) * 0.5; // 移动动画相位
    // 全局安全值：确保所有梯度坐标都是有限数字
    const safe = (v, def) => (isFinite(v) && v !== 0) ? v : def;
    const breathe = Math.sin(t * 2.5) * sz * 0.03;
    const bob = breathe;

    ctx.save();
    ctx.translate(x, y + bob);
    ctx.rotate(ang + Math.PI / 2);

    const id = this.specId;

    // ========== 辅助函数 ==========
    const hex2rgb = (hex) => {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return {r, g, b};
    };
    const lighten = (hex, amt = 60) => {
      const {r,g,b} = hex2rgb(hex);
      return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
    };
    const darken = (hex, amt = 80) => {
      const {r,g,b} = hex2rgb(hex);
      return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
    };
    const grad = (x1,y1,x2,y2,col1,col2) => {
      const g = ctx.createLinearGradient(x1,y1,x2,y2);
      g.addColorStop(0,col1); g.addColorStop(1,col2);
      return g;
    };
    const radGrad = (cx,cy,r,col1,col2) => {
      const safeR = Math.max(1, Math.abs(r) || 1);
      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,safeR);
      g.addColorStop(0,col1); g.addColorStop(1,col2);
      return g;
    };
    
    // ========== 伪3D光照参数 ==========
    const lightAngle = -0.6; // 光源方向（光源在左上方）
    const lightX = Math.cos(lightAngle) * 0.7;
    const lightY = Math.sin(lightAngle) * 0.7;
    
    // 3D球面渐变（模拟光照）
    const sphereGrad = (cx, cy, r, intensity = 0.4) => {
      const safeCX = isFinite(cx) ? cx : 0;
      const safeCY = isFinite(cy) ? cy : 0;
      const safeR = safe(Math.abs(r), 20);
      const hx = safeCX - safeR * lightX * 0.5;
      const hy = safeCY - safeR * lightY * 0.5;
      const g = ctx.createRadialGradient(hx, hy, safeR * 0.1, safeCX, safeCY, safeR);
      g.addColorStop(0, lighten(c, Math.round(80 * intensity)));
      g.addColorStop(0.4, c);
      g.addColorStop(1, darken(c, Math.round(100 * intensity)));
      return g;
    };
    
    // 3D圆柱体渐变
    const cylinderGrad = (cx, cy, w, h, intensity = 0.35) => {
      const safeCX = isFinite(cx) ? cx : 0;
      const safeCY = isFinite(cy) ? cy : 0;
      const safeW = safe(Math.abs(w), 15);
      const g = ctx.createLinearGradient(safeCX - safeW, safeCY, safeCX + safeW, safeCY);
      g.addColorStop(0, darken(c, Math.round(80 * intensity)));
      g.addColorStop(0.3, darken(c, Math.round(30 * intensity)));
      g.addColorStop(0.5, lighten(c, Math.round(40 * intensity)));
      g.addColorStop(0.7, c);
      g.addColorStop(1, darken(c, Math.round(60 * intensity)));
      return g;
    };
    
    // 添加高光
    const addHighlight = (hx, hy, r, alpha = 0.4) => {
      const safeHX = isFinite(hx) ? hx : 0;
      const safeHY = isFinite(hy) ? hy : 0;
      const safeR = safe(Math.abs(r), 10);
      const gx = safeHX - safeR * lightX * 0.3;
      const gy = safeHY - safeR * lightY * 0.3;
      const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, safeR * 0.6);
      gr.addColorStop(0, `rgba(255,255,255,${alpha})`);
      gr.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.ellipse(gx, gy, safeR * 0.5, safeR * 0.3, lightAngle, 0, Math.PI * 2);
      ctx.fill();
    };

    // ========== 绘制基础部件函数 ==========
    
    // 画头部（伪3D）
    const drawHead = (hx, hy, hw, hh, eyeColor = '#222') => {
      const safeHX = isFinite(hx) ? hx : 0;
      const safeHY = isFinite(hy) ? hy : 0;
      const safeHW = (isFinite(hw) && hw > 0) ? hw : sz * 0.3;
      const safeHH = (isFinite(hh) && hh > 0) ? hh : sz * 0.25;
      // 球面渐变头部
      ctx.fillStyle = sphereGrad(safeHX, safeHY, safeHW, 0.5);
      ctx.beginPath();
      ctx.ellipse(safeHX, safeHY, safeHW, safeHH, 0, 0, Math.PI * 2);
      ctx.fill();
      // 边缘阴影
      ctx.strokeStyle = darken(c, 40);
      ctx.lineWidth = sz * 0.02;
      ctx.stroke();
      // 高光
      addHighlight(safeHX - safeHW*0.2, safeHY - safeHH*0.3, safeHW * 0.4, 0.35);
      // 眼睛（凹陷效果）
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(safeHX - safeHW*0.35, safeHY - safeHH*0.15, safeHW*0.2, safeHH*0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(safeHX + safeHW*0.35, safeHY - safeHH*0.15, safeHW*0.2, safeHH*0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      // 眼珠
      ctx.fillStyle = eyeColor;
      ctx.beginPath(); ctx.arc(safeHX - safeHW*0.35, safeHY - safeHH*0.1, safeHW*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(safeHX + safeHW*0.35, safeHY - safeHH*0.1, safeHW*0.08, 0, Math.PI*2); ctx.fill();
      // 眼珠高光
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(safeHX - safeHW*0.33, safeHY - safeHH*0.15, safeHW*0.03, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(safeHX + safeHW*0.33, safeHY - safeHH*0.15, safeHW*0.03, 0, Math.PI*2); ctx.fill();
    };
    
    // 画耳朵（伪3D）
    const drawEars = (ex, ey, ew, eh, type = 'pointed') => {
      // 左耳
      ctx.fillStyle = cylinderGrad(ex - ew, ey - eh*0.5, ew*0.6, eh, 0.3);
      ctx.beginPath();
      if (type === 'round') {
        ctx.ellipse(ex - ew, ey, ew*0.6, eh, -0.3, 0, Math.PI*2);
      } else {
        ctx.moveTo(ex - ew*0.5, ey);
        ctx.lineTo(ex - ew, ey - eh);
        ctx.lineTo(ex - ew*0.2, ey);
      }
      ctx.fill();
      ctx.strokeStyle = darken(c, 30); ctx.lineWidth = sz*0.015; ctx.stroke();
      // 右耳
      ctx.fillStyle = cylinderGrad(ex + ew, ey - eh*0.5, ew*0.6, eh, 0.3);
      ctx.beginPath();
      if (type === 'round') {
        ctx.ellipse(ex + ew, ey, ew*0.6, eh, 0.3, 0, Math.PI*2);
      } else {
        ctx.moveTo(ex + ew*0.5, ey);
        ctx.lineTo(ex + ew, ey - eh);
        ctx.lineTo(ex + ew*0.2, ey);
      }
      ctx.fill();
      ctx.stroke();
    };
    
    // 画四肢（伪3D圆柱体）
    const drawLeg = (lx, ly, len, thick, phase, bent = 0.4) => {
      const safeLX = isFinite(lx) ? lx : 0;
      const safeLY = isFinite(ly) ? ly : 0;
      const safeLen = (isFinite(len) && len > 0) ? len : sz * 0.5;
      const safeThick = (isFinite(thick) && thick > 0) ? thick : 4;
      const swing = isFinite(phase) ? Math.sin(phase) * sz * bent : 0;
      // 创建腿部渐变（所有坐标必须有限）
      const gx1 = safe(safeLX - safeThick, 0);
      const gy1 = safe(safeLY, 0);
      const gx2 = safe(safeLX + safeThick, safeThick * 2);
      const gy2 = gy1;
      const legGrad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
      legGrad.addColorStop(0, darken(c, 60));
      legGrad.addColorStop(0.3, darken(c, 20));
      legGrad.addColorStop(0.5, lighten(c, 30));
      legGrad.addColorStop(0.7, c);
      legGrad.addColorStop(1, darken(c, 40));
      
      ctx.strokeStyle = legGrad;
      ctx.lineWidth = safe(safeThick, 4);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(safeLX, safeLY);
      const midX = safe(safeLX + swing * 0.3, safeLX);
      const midY = safe(safeLY + safeLen * 0.5, safeLY + safeLen * 0.5);
      const endX = safe(safeLX + swing, safeLX);
      const endY = safe(safeLY + safeLen, safeLY + safeLen);
      ctx.quadraticCurveTo(midX, midY, endX, endY);
      ctx.stroke();
      // 爪子/蹄子（伪3D）
      const clawR = safe(safeThick * 0.8, 4);
      ctx.fillStyle = sphereGrad(safe(endX, safeLX), safe(endY, safeLY), clawR, 0.3);
      ctx.beginPath();
      ctx.ellipse(safe(endX, safeLX), safe(endY, safeLY), clawR, safe(safeThick * 0.5, 2), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = darken(c, 50); ctx.lineWidth = sz * 0.015; ctx.stroke();
      ctx.lineCap = 'butt';
    };
    
    // 画尾巴（伪3D）
    const drawTail = (tx, ty, len, thick, phase, curve = 0.3) => {
      const safeTX = isFinite(tx) ? tx : 0;
      const safeTY = isFinite(ty) ? ty : 0;
      const safeTLen = (isFinite(len) && len > 0) ? len : sz * 0.4;
      const safeTThick = (isFinite(thick) && thick > 0) ? thick : 3;
      const wave = isFinite(phase) ? Math.sin(phase * 1.5) * sz * curve : 0;
      const tailEndX = safeTX + wave * 1.5;
      const tailEndY = safeTY + safeTLen;
      // 所有渐变坐标必须有限
      const tailGrad = ctx.createLinearGradient(
        safeTX, safeTY,
        safe(tailEndX, safeTX + 1), safe(tailEndY, safeTY + safeTLen)
      );
      tailGrad.addColorStop(0, c);
      tailGrad.addColorStop(1, lighten(c, 20));
      
      ctx.strokeStyle = tailGrad;
      ctx.lineWidth = safe(safeTThick, 3);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(safeTX, safeTY);
      const ctrlX = safe(safeTX + wave, safeTX);
      const ctrlY = safe(safeTY + safeTLen * 0.5, safeTY + safeTLen * 0.5);
      const endX = safe(tailEndX, safeTX + 1);
      const endY = safe(tailEndY, safeTY + safeTLen);
      ctx.quadraticCurveTo(ctrlX, ctrlY, endX, endY);
      ctx.stroke();
      // 尾巴尖
      const tipR = safe(safeTThick * 1.2, 4);
      ctx.fillStyle = sphereGrad(endX, endY, tipR, 0.4);
      ctx.beginPath();
      ctx.ellipse(endX, endY, tipR, safe(safeTThick * 0.8, 2), 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineCap = 'butt';
    };

    // ========== 根据物种类型绘制完整动物 ==========
    
    // === 四足动物：鹿、狼、狮子、猛犸、剑齿虎 ===
    if (id === 'HERBIVORE' || id === 'CARNIVORE' || id === 'DIRE_WOLF' || id === 'MAMMOTH' || id === 'SABERTOOTH' || id === 'HERB_CUB' || id === 'HUNT_CUB') {
      const isHerb = id === 'HERBIVORE' || id === 'HERB_CUB';
      const isGiant = id === 'MAMMOTH';
      const hasHorns = id === 'HERBIVORE';
      const hasTusks = id === 'MAMMOTH' || id === 'SABERTOOTH';
      const isCub = id === 'HERB_CUB' || id === 'HUNT_CUB';
      const legLen = isGiant ? sz * 1.1 : (isCub ? sz * 0.6 : sz * 0.85);
      const bodyW = isGiant ? sz * 1.5 : (isCub ? sz * 0.7 : sz * 1.0);
      const bodyH = isGiant ? sz * 0.9 : (isCub ? sz * 0.5 : sz * 0.65);
      
      // 后腿（后面画，透明度低一些）
      ctx.globalAlpha = 0.7;
      drawLeg(-bodyW*0.35, bodyH*0.3, legLen*0.8, sz*0.18, movePhase + Math.PI, 0.3);
      drawLeg(bodyW*0.35, bodyH*0.3, legLen*0.8, sz*0.18, movePhase + Math.PI, 0.3);
      ctx.globalAlpha = 1;
      
      // 尾巴
      drawTail(bodyW*0.5, bodyH*0.1, sz*0.6, sz*0.12, movePhase * 0.5, 0.4);
      
      // 身体（伪3D球面）
      ctx.fillStyle = sphereGrad(0, 0, bodyW, 0.45);
      ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // 身体边缘描边
      ctx.strokeStyle = darken(c, 30); ctx.lineWidth = sz*0.02; ctx.stroke();
      
      // 脖子（伪3D圆柱）
      ctx.fillStyle = cylinderGrad(0, -bodyH*0.7, sz*0.35, sz*0.45, 0.35);
      ctx.beginPath();
      ctx.ellipse(0, -bodyH*0.7, sz*0.35, sz*0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = darken(c, 25); ctx.lineWidth = sz*0.015; ctx.stroke();
      
      // 前腿
      drawLeg(-bodyW*0.35, bodyH*0.1, legLen, sz*0.2, movePhase, 0.35);
      drawLeg(bodyW*0.35, bodyH*0.1, legLen, sz*0.2, movePhase + Math.PI, 0.35);
      
      // 头部
      const headW = isCub ? sz*0.4 : sz*0.5;
      const headH = isCub ? sz*0.35 : sz*0.45;
      drawHead(0, -bodyH*1.1, headW, headH, isHerb ? '#333' : '#ff6600');
      
      // 耳朵
      if (!isHerb) drawEars(0, -bodyH*1.4, sz*0.25, sz*0.35, 'round');
      else drawEars(0, -bodyH*1.35, sz*0.2, sz*0.3, 'pointed');
      
      // 鼻子（伪3D）
      ctx.fillStyle = sphereGrad(0, -bodyH*1.1 - headH*0.7, headW*0.25, 0.3);
      ctx.beginPath();
      ctx.ellipse(0, -bodyH*1.1 - headH*0.7, headW*0.25, headH*0.2, 0, 0, Math.PI*2);
      ctx.fill();
      // 鼻子高光
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(-headW*0.08, -bodyH*1.1 - headH*0.8, headW*0.08, headH*0.08, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 鹿角
      if (hasHorns) {
        ctx.strokeStyle = '#8B6914'; ctx.lineWidth = sz*0.08; ctx.lineCap = 'round';
        // 左角
        ctx.beginPath(); ctx.moveTo(-headW*0.5, -bodyH*1.1 - headH*0.5);
        ctx.lineTo(-headW*0.8, -bodyH*1.1 - headH*1.2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-headW*0.65, -bodyH*1.1 - headH*0.9);
        ctx.lineTo(-headW*1.0, -bodyH*1.1 - headH*0.8); ctx.stroke();
        // 右角
        ctx.beginPath(); ctx.moveTo(headW*0.5, -bodyH*1.1 - headH*0.5);
        ctx.lineTo(headW*0.8, -bodyH*1.1 - headH*1.2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(headW*0.65, -bodyH*1.1 - headH*0.9);
        ctx.lineTo(headW*1.0, -bodyH*1.1 - headH*0.8); ctx.stroke();
        ctx.lineCap = 'butt';
      }
      
      // 象牙
      if (hasTusks) {
        ctx.strokeStyle = '#FFFFF0'; ctx.lineWidth = sz*0.1; ctx.lineCap = 'round';
        ctx.shadowBlur = 5; ctx.shadowColor = '#FFFFF088';
        ctx.beginPath();
        ctx.moveTo(-headW*0.4, -bodyH*1.1 - headH*0.3);
        ctx.quadraticCurveTo(-headW*0.8, -bodyH*0.5, -headW*0.5, sz*0.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(headW*0.4, -bodyH*1.1 - headH*0.3);
        ctx.quadraticCurveTo(headW*0.8, -bodyH*0.5, headW*0.5, sz*0.2);
        ctx.stroke();
        ctx.shadowBlur = 0; ctx.lineCap = 'butt';
      }
      
      // 猛犸长毛
      if (id === 'MAMMOTH') {
        ctx.strokeStyle = c; ctx.lineWidth = sz*0.06; ctx.globalAlpha = 0.6;
        for (let mi = 0; mi < 12; mi++) {
          const ma = Math.PI * 0.15 + (mi / 12) * Math.PI * 0.7;
          const mx = Math.cos(ma) * bodyW * 0.9, my = Math.sin(ma) * bodyH * 0.7;
          ctx.beginPath(); ctx.moveTo(mx, my);
          ctx.lineTo(mx + Math.cos(ma) * sz*0.5, my + Math.sin(ma) * sz*0.5);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
    }
    
    // === 恐龙：迅猛龙 ===
    else if (id === 'RAPTOR') {
      const bodyW = sz * 1.0, bodyH = sz * 0.5;
      
      // 后腿（大）
      ctx.globalAlpha = 0.7;
      drawLeg(bodyW*0.3, bodyH*0.3, sz*0.9, sz*0.15, movePhase + Math.PI, 0.4);
      ctx.globalAlpha = 1;
      
      // 尾巴（长）
      ctx.strokeStyle = c; ctx.lineWidth = sz*0.15; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-bodyW*0.5, 0);
      const tailWave = Math.sin(movePhase) * sz*0.3;
      ctx.quadraticCurveTo(-bodyW*1.2, tailWave*0.5, -bodyW*1.8, tailWave);
      ctx.stroke(); ctx.lineCap = 'butt';
      
      // 身体
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 前腿（小）
      drawLeg(bodyW*0.3, bodyH*0.1, sz*0.5, sz*0.1, movePhase, 0.25);
      
      // 头部
      const headW = sz*0.45, headH = sz*0.35;
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(bodyW*0.8, -bodyH*0.2, headW, headH, -0.3, 0, Math.PI*2);
      ctx.fill();

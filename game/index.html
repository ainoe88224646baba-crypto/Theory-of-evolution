        ctx.beginPath();
        ctx.moveTo(bodyLen*0.7 + tongueLen, 0);
        ctx.lineTo(bodyLen*0.7 + tongueLen + sz*0.1, -sz*0.08);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bodyLen*0.7 + tongueLen, 0);
        ctx.lineTo(bodyLen*0.7 + tongueLen + sz*0.1, sz*0.08);
        ctx.stroke();
      }
      ctx.lineCap = 'butt';
      
      // 三角形花纹
      ctx.fillStyle = darken(c, 60);
      for (let di = 0; di < 6; di++) {
        const dx = bodyLen*0.3 - di*sz*0.35;
        const dy = Math.sin(movePhase*0.8 + di*0.6) * sz*0.3;
        ctx.beginPath();
        ctx.moveTo(dx, dy - sz*0.2);
        ctx.lineTo(dx + sz*0.12, dy);
        ctx.lineTo(dx, dy + sz*0.2);
        ctx.closePath(); ctx.fill();
      }
    }
    
    // === 鲸鱼/利维坦 ===
    else if (id === 'LEVIATHAN') {
      const bodyLen = sz * 3.0;
      // 身体
      ctx.fillStyle = c;
      ctx.beginPath();
      for (let si = 0; si <= 16; si++) {
        const t = si / 16;
        const sx = bodyLen*0.5 - t*bodyLen;
        const sy = Math.sin(t * Math.PI) * sz*0.4; // 中间粗两头细
        if (si === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
      }
      ctx.lineTo(-bodyLen*0.5, 0);
      ctx.closePath();
      ctx.fill();
      
      // 尾巴
      const tailWave = Math.sin(movePhase) * sz*0.2;
      ctx.fillStyle = darken(c);
      ctx.beginPath();
      ctx.moveTo(-bodyLen*0.45, 0);
      ctx.lineTo(-bodyLen*0.7, -sz*0.4 + tailWave);
      ctx.lineTo(-bodyLen*0.6, 0);
      ctx.lineTo(-bodyLen*0.7, sz*0.4 + tailWave);
      ctx.closePath(); ctx.fill();
      
      // 鳍
      ctx.fillStyle = darken(c);
      ctx.beginPath();
      ctx.moveTo(bodyLen*0.1, -sz*0.35);
      ctx.lineTo(-sz*0.1, -sz*0.8);
      ctx.lineTo(-sz*0.3, -sz*0.35);
      ctx.closePath(); ctx.fill();
      
      // 头
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(bodyLen*0.4, 0, sz*0.5, sz*0.4, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 眼睛
      ctx.fillStyle = '#3498db';
      ctx.beginPath(); ctx.arc(bodyLen*0.55, -sz*0.12, sz*0.1, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(bodyLen*0.55, -sz*0.12, sz*0.04, 0, Math.PI*2); ctx.fill();
    }
    
    // === 蝙蝠/暗影潜行者 ===
    else if (id === 'SHADOW_STALKER') {
      const bodyW = sz * 0.5, bodyH = sz * 0.3;
      const wingFlap = Math.sin(movePhase * 6) * sz*0.25;
      
      // 翅膀膜
      ctx.fillStyle = darken(c) + 'cc';
      // 左翼
      ctx.beginPath();
      ctx.moveTo(-bodyW*0.3, 0);
      ctx.quadraticCurveTo(-bodyW*2.0, -bodyH*2.5 + wingFlap, -bodyW*2.5, wingFlap);
      ctx.quadraticCurveTo(-bodyW*1.5, bodyH*0.5, -bodyW*0.3, bodyH*0.3);
      ctx.fill();
      // 右翼
      ctx.beginPath();
      ctx.moveTo(bodyW*0.3, 0);
      ctx.quadraticCurveTo(bodyW*2.0, -bodyH*2.5 - wingFlap, bodyW*2.5, -wingFlap);
      ctx.quadraticCurveTo(bodyW*1.5, bodyH*0.5, bodyW*0.3, bodyH*0.3);
      ctx.fill();
      
      // 身体
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 头
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(bodyW*0.4, 0, sz*0.25, 0, Math.PI*2);
      ctx.fill();
      
      // 耳朵（蝙蝠耳）
      ctx.fillStyle = darken(c);
      ctx.beginPath();
      ctx.moveTo(bodyW*0.3, -sz*0.2);
      ctx.lineTo(bodyW*0.15, -sz*0.55);
      ctx.lineTo(bodyW*0.45, -sz*0.2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(bodyW*0.5, -sz*0.2);
      ctx.lineTo(bodyW*0.65, -sz*0.55);
      ctx.lineTo(bodyW*0.6, -sz*0.2);
      ctx.fill();
      
      // 眼睛（红光）
      ctx.fillStyle = '#ff0000';
      ctx.shadowBlur = 8; ctx.shadowColor = '#ff0000';
      ctx.beginPath(); ctx.arc(bodyW*0.5, -sz*0.05, sz*0.07, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bodyW*0.35, -sz*0.05, sz*0.07, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // === 传说生物：大地守卫 ===
    else if (id === 'EARTH_GUARDIAN' || id === 'ANCIENT_TITAN') {
      const bodyW = sz * 1.4, bodyH = sz * 1.0;
      
      // 发光背景
      ctx.fillStyle = '#4caf5033';
      ctx.shadowBlur = 30; ctx.shadowColor = '#4caf50';
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW*1.2, bodyH*1.1, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 腿
      ctx.fillStyle = darken(c);
      ctx.fillRect(-bodyW*0.5, bodyH*0.3, sz*0.5, sz*1.0);
      ctx.fillRect(bodyW*0.0, bodyH*0.3, sz*0.5, sz*1.0);
      // 脚
      ctx.beginPath();
      ctx.ellipse(-bodyW*0.25, bodyH*1.3, sz*0.4, sz*0.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(bodyW*0.25, bodyH*1.3, sz*0.4, sz*0.2, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 身体（岩石质感）
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
      ctx.fill();
      // 裂纹
      ctx.strokeStyle = darken(c, 40); ctx.lineWidth = sz*0.04;
      ctx.beginPath(); ctx.moveTo(-sz*0.3, -sz*0.5); ctx.lineTo(sz*0.2, sz*0.3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sz*0.4, -sz*0.3); ctx.lineTo(sz*0.1, sz*0.5); ctx.stroke();
      
      // 头
      ctx.fillStyle = lighten(c, 20);
      ctx.beginPath();
      ctx.ellipse(0, -bodyH*0.8, sz*0.6, sz*0.5, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 眼睛（发光）
      ctx.fillStyle = '#8bc34a';
      ctx.shadowBlur = 10; ctx.shadowColor = '#8bc34a';
      ctx.beginPath(); ctx.arc(-sz*0.2, -bodyH*0.85, sz*0.1, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sz*0.2, -bodyH*0.85, sz*0.1, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // === 死神领主 ===
    else if (id === 'DEATHLORD' || id === 'DEATH_GOD') {
      const bodyW = sz * 0.6, bodyH = sz * 0.9;
      
      // 斗篷
      ctx.fillStyle = darken(c);
      ctx.beginPath();
      ctx.moveTo(0, -bodyH*0.5);
      ctx.quadraticCurveTo(-bodyW*1.5, 0, -bodyW*0.8, bodyH*1.2);
      ctx.lineTo(bodyW*0.8, bodyH*1.2);
      ctx.quadraticCurveTo(bodyW*1.5, 0, 0, -bodyH*0.5);
      ctx.fill();
      
      // 身体（骷髅）
      ctx.fillStyle = '#f5f5dc';
      ctx.beginPath();
      ctx.ellipse(0, -bodyH*0.2, bodyW*0.5, bodyH*0.4, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 头骨
      ctx.beginPath();
      ctx.arc(0, -bodyH*0.7, sz*0.4, 0, Math.PI*2);
      ctx.fill();
      
      // 眼窝
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(-sz*0.15, -bodyH*0.75, sz*0.12, sz*0.15, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sz*0.15, -bodyH*0.75, sz*0.12, sz*0.15, 0, 0, Math.PI*2); ctx.fill();
      // 发光眼珠
      ctx.fillStyle = id === 'DEATH_GOD' ? '#ff1744' : '#880e4f';
      ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle;
      ctx.beginPath(); ctx.arc(-sz*0.15, -bodyH*0.75, sz*0.05, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sz*0.15, -bodyH*0.75, sz*0.05, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
      
      // 鼻子
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.moveTo(0, -bodyH*0.68);
      ctx.lineTo(-sz*0.05, -bodyH*0.62);
      ctx.lineTo(sz*0.05, -bodyH*0.62);
      ctx.fill();
      
      // 镰刀
      ctx.strokeStyle = id === 'DEATH_GOD' ? '#ff1744' : '#880e4f';
      ctx.lineWidth = sz*0.12; ctx.lineCap = 'round';
      ctx.shadowBlur = 10; ctx.shadowColor = ctx.strokeStyle;
      ctx.beginPath();
      ctx.moveTo(-bodyW*0.6, bodyH*0.3);
      ctx.lineTo(-bodyW*0.3, -bodyH*0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-bodyW*0.45, -bodyH*0.3);
      ctx.quadraticCurveTo(-bodyW*0.9, -bodyH*0.2, -bodyW*0.7, bodyH*0.1);
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.lineCap = 'butt';
    }
    
    // === 海洋帝王 ===
    else if (id === 'SEA_EMPEROR' || id === 'OCEAN_GOD') {
      const bodyW = sz * 1.0, bodyH = sz * 0.5;
      
      // 水波背景
      ctx.fillStyle = '#2196f333';
      ctx.shadowBlur = 25; ctx.shadowColor = '#2196f3';
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW*1.3, bodyH*1.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 尾巴
      const tailWave = Math.sin(movePhase) * sz*0.15;
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(-bodyW*0.5, 0);
      ctx.lineTo(-bodyW*1.2, -sz*0.4 + tailWave);
      ctx.lineTo(-bodyW*0.9, 0);
      ctx.lineTo(-bodyW*1.2, sz*0.4 + tailWave);
      ctx.closePath(); ctx.fill();
      
      // 身体
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 胸鳍
      ctx.fillStyle = lighten(c);
      ctx.beginPath();
      ctx.ellipse(-bodyW*0.2, bodyH*0.7, sz*0.4, sz*0.15, 0.3, 0, Math.PI*2);
      ctx.fill();
      
      // 头
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(bodyW*0.6, 0, sz*0.5, sz*0.4, 0, 0, Math.PI*2);
      ctx.fill();
      
      // 皇冠
      ctx.fillStyle = '#ffd700';
      ctx.shadowBlur = 12; ctx.shadowColor = '#ffd700';
      ctx.beginPath();
      ctx.moveTo(bodyW*0.3, -bodyH*0.5);
      ctx.lineTo(bodyW*0.2, -sz*0.9);
      ctx.lineTo(bodyW*0.4, -sz*0.7);
      ctx.lineTo(bodyW*0.5, -sz*1.0);
      ctx.lineTo(bodyW*0.6, -sz*0.7);
      ctx.lineTo(bodyW*0.8, -sz*0.9);
      ctx.lineTo(bodyW*0.7, -bodyH*0.5);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
      
      // 眼睛
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(bodyW*0.8, -sz*0.1, sz*0.08, 0, Math.PI*2); ctx.fill();
    }
    
    // === 虚空克拉肯 ===
    else if (id === 'VOID_KRAKEN' || id === 'ABYSS_LORD') {
      const bodyR = sz * 0.6;
      
      // 触手
      ctx.strokeStyle = darken(c); ctx.lineWidth = sz*0.18; ctx.lineCap = 'round';
      for (let ti = 0; ti < 8; ti++) {
        const ta = (ti/8) * Math.PI*2 + movePhase*0.3;
        const swing = Math.sin(movePhase*2 + ti*1.5) * sz*0.3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ta)*bodyR*0.5, Math.sin(ta)*bodyR*0.5);
        ctx.quadraticCurveTo(
          Math.cos(ta)*bodyR*1.2 + swing,
          Math.sin(ta)*bodyR*0.8,
          Math.cos(ta)*bodyR*1.8,
          Math.sin(ta)*bodyR*1.5 + sz*0.3
        );
        ctx.stroke();
      }
      ctx.lineCap = 'butt';
      
      // 身体
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(0, 0, bodyR, 0, Math.PI*2);
      ctx.fill();
      
      // 眼睛
      ctx.fillStyle = '#9c27b0';
      ctx.shadowBlur = 15; ctx.shadowColor = '#9c27b0';
      ctx.beginPath(); ctx.arc(-bodyR*0.35, -bodyR*0.1, bodyR*0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bodyR*0.35, -bodyR*0.1, bodyR*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-bodyR*0.35, -bodyR*0.1, bodyR*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(bodyR*0.35, -bodyR*0.1, bodyR*0.08, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // === 始祖生物 ===
    else if (id === 'PRIMORDIAL') {
      // 简单的圆形细胞
      ctx.fillStyle = c;
      ctx.shadowBlur = 15; ctx.shadowColor = c + '88';
      ctx.beginPath();
      ctx.arc(0, 0, sz*0.7, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 细胞核
      ctx.fillStyle = darken(c);
      ctx.beginPath();
      ctx.arc(sz*0.15, sz*0.1, sz*0.25, 0, Math.PI*2);
      ctx.fill();
      
      // 纤毛
      ctx.strokeStyle = lighten(c); ctx.lineWidth = sz*0.03;
      for (let ci = 0; ci < 12; ci++) {
        const ca = (ci/12) * Math.PI*2 + movePhase;
        const cx = Math.cos(ca) * sz*0.7;
        const cy = Math.sin(ca) * sz*0.7;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(ca)*sz*0.2, cy + Math.sin(ca)*sz*0.2);
        ctx.stroke();
      }
    }
    
    // === 默认/未匹配的物种 ===
    else {
      ctx.fillStyle = c;
      ctx.shadowBlur = 12; ctx.shadowColor = c + '66';
      ctx.beginPath();
      ctx.arc(0, 0, sz*0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // 简单眼睛
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-sz*0.25, -sz*0.1, sz*0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sz*0.25, -sz*0.1, sz*0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(-sz*0.25, -sz*0.08, sz*0.08, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sz*0.25, -sz*0.08, sz*0.08, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();
  }
}

// ==================== 游戏主体 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1440, H = 900;

const game = {
  worldW: 6000, worldH: 6000,
  cam: { x:0, y:0 },
  state: 'menu',
  keys: {}, mouse: { x:0, y:0, btn: {} },
  skillKeyHeld: -1,
  skillAimMode: -1,   // 手机两步技能：-1=未瞄准, 0/1=正在瞄准第N技能
  skillAimTouchX: 0,  // 瞄准模式下触控世界坐标
  skillAimTouchY: 0,
  // PC两步技能：Q/E按下显示范围，鼠标点击确认
  pcSkillAim: -1,     // -1=未瞄准, 0/1=正在瞄准第N技能
  // 手机触控
  isMobile: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0),
  joyStick: { active: false, touchId: null, baseX: 0, baseY: 0, curX: 0, curY: 0 },
  mobileSkillTouch: [null, null], // [{touchId, idx}, ...]
  lastTap: 0,
  player: null,
  bots: [],
  drops: [],
  projectiles: [],
  traps: [],
  minions: [],
  par: new Particles(),
  stats: { kills:0, evoCount:0, resCollected:0, time:0 },
  safeZone: { x:3000,y:3000,radius:2700,shrinkRate:0.06,shrinkStart:90,timer:0,dps:4,phase:0 },
  terrain: [],
  waterZones: [],
  evoPanelOpen: false,
  evoAnim: null,
  // 天灾系统
  disasterTimer: 0,       // 距离下次天灾的时间
  disasterInterval: 15,  // 天灾间隔（秒）
  disasters: [],         // 当前激活的天灾
  // 技能指示器
  skillIndicator: null, // { type, x, y, data, alpha }
  ui: null,
  lastTime: 0,
  aliveCount: 40,
  resSpawnTimer: 0,

  // 技能指示器：计算鼠标/触控位置对应的技能范围
  updateSkillIndicator() {
    const p = this.player;
    if (!p || !p.alive) { this.skillIndicator = null; return; }

    // 手机或PC瞄准模式：获取鼠标/触控世界坐标
    const inMobileAim = this.isMobile && this.skillAimMode >= 0;
    const inPcAim = !this.isMobile && this.pcSkillAim >= 0;
    const inAimMode = inMobileAim || inPcAim;
    const mx = inMobileAim ? this.skillAimTouchX : (this.mouse.x + this.cam.x);
    const my = inMobileAim ? this.skillAimTouchY : (this.mouse.y + this.cam.y);
    const sk = p.spec.skills;

    // 查找哪个技能有指示器
    for (let i = 0; i < 2; i++) {
      const s = sk[i];
      if (!s) continue;
      // 所有需要显示指示器的技能类型
      const typeMap = {
        'dash': true, 'aoe': true, 'aoePoison': true, 'leap': true,
        'cone': true, 'zone': true, 'trap': true, 'stealth': true,
        'debuff': true, 'silence': true, 'visionBlock': true,
        'execute': true, 'teleport': true,
        'proj': true, 'multiHit': true,
        'shield': true, 'slow': true, 'speedBoost': true
      };
      if (!typeMap[s.type]) continue;

      // PC：鼠标悬停在按钮上 或 按住Q/E键 显示指示器
      // 手机：处于该技能瞄准模式时显示
      const hudY = H - 128;
      const btnX = W / 2 - 60 + i * 160;
      const mouseOverBtn = !this.isMobile &&
                          (Math.abs(this.mouse.x - btnX) < 60 &&
                          Math.abs(this.mouse.y - (hudY + 55)) < 55);
      const active = mouseOverBtn || this.skillKeyHeld === i ||
                     (this.isMobile && this.skillAimMode === i) ||
                     (!this.isMobile && this.pcSkillAim === i);
      if (!active) continue;

      // 瞄准模式时用鼠标世界坐标，否则用面朝方向
      const aimX = (this.isMobile && this.skillAimMode === i) || (!this.isMobile && this.pcSkillAim === i) ? mx : p.x + Math.cos(p.facingAngle) * 200;
      const aimY = (this.isMobile && this.skillAimMode === i) || (!this.isMobile && this.pcSkillAim === i) ? my : p.y + Math.sin(p.facingAngle) * 200;

      let indicator = null;
      switch (s.type) {
        case 'aoe': case 'aoePoison': case 'debuff': case 'silence': case 'visionBlock':
          // 以玩家为中心的圆形范围
          indicator = { type: 'circle', x: p.x, y: p.y, radius: s.radius || 150, color: s.type === 'aoePoison' ? '#2ecc71' : '#f1c40f', alpha: 0.3 };
          break;
        case 'cone':
          indicator = { type: 'cone', x: p.x, y: p.y, tx: aimX, ty: aimY, angle: s.angle || 60, range: s.range || 200, color: '#85c1e9', alpha: 0.3 };
          break;
        case 'execute':
          indicator = { type: 'circle', x: aimX, y: aimY, radius: s.radius || 120, color: '#e67e22', alpha: 0.25 };
          break;
        case 'leap': case 'teleport':
          indicator = { type: 'circle', x: aimX, y: aimY, radius: s.radius || 50, color: '#e74c3c', alpha: 0.3 };
          break;
        case 'dash': {
          // 瞄准模式下朝鼠标方向，否则朝面朝方向
          const dashDist = s.dashDist || s.range || 200;
          const ang = (this.isMobile && this.skillAimMode === i) || (!this.isMobile && this.pcSkillAim === i)
                       ? Math.atan2(my - p.y, mx - p.x)
                       : p.facingAngle;
          const dashEndX = p.x + Math.cos(ang) * dashDist;
          const dashEndY = p.y + Math.sin(ang) * dashDist;
          indicator = { type: 'line', x1: p.x, y1: p.y, x2: dashEndX, y2: dashEndY, color: '#27ae60', alpha: 0.5 };
          break;
        }
        case 'zone': case 'trap': case 'stealth':
          indicator = { type: 'circle', x: aimX, y: aimY, radius: s.radius || 150, color: '#f39c12', alpha: 0.25 };
          break;
        case 'proj': {
          // 弹射物：显示发射方向线
          const projRange = s.projRange || s.range || 300;
          indicator = { type: 'line', x1: p.x, y1: p.y, x2: aimX, y2: aimY, color: '#9b59b6', alpha: 0.4 };
          break;
        }
        case 'multiHit':
          // 连击：以玩家为中心的范围
          indicator = { type: 'circle', x: p.x, y: p.y, radius: p.size + 65, color: '#f1c40f', alpha: 0.25 };
          break;
        case 'shield': case 'slow': case 'speedBoost':
          // 护盾/减速/加速：指向目标位置的圆形
          indicator = { type: 'circle', x: aimX, y: aimY, radius: s.radius || 100, color: '#3498db', alpha: 0.25 };
          break;
      }
      if (indicator) {
        indicator.icon = s.icon;
        indicator.skillIdx = i;
        // PC/手机瞄准模式：在指示器上额外显示"点击释放"提示
        if ((this.isMobile && this.skillAimMode === i) || (!this.isMobile && this.pcSkillAim === i)) {
          indicator.aimMode = true;
        }
        this.skillIndicator = indicator;
        return;
      }
    }
    this.skillIndicator = null;
  },

  // 检测某坐标的地形类型：water/mountain/swamp/forest/plain
  getTerrainAt(x, y) {
    // 水域检测（不规则轮廓，用包围圆快速剔除）
    for (const w of (this.waterZones||[])) {
      if (Math.hypot(x-w.x, y-w.y) < w.r) return 'water';
    }
    // 蜿蜒河流检测（逐段折线距离）
    for (const r of (this.rivers||[])) {
      if (!r.pts||r.pts.length<2) continue;
      for (let i=0; i<r.pts.length-1; i++) {
        const ax=r.pts[i].x, ay=r.pts[i].y, bx=r.pts[i+1].x, by=r.pts[i+1].y;
        const dx=bx-ax, dy=by-ay, len2=dx*dx+dy*dy;
        const t=len2>0 ? Math.max(0,Math.min(1,((x-ax)*dx+(y-ay)*dy)/len2)) : 0;
        const px=ax+t*dx, py=ay+t*dy;
        if (Math.hypot(x-px,y-py) < r.w) return 'water';
      }
    }
    // 山地检测
    for (const m of (this.mountains||[])) {
      if (Math.hypot(x-m.x, y-m.y) < m.r) return 'mountain';
    }
    // 沼泽检测
    for (const s of (this.swamps||[])) {
      if (Math.hypot(x-s.x, y-s.y) < s.r) return 'swamp';
    }
    // 森林（树木附近）
    for (const t of (this.terrain||[])) {
      if (t.type==='tree' && Math.hypot(x-t.x, y-t.y) < t.r*1.5) return 'forest';
    }
    return 'plain';
  },

  allAlive(exclude) {
    const arr = [];
    if (this.player&&this.player.alive&&this.player!==exclude) arr.push(this.player);
    for (const b of this.bots) if (b.alive&&b!==exclude) arr.push(b);
    return arr;
  },

  addProjectile(owner, x, y, tx, ty, sk) {
    const ang = Math.atan2(ty-y, tx-x);
    const spd = sk.projSpeed||420;
    this.projectiles.push({
      owner, x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
      dmg:sk.dmg, poisonDps:sk.poisonDps||0, poisonDur:sk.poisonDur||0,
      defRed:sk.defRed||0, defDur:sk.defDur||0,
      range:sk.projRange||280, size:10, traveled:0,
      color: owner.color
    });
  },

  init() {
    this.bots=[]; this.drops=[]; this.projectiles=[]; this.traps=[]; this.minions=[];
    this.stats={kills:0,evoCount:0,resCollected:0,time:0};
    this.safeZone={x:3000,y:3000,radius:2700,shrinkRate:0.06,shrinkStart:90,timer:0,dps:4,phase:0};
    this.evoPanelOpen=false; this.evoAnim=null; this.aliveCount=40;

    this.genTerrain();
    this.spawnDrops(800);  // 初始800个物资
    // 物资刷新参数
    this.dropSpawnTimer = 0;
    this.dropSpawnInterval = 6;  // 每6秒刷新一次
    this.dropSpawnAmount = 100; // 每次刷新100个

    this.player = new Entity(3000+(Math.random()-0.5)*500, 3000+(Math.random()-0.5)*500, true, this);

    for (let i=0;i<39;i++) {
      const ang=(i/39)*Math.PI*2, d=800+Math.random()*1600;
      const bot = new Entity(3000+Math.cos(ang)*d, 3000+Math.sin(ang)*d, false, this);
      bot.botAI = this.createBotAI(bot);
      this.bots.push(bot);
    }

    this.state='playing';
    sound.playGameStart();
    this.ui.msg('进化战场开始！40人大逃杀！手机支持：左下摇杆+右下技能！',3000,'#2ecc71');
    this.ui.msg('WASD移动 | Q/E技能+范围指示 | R进化面板 | 鼠标悬停查看技能描述',5000,'#95a5a6');
  },

  // 生成扰动多边形顶点（用于自然地形轮廓）
  _genBlobPts(cx, cy, r, nPts, roughness) {
    const pts = [];
    for (let i = 0; i < nPts; i++) {
      const angle = (i / nPts) * Math.PI * 2;
      // 叠加多个正弦扰动，模拟自然凹凸
      const noise = 1
        + (Math.random() - 0.5) * roughness
        + Math.sin(angle * 2 + Math.random() * 6) * roughness * 0.4
        + Math.sin(angle * 3 + Math.random() * 6) * roughness * 0.25
        + Math.sin(angle * 5 + Math.random() * 6) * roughness * 0.12;
      pts.push({ x: cx + Math.cos(angle) * r * noise, y: cy + Math.sin(angle) * r * noise });
    }
    return pts;
  },

  // 生成蜿蜒河流路径点
  _genRiverPath(x1, y1, x2, y2, w) {
    const pts = [];
    const steps = 8; // 折点数
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    const perpX = -dy / len, perpY = dx / len; // 垂直方向
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      // 横向蜿蜒：中间扰动大，两端收敛
      const waver = Math.sin(t * Math.PI * (2 + Math.floor(Math.random() * 2))) * w * (2.5 + Math.random() * 2) * Math.sin(t * Math.PI);
      pts.push({
        x: x1 + dx * t + perpX * waver,
        y: y1 + dy * t + perpY * waver
      });
    }
    return pts;
  },

  genTerrain() {
    this.terrain=[]; this.waterZones=[]; this.mountains=[]; this.swamps=[];
    const W=this.worldW, H=this.worldH;

    // ---- 水域：不规则湖泊 ----
    for (let i=0;i<25;i++) {
      const cx=150+Math.random()*(W-300), cy=150+Math.random()*(H-300);
      const r=150+Math.random()*220;
      const nPts = 14 + Math.floor(Math.random()*8);
      const pts = this._genBlobPts(cx, cy, r, nPts, 0.45);
      this.waterZones.push({ x:cx, y:cy, r:r*1.1, pts });
    }

    // ---- 大型蜿蜒河流（3条） ----
    const riverDefs = [
      { x1:0, y1:H*0.28, x2:W, y2:H*0.33, w:90 },
      { x1:0, y1:H*0.67, x2:W, y2:H*0.71, w:75 },
      { x1:W*0.39, y1:0, x2:W*0.45, y2:H, w:85 },
    ];
    this.rivers = riverDefs.map(rd => ({
      ...rd,
      pts: this._genRiverPath(rd.x1, rd.y1, rd.x2, rd.y2, rd.w)
    }));

    // ---- 山地：不规则山体 ----
    for (let i=0;i<12;i++) {
      const cx=250+Math.random()*(W-500), cy=250+Math.random()*(H-500);
      const r=160+Math.random()*190;
      const nPts = 10 + Math.floor(Math.random()*6);
      const pts = this._genBlobPts(cx, cy, r, nPts, 0.38);
      // 山顶偏移（不在正中心）
      const peakOff = { x:(Math.random()-0.5)*r*0.3, y:(Math.random()-0.5)*r*0.3 };
      // 预计算雪顶半径和山脊线角度（避免每帧随机导致闪烁）
      const snowR = r * (0.14 + Math.random()*0.08);
      const ridgeAngles = [
        Math.PI + (Math.random()-0.5)*0.5,
        Math.PI + 1.1 + (Math.random()-0.5)*0.4,
        Math.PI - 1.1 + (Math.random()-0.5)*0.4,
      ];
      this.mountains.push({ x:cx, y:cy, r, pts, peakOff, snowR, ridgeAngles });
    }

    // ---- 沼泽：扰动轮廓 + 植被点 ----
    for (let i=0;i<10;i++) {
      const cx=150+Math.random()*(W-300), cy=150+Math.random()*(H-300);
      const r=130+Math.random()*140;
      const nPts = 12 + Math.floor(Math.random()*6);
      const pts = this._genBlobPts(cx, cy, r, nPts, 0.42);
      // 沼泽草丛点
      const weeds = [];
      const weedCount = 6 + Math.floor(Math.random()*8);
      for (let w=0; w<weedCount; w++) {
        const a=Math.random()*Math.PI*2, d=r*(0.2+Math.random()*0.65);
        weeds.push({ x:cx+Math.cos(a)*d, y:cy+Math.sin(a)*d, s:8+Math.random()*14 });
      }
      this.swamps.push({ x:cx, y:cy, r, pts, weeds });
    }

    // ---- 岩石：不规则多边形 ----
    for (let i=0;i<180;i++) {
      const rx=Math.random()*W, ry=Math.random()*H;
      const rr = 22+Math.random()*50;
      const nPts = 5 + Math.floor(Math.random()*4);
      const rot = Math.random()*Math.PI*2;
      const pts = [];
      for (let p=0; p<nPts; p++) {
        const a = rot + (p/nPts)*Math.PI*2;
        // 径向扰动
        const len = rr * (0.65 + Math.random()*0.6);
        const stretch = p%2===0 ? 1 : 0.72+Math.random()*0.3; // 奇偶点收缩，形成棱角
        pts.push({ x:rx+Math.cos(a)*len*stretch, y:ry+Math.sin(a)*len*(stretch*0.82) });
      }
      this.terrain.push({ type:'rock', x:rx, y:ry, r:rr, pts });
    }

    // ---- 树木：集群分布，带形状变体 ----
    for (let g=0;g<28;g++) {
      const gx=Math.random()*W, gy=Math.random()*H;
      for (let t=0;t<10;t++) {
        const tx=gx+(Math.random()-0.5)*240, ty=gy+(Math.random()-0.5)*240;
        const tr=24+Math.random()*38;
        // 树冠叶片（3-5个偏移圆组成不规则冠）
        const nLeaf = 3 + Math.floor(Math.random()*3);
        const leaves = [];
        for (let l=0; l<nLeaf; l++) {
          const la = Math.random()*Math.PI*2;
          const ld = tr*(0.15+Math.random()*0.45);
          const lr = tr*(0.55+Math.random()*0.55);
          leaves.push({ ox:Math.cos(la)*ld, oy:Math.sin(la)*ld, r:lr });
        }
        // 树干方向微弯（存两端点）
        const tilt = (Math.random()-0.5)*0.4;
        this.terrain.push({ type:'tree', x:tx, y:ty, r:tr, leaves,
          trunkPts:[
            { x:tx+Math.sin(tilt)*tr*0.08, y:ty+tr*0.55 },
            { x:tx+Math.sin(tilt)*tr*0.2, y:ty+tr*1.0 },
          ]
        });
      }
    }
  },

  spawnDrops(n) {
    const rTypes = Object.values(RESOURCES);
    for (let i=0;i<n;i++) {
      const t = rTypes[Math.floor(Math.random()*rTypes.length)];
      this.drops.push(new ResDrop(100+Math.random()*(this.worldW-200), 100+Math.random()*(this.worldH-200), t));
    }
  },

  createBotAI(bot) {
    const ai = bot.ai;
    // 智能决策计时器
    ai.smartTimer = 0;
    ai.lastTarget = null;
    ai.combatMode = false;
    ai.retreatTimer = 0;
    return (dt) => {
      ai.smartTimer -= dt;
      ai.aggroTimer += dt;

      // 智能决策（每0.25秒做一次判断）
      if (ai.smartTimer <= 0) {
        ai.smartTimer = 0.2 + Math.random() * 0.2;

        // === 优先级1：安全区外，强制移动 ===
        const dz = Math.hypot(bot.x - game.safeZone.x, bot.y - game.safeZone.y);
        if (dz > game.safeZone.radius * 0.90) {
          ai.mode = 'return';
          const angle = Math.atan2(game.safeZone.y - bot.y, game.safeZone.x - bot.x);
          ai.wanderX = bot.x + Math.cos(angle) * 400;
          ai.wanderY = bot.y + Math.sin(angle) * 400;
          ai.targetEnemy = null;
          ai.targetRes = null;
        }
        // === 优先级2：低血量逃跑 ===
        else if (bot.hp / bot.maxHp < 0.3) {
          ai.mode = 'retreat';
          // 远离最近的敌人
          let nearestThreat = null, nd = Infinity;
          for (const e of game.allAlive(bot)) {
            const d = Math.hypot(e.x - bot.x, e.y - bot.y);
            if (d < nd) { nd = d; nearestThreat = e; }
          }
          if (nearestThreat && nd < 500) {
            const awayAngle = Math.atan2(bot.y - nearestThreat.y, bot.x - nearestThreat.x);
            ai.wanderX = bot.x + Math.cos(awayAngle) * 350;
            ai.wanderY = bot.y + Math.sin(awayAngle) * 350;
          } else {
            ai.wanderX = bot.x + (Math.random() - 0.5) * 500;
            ai.wanderY = bot.y + (Math.random() - 0.5) * 500;
          }
          ai.targetEnemy = null;
          ai.targetRes = null;
        }
        // === 优先级3：能进化时，优先进化 ===
        else {
          const spec = EVODATA[bot.specId];
          if (spec.evolvesTo && spec.evolvesTo.length > 0) {
            for (const id of spec.evolvesTo) {
              if (canEvolve(bot.resources, spec.evoReqs[id])) {
                ai.mode = 'evolve';
                bot.evolve(id);
                ai.targetEnemy = null;
                ai.targetRes = null;
                ai.wanderX = bot.x + (Math.random() - 0.5) * 200;
                ai.wanderY = bot.y + (Math.random() - 0.5) * 200;
                break;
              }
            }
          }
        }

        // === 优先级4：战斗模式（能打的敌人） ===
        if (ai.mode === 'normal' || !ai.mode) {
          ai.mode = 'hunt';
          // 找最优目标：优先打低血量 > 地形优势 > 最近
          let bestTarget = null, bestScore = Infinity;
          for (const e of game.allAlive(bot)) {
            const d = Math.hypot(e.x - bot.x, e.y - bot.y);
            // 地形优势评分：敌人不擅长当前地形
            const eTerrain = game.getTerrainAt(e.x, e.y);
            const eMods = TERRAIN_SPEED_MOD[e.moveType] || TERRAIN_SPEED_MOD.walk;
            const myMods = TERRAIN_SPEED_MOD[bot.moveType] || TERRAIN_SPEED_MOD.walk;
            const eTerrainPenalty = (eMods[eTerrain] || 1.0); // 敌人在此地形速度
            const myTerrainBonus = (myMods[eTerrain] || 1.0); // 我在此地形速度
            // 评分 = 距离 / (地形优势 * (血量越低越优先))
            const hpFactor = 1 - (e.hp / e.maxHp) * 0.5; // 低血量加分
            const score = d / (eTerrainPenalty * myTerrainBonus * (1 + hpFactor));
            if (score < bestScore && d < 500) {
              bestScore = score;
              bestTarget = e;
            }
          }
          if (bestTarget) {
            ai.targetEnemy = bestTarget;
            ai.targetRes = null;
          } else {
            // 找资源
            ai.targetEnemy = null;
            let cr = null, crd = Infinity;
            for (const r of game.drops) {
              const d = Math.hypot(r.x - bot.x, r.y - bot.y);
              if (d < crd) { crd = d; cr = r; }
            }
            ai.targetRes = cr;
            if (!cr) {
              ai.wanderX = Math.max(100, Math.min(game.worldW - 100, bot.x + (Math.random() - 0.5) * 500));
              ai.wanderY = Math.max(100, Math.min(game.worldH - 100, bot.y + (Math.random() - 0.5) * 500));
            }
          }
        }
      }

      // === 执行移动 ===
      let gx, gy;
      if (ai.targetEnemy && ai.targetEnemy.alive) {
        gx = ai.targetEnemy.x;
        gy = ai.targetEnemy.y;

        // 攻击判断
        const dist = Math.hypot(bot.x - ai.targetEnemy.x, bot.y - ai.targetEnemy.y);

        // 近战范围——停下来攻击
        if (dist < bot.atkRange + 10) {
          bot.botVx = 0;
          bot.botVy = 0;
          // 积极攻击
          if (bot.canAtk() && Math.random() < 0.12) {
            bot.attack(ai.targetEnemy);
          }
          // 技能使用（根据类型）
          const sk0 = bot.spec.skills[0];
          const sk1 = bot.spec.skills[1];
          if (bot.skillCds[0] <= 0 && Math.random() < 0.04) bot.useSkill(0);
          if (bot.skillCds[1] <= 0 && Math.random() < 0.03) bot.useSkill(1);
        } else {
          // 追击（不是盲目追，而是预判）
          const angle = Math.atan2(ai.targetEnemy.y - bot.y, ai.targetEnemy.x - bot.x);
          // 略微预判目标移动
          gx = ai.targetEnemy.x;
          gy = ai.targetEnemy.y;
          const dx = gx - bot.x, dy = gy - bot.y;
          const d = Math.hypot(dx, dy);
          if (d > 5) {
            bot.botVx = dx / d;
            bot.botVy = dy / d;
          }
        }

        // 进化检查（每帧都检查）
        const spec = EVODATA[bot.specId];
        if (spec.evolvesTo && spec.evolvesTo.length > 0) {
          for (const id of spec.evolvesTo) {
            if (canEvolve(bot.resources, spec.evoReqs[id])) {
              bot.evolve(id);
              break;
            }
          }
        }
      } else if (ai.targetRes) {
        gx = ai.targetRes.x;
        gy = ai.targetRes.y;
        const dx = gx - bot.x, dy = gy - bot.y;
        const d = Math.hypot(dx, dy);
        if (d > 5) { bot.botVx = dx / d; bot.botVy = dy / d; }
        else { bot.botVx = 0; bot.botVy = 0; }
      } else {
        gx = ai.wanderX || bot.x;
        gy = ai.wanderY || bot.y;
        const dx = gx - bot.x, dy = gy - bot.y;
        const d = Math.hypot(dx, dy);
        if (d > 30) {
          bot.botVx = dx / d;
          bot.botVy = dy / d;
        } else {
          // 到了就换个游荡点
          ai.wanderX = Math.max(100, Math.min(game.worldW - 100, bot.x + (Math.random() - 0.5) * 600));
          ai.wanderY = Math.max(100, Math.min(game.worldH - 100, bot.y + (Math.random() - 0.5) * 600));
          bot.botVx = 0;
          bot.botVy = 0;
        }
      }
    };
  },

  update(dt) {
    this.stats.time += dt;
    this.resSpawnTimer += dt;

    // 安全区
    this.safeZone.timer += dt;
    if (this.safeZone.timer >= this.safeZone.shrinkStart && this.safeZone.radius > 150) {
      this.safeZone.radius -= this.safeZone.shrinkRate * dt * 60;
      if (this.safeZone.radius < 150) this.safeZone.radius = 150;
    }

    // 天灾系统
    this._updateDisasters(dt);

    // 玩家
    if (this.player && this.player.alive) {
      this.updateSkillIndicator();
      this.player.update(dt, this.keys, this.mouse);
      this._updateCam();
      this._collectDrops(this.player);
      this._szDmg(this.player, dt);
    } else if (this.player && !this.player.alive && this.state==='playing') {
      this.state='gameover';
      sound.playGameOver();
    }

    // Bots
    for (const bot of this.bots) {
      if (!bot.alive) continue;
      bot.botAI(dt);
      bot.update(dt, {}, {});
      this._collectDrops(bot);
      this._szDmg(bot, dt);
    }

    // 近战伤害
    this._combatUpdate();

    // 抛射物
    this._updateProjs(dt);

    // 陷阱
    this._updateTraps(dt);

    // 随从
    this._updateMinions(dt);

    // 粒子
    this.par.update(dt);

    // 补充资源（加快刷新）
    this.dropSpawnTimer += dt;
    if (this.dropSpawnTimer >= this.dropSpawnInterval) {
      this.dropSpawnTimer = 0;
      // 每批刷新多个物资
      const spawnCount = Math.min(this.dropSpawnAmount, 600 - this.drops.length);
      for (let i = 0; i < spawnCount; i++) {
        this._spawnOneRes();
      }
    }

    // 存活统计
    this.aliveCount = (this.player&&this.player.alive?1:0) + this.bots.filter(b=>b.alive).length;
    if (this.player&&this.player.alive && this.aliveCount===1) {
      this.state='gameover_win';
      sound.playVictory();
    }

    // 进化动画
    if (this.evoAnim) { this.evoAnim.timer -= dt; if(this.evoAnim.timer<=0) this.evoAnim=null; }
  },

  _updateCam() {
    if (!this.player) return;
    this.cam.x = this.player.x - W/2;
    this.cam.y = this.player.y - H/2;
    this.cam.x = Math.max(0, Math.min(this.worldW-W, this.cam.x));
    this.cam.y = Math.max(0, Math.min(this.worldH-H, this.cam.y));
  },

  _collectDrops(ent) {
    this.drops = this.drops.filter(d => {
      const dist = Math.hypot(ent.x-d.x, ent.y-d.y);
      if (dist < ent.size + d.size + 8) {
        ent.resources[d.type.id] = (ent.resources[d.type.id]||0) + d.amount;
        if (ent.isPlayer) {
          game.stats.resCollected++;
          game.par.burst(d.x-game.cam.x, d.y-game.cam.y, d.type.color, 8);
          game.ui.resPickup(d.type, d.amount);
          sound.playPickup();
        }
        return false;
      }
      return true;
    });
  },

  _szDmg(ent, dt) {
    const dz = Math.hypot(ent.x-this.safeZone.x, ent.y-this.safeZone.y);
    if (dz > this.safeZone.radius) {
      const factor = 1 + this.safeZone.phase * 0.5;
      ent.takeDmg(this.safeZone.dps * factor * dt, null);
      if (ent.isPlayer) sound.playSzWarning(dt);
    }
  },

  // ==================== 天灾系统 ====================
  // 天灾类型配置
  DISASTERS: {
    meteor: {
      name:'陨石雨', color:'#e74c3c', bgColor:'rgba(231,76,60,0.18)',
      warnDur:5, activeDur:3, radius:420, dmg:70, effect:'burn', effectDur:5,
      particle:'🔥', soundHz:180
    },
    earthquake: {
      name:'大地震', color:'#a0522d', bgColor:'rgba(160,82,45,0.18)',

      particle:'💥', soundHz:60
    },
    thunderstorm: {

      particle:'⚡', soundHz:400
    },
    tornado: {
      name:'龙卷风', color:'#3498db', bgColor:'rgba(52,152,219,0.15)',

      particle:'🌀', soundHz:120
    },
    volcanic: {
      name:'火山喷发', color:'#e67e22', bgColor:'rgba(230,126,34,0.18)',
      warnDur:4, activeDur:3, radius:500, dmg:65, effect:'burn', effectDur:6,
      particle:'🌋', soundHz:100
    }
  },

  _spawnDisaster() {
    const types = Object.keys(this.DISASTERS);
    const type = types[Math.floor(Math.random()*types.length)];
    const cfg = this.DISASTERS[type];

    // 随机位置（在地图内，预留边距）
    const margin = cfg.radius;
    const cx = margin + Math.random()*(this.worldW - margin*2);
    const cy = margin + Math.random()*(this.worldH - margin*2);

    this.disasters.push({
      type, cx, cy,
      radius: cfg.radius,
      phase: 'warn',    // warn → active → done
      timer: 0,
      warnDur: cfg.warnDur,
      activeDur: cfg.activeDur,
      cfg,
      warnPulse: true,  // 警告阶段闪烁特效开关
      bolts: [],         // 雷暴闪电
      rocks: [],         // 陨石碎片
      lavaRocks: [],     // 火山岩浆
      ash: [],           // 灰烬
      _stunTimer: 0,     // 地震眩晕计时
    });

    const msg = `⚠️ ${cfg.name}即将来袭！`;
    if (this.ui) this.ui.msg(msg, 3000, cfg.color);
  },

  _updateDisasters(dt) {
    this.disasterTimer += dt;

    // 天灾间隔，随时间略微缩短（增加紧迫感）
    const interval = Math.max(25, this.disasterInterval - this.stats.time * 0.01);
    if (this.disasterTimer >= interval && this.state==='playing') {
      this.disasterTimer = 0;
      this._spawnDisaster();
    }

    // 同时最多2个天灾
    if (this.disasters.length < 2 && this.stats.time > 20) {
      if (Math.random() < 0.0008 * dt) this._spawnDisaster();
    }

    // 更新每个天灾
    for (const d of this.disasters) {
      d.timer += dt;
      const cfg = d.cfg;

      if (d.phase === 'warn') {
        // 预兆期：闪烁目标区域
        if (d.timer >= cfg.warnDur) {
          d.phase = 'active';
          d.timer = 0;
          // 进入激活时给玩家一次音效提示
        }
        // 预兆闪烁效果（每0.5秒切换可见性）
        d.warnPulse = Math.floor(d.timer / 0.4) % 2 === 0;
      }

      if (d.phase === 'active') {
        // 对区域内实体造成效果
        const all = [];
        if (this.player&&this.player.alive) all.push(this.player);
        for (const b of this.bots) if(b.alive) all.push(b);

        for (const ent of all) {
          const dist = Math.hypot(ent.x - d.cx, ent.y - d.cy);
          if (dist <= d.radius) {
          if (cfg.effect === 'burn') {
            // 持续灼烧伤害（DOT）
            ent.takeDmg(cfg.dmg * dt, null);
            ent.applyPoison(cfg.dmg * 0.3, cfg.effectDur);  // 灼烧DOT
          } else if (cfg.effect === 'stun') {
            // 地震：间歇性眩晕+伤害
            ent.takeDmg(cfg.dmg * dt, null);
            if (d._stunTimer === undefined) d._stunTimer = 0;
            d._stunTimer += dt;
            if (d._stunTimer >= 0.5) {
              d._stunTimer = 0;
              ent.stunTimer = Math.max(ent.stunTimer||0, 0.4);
            }
          } else if (cfg.effect === 'slow') {
            // 雷暴：减速+持续伤害
            ent.takeDmg(cfg.dmg * dt, null);
            ent.speedMult = Math.min(ent.speedMult, 0.3);
            ent.speedMultTimer = Math.max(ent.speedMultTimer||0, 0.5);  // 每次命中刷新
          } else if (cfg.effect === 'knockback') {
            // 龙卷风：持续击退
            const ang = Math.atan2(ent.y - d.cy, ent.x - d.cx);
            ent.x += Math.cos(ang) * cfg.kbForce * dt;
            ent.y += Math.sin(ang) * cfg.kbForce * dt;
            ent.takeDmg(cfg.dmg * dt, null);
          }
          }
        }

        // 生成视觉特效
        if (d.type === 'thunderstorm') {
          if (Math.random() < 0.15) {
            const a = Math.random()*Math.PI*2;
            const r = Math.random()*d.radius;
            d.bolts.push({ x:d.cx+Math.cos(a)*r, y:d.cy+Math.sin(a)*r, life:0.3, branches:[] });
          }
        }
        if (d.type === 'meteor') {
          if (Math.random() < 0.2) {
            const a = Math.random()*Math.PI*2;
            const r = Math.random()*d.radius*0.8;
            d.rocks.push({ x:d.cx+Math.cos(a)*r, y:d.cy+Math.sin(a)*r, life:0.5 });
          }
        }
        if (d.type === 'tornado') {
          d.tornadoAngle = (d.tornadoAngle||0) + dt * 4;
          d.tornadoArm = (d.tornadoArm||0) + dt * 3;
        }

        if (d.timer >= cfg.activeDur) {
          d.phase = 'done';
        }
      }
    }

    // 移除已完成的天灾
    if (this.disasters) this.disasters = this.disasters.filter(d => d.phase !== 'done');
  },

  _combatUpdate() {
    const all = [];
    if (this.player&&this.player.alive) all.push(this.player);
    for (const b of this.bots) if(b.alive) all.push(b);
    for (let i=0;i<all.length;i++) {
      for (let j=i+1;j<all.length;j++) {
        const a=all[i], b=all[j];
        const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
        const min=a.size+b.size;
        if (d<min&&d>0) {
          const ov=(min-d)*0.52;
          a.x+=(dx/d)*ov; a.y+=(dy/d)*ov;
          b.x-=(dx/d)*ov; b.y-=(dy/d)*ov;
        }
        if (d<a.atkRange && a.canAtk()) a.attack(b);
        if (d<b.atkRange && b.canAtk()) b.attack(a);
      }
    }
  },

  _updateProjs(dt) {
    const all = [];
    if (this.player&&this.player.alive) all.push(this.player);
    for (const b of this.bots) if(b.alive) all.push(b);

    this.projectiles = this.projectiles.filter(p => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.traveled += Math.hypot(p.vx, p.vy) * dt;
      if (p.traveled > p.range) return false;

      for (const e of all) {
        if (e === p.owner) continue;
        if (Math.hypot(e.x-p.x, e.y-p.y) < e.size+p.size) {
          e.takeDmg(p.dmg, p.owner);
          if (p.poisonDps > 0) e.applyPoison(p.poisonDps, p.poisonDur);
          if (p.defRed > 0) { e.defRedMult = 1-p.defRed; e.defRedTimer = p.defDur; }
          game.par.burst(p.x-game.cam.x, p.y-game.cam.y, p.color, 10);
          return false;
        }
      }
      return true;
    });
  },

  _updateTraps(dt) {
    const all = [];
    if (this.player&&this.player.alive) all.push(this.player);
    for (const b of this.bots) if(b.alive) all.push(b);

    this.traps = this.traps.filter(t => {
      t.life -= dt;
      if (t.life <= 0) return false;

      for (const e of all) {
        if (e === t.owner) continue;
        const dx=e.x-t.x, dy=e.y-t.y, d=Math.hypot(dx,dy);
        if (d < t.radius) {
          e.takeDmg(t.dps * dt, t.owner);
          if (t.rootDur > 0) e.stunTimer = Math.max(e.stunTimer, t.rootDur);
          if (t.pull > 0 && d > 2) {
            const force = t.pull * dt * 0.1;
            e.x -= (dx/d)*force; e.y -= (dy/d)*force;
          }
        }
      }
      return true;
    });
  },

  _updateMinions(dt) {
    this.minions = this.minions.filter(m => {
      m.life -= dt;
      if (m.life<=0||!m.owner.alive) return false;

      const dx=m.owner.x-m.x, dy=m.owner.y-m.y, d=Math.hypot(dx,dy);
      if (d>80) { m.x+=(dx/d)*m.spd*dt*60; m.y+=(dy/d)*m.spd*dt*60; }

      m.atkCd = Math.max(0, m.atkCd - dt);
      if (m.atkCd <= 0) {
        const enemies = game.allAlive(m.owner);
        for (const e of enemies) {
          if (Math.hypot(e.x-m.x,e.y-m.y) < 65) {
            e.takeDmg(m.atk, m.owner);
            m.atkCd = 1.0;
            game.par.burst(e.x-game.cam.x, e.y-game.cam.y,'#f1c40f',4);
            break;
          }
        }
      }
      return true;
    });
  },

  _spawnOneRes() {
    const types = Object.values(RESOURCES);
    const t = types[Math.floor(Math.random()*types.length)];
    const a = Math.random()*Math.PI*2, d = Math.random()*this.safeZone.radius*0.92;
    this.drops.push(new ResDrop(this.safeZone.x+Math.cos(a)*d, this.safeZone.y+Math.sin(a)*d, t));
  },

  // ==================== 渲染 ====================
  render() {
    ctx.clearRect(0,0,W,H);

    if (this.state==='menu') { this._renderMenu(); return; }
    if (this.state==='gameover'||this.state==='gameover_win') { this._renderGameOver(); return; }

    ctx.save();
    ctx.translate(-this.cam.x, -this.cam.y);

    // 背景
    this._renderBg();

    // 沼泽（不规则轮廓+草丛）
    for (const s of (this.swamps||[])) {
      const screenX = s.x - this.cam.x, screenY = s.y - this.cam.y;
      if (screenX<-s.r-50||screenX>W+s.r+50||screenY<-s.r-50||screenY>H+s.r+50) continue;
      if (!s.pts||s.pts.length<3) continue;
      // 沼泽底色（暗绿色）
      const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
      sg.addColorStop(0,'rgba(45,65,15,0.80)'); sg.addColorStop(0.65,'rgba(35,55,10,0.62)'); sg.addColorStop(1,'rgba(20,40,5,0.22)');
      ctx.fillStyle=sg;
      ctx.beginPath();
      ctx.moveTo(s.pts[0].x, s.pts[0].y);
      for (let i=1; i<s.pts.length; i++) {
        const prev = s.pts[(i-1+s.pts.length)%s.pts.length];
        const cpx = (prev.x + s.pts[i].x)/2, cpy = (prev.y + s.pts[i].y)/2;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      ctx.closePath(); ctx.fill();
      // 沼泽边缘轮廓
      ctx.strokeStyle='rgba(55,80,20,0.45)'; ctx.lineWidth=2.5; ctx.stroke();
      // 沼泽水面反光纹（弯曲短线）
      ctx.strokeStyle='rgba(80,110,30,0.32)'; ctx.lineWidth=1.5;
      for (let si=0; si<4; si++) {
        const a0 = si * 0.8 + Math.PI * 0.1;
        const rr = s.r * (0.25 + si * 0.18);
        ctx.beginPath();
        ctx.arc(s.x + Math.cos(a0)*s.r*0.12, s.y + Math.sin(a0)*s.r*0.08, rr, a0, a0+Math.PI*0.7);
        ctx.stroke();
      }
      // 草丛装饰
      if (s.weeds) {
        for (const wd of s.weeds) {
          ctx.fillStyle='rgba(60,90,20,0.75)';
          // 三根草叶
          for (let wi=-1; wi<=1; wi++) {
            ctx.beginPath();
            ctx.moveTo(wd.x + wi*wd.s*0.22, wd.y + wd.s*0.3);
            ctx.quadraticCurveTo(
              wd.x + wi*wd.s*0.55 + (wi||1)*wd.s*0.18, wd.y - wd.s*0.2,
              wd.x + wi*wd.s*0.65, wd.y - wd.s*0.85
            );
            ctx.lineWidth=2; ctx.strokeStyle='rgba(70,105,25,0.82)';
            ctx.stroke();
          }
        }
      }
    }

    // 山地（不规则轮廓）
    for (const m of (this.mountains||[])) {
      const screenX = m.x - this.cam.x, screenY = m.y - this.cam.y;
      if (screenX<-m.r-50||screenX>W+m.r+50||screenY<-m.r-50||screenY>H+m.r+50) continue;
      if (!m.pts||m.pts.length<3) continue;
      // 山体基础渐变（以山顶偏移为中心）
      const pkx = m.x + (m.peakOff?m.peakOff.x:0);
      const pky = m.y + (m.peakOff?m.peakOff.y:0);
      const mg=ctx.createRadialGradient(pkx,pky,0,m.x,m.y,m.r);
      mg.addColorStop(0,'rgba(145,125,95,0.95)'); mg.addColorStop(0.4,'rgba(115,95,72,0.82)'); mg.addColorStop(0.75,'rgba(90,75,55,0.65)'); mg.addColorStop(1,'rgba(60,50,35,0.12)');
      ctx.fillStyle=mg;
      ctx.beginPath();
      ctx.moveTo(m.pts[0].x, m.pts[0].y);
      for (let i=1; i<m.pts.length; i++) {
        const prev = m.pts[(i-1+m.pts.length)%m.pts.length];
        const cpx = (prev.x+m.pts[i].x)/2, cpy = (prev.y+m.pts[i].y)/2;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      ctx.closePath();
      ctx.fill();
      // 山体轮廓线
      ctx.strokeStyle='rgba(80,65,45,0.45)'; ctx.lineWidth=2; ctx.stroke();
      // 山脊线（使用预计算角度避免闪烁）
      ctx.save();
      ctx.shadowBlur=6; ctx.shadowColor='rgba(60,45,30,0.5)';
      ctx.strokeStyle='rgba(170,150,120,0.55)'; ctx.lineWidth=2.5;
      const baseAngle = Math.atan2(pky-m.y, pkx-m.x);
      const ridgeAngles = m.ridgeAngles ? m.ridgeAngles.map(a => baseAngle + a) : [baseAngle + Math.PI, baseAngle + Math.PI + 1.1, baseAngle + Math.PI - 1.1];
      for (const ra of ridgeAngles) {
        ctx.beginPath();
        ctx.moveTo(pkx, pky);
        ctx.lineTo(pkx + Math.cos(ra)*m.r*0.72, pky + Math.sin(ra)*m.r*0.72);
        ctx.stroke();
      }
      ctx.shadowBlur=0; ctx.restore();
      // 雪顶（使用预计算值避免闪烁）
      const snowR = m.snowR || m.r * 0.15;
      const snowG = ctx.createRadialGradient(pkx, pky-m.r*0.38, 0, pkx, pky-m.r*0.38, snowR);
      snowG.addColorStop(0,'rgba(245,245,255,0.88)'); snowG.addColorStop(0.6,'rgba(220,225,240,0.55)'); snowG.addColorStop(1,'transparent');
      ctx.fillStyle=snowG;
      ctx.beginPath(); ctx.arc(pkx, pky - m.r*0.38, snowR, 0, Math.PI*2); ctx.fill();
    }

    // 地形（岩石+树木）
    for (const t of this.terrain) {
      const screenX = t.x - this.cam.x, screenY = t.y - this.cam.y;
      const size = t.r || 30;
      if (screenX<-size-20||screenX>W+size+20||screenY<-size-20||screenY>H+size+20) continue;

      if (t.type==='rock') {
        if (!t.pts||t.pts.length<3) continue;
        // 地面阴影
        ctx.fillStyle='rgba(0,0,0,0.20)';
        ctx.beginPath();
        ctx.ellipse(t.x+5, t.y+8, t.r*1.1, t.r*0.55, 0.15, 0, Math.PI*2);
        ctx.fill();
        // 岩石主体（不规则多边形，渐变填色）
        const rg = ctx.createRadialGradient(t.x-t.r*0.2, t.y-t.r*0.2, 0, t.x, t.y, t.r*1.1);
        rg.addColorStop(0,'#9ca8b0'); rg.addColorStop(0.5,'#7f8c8d'); rg.addColorStop(1,'#5d6d7e');
        ctx.fillStyle=rg;
        ctx.strokeStyle='rgba(60,70,80,0.6)'; ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(t.pts[0].x, t.pts[0].y);
        for (let i=1; i<t.pts.length; i++) ctx.lineTo(t.pts[i].x, t.pts[i].y);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        // 岩面裂缝（1-2条）
        ctx.strokeStyle='rgba(50,55,60,0.4)'; ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(t.x - t.r*0.35, t.y - t.r*0.1);
        ctx.lineTo(t.x + t.r*0.15, t.y + t.r*0.3);
        ctx.stroke();
        // 高光
        ctx.fillStyle='rgba(200,210,220,0.30)';
        ctx.beginPath(); ctx.ellipse(t.x-t.r*0.25, t.y-t.r*0.25, t.r*0.38, t.r*0.22, -0.5, 0, Math.PI*2); ctx.fill();

      } else {
        // 树阴影
        ctx.fillStyle='rgba(0,0,0,0.16)';
        ctx.beginPath(); ctx.ellipse(t.x+7, t.y+t.r*0.75, t.r*0.88, t.r*0.38, 0, 0, Math.PI*2); ctx.fill();
        // 树干（弯曲）
        if (t.trunkPts) {
          const colors = ['#6b4c11','#7d5c1a','#5a3e0d'];
          ctx.strokeStyle=colors[Math.floor(t.x*0.01)%colors.length]||'#7d5c1a';
          ctx.lineWidth=t.r*0.22;
          ctx.lineCap='round';
          ctx.beginPath();
          ctx.moveTo(t.trunkPts[0].x, t.trunkPts[0].y - t.r*0.05);
          ctx.quadraticCurveTo(
            t.trunkPts[0].x + (t.trunkPts[1].x - t.trunkPts[0].x)*0.4,
            t.trunkPts[0].y + t.r*0.3,
            t.trunkPts[1].x, t.trunkPts[1].y
          );
          ctx.stroke();
          ctx.lineCap='butt';
        }
        // 树冠（多叶片叠加）
        const leafColors = ['#1a7840','#1e8449','#27ae60','#2ecc71'];
        if (t.leaves) {
          // 先画暗色底层叶片
          for (let li=0; li<t.leaves.length; li++) {
            const lf = t.leaves[li];
            ctx.fillStyle=leafColors[li%leafColors.length];
            ctx.beginPath(); ctx.arc(t.x+lf.ox, t.y+lf.oy, lf.r, 0, Math.PI*2); ctx.fill();
          }
          // 高亮小圆（模拟光照点）
          ctx.fillStyle='rgba(150,230,120,0.20)';
          ctx.beginPath(); ctx.arc(t.x - t.r*0.28, t.y - t.r*0.28, t.r*0.30, 0, Math.PI*2); ctx.fill();
        } else {
          // 兼容无leaves数据的旧树
          ctx.fillStyle='#1e8449'; ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle='#27ae60'; ctx.beginPath(); ctx.arc(t.x-t.r*0.22, t.y-t.r*0.22, t.r*0.68, 0, Math.PI*2); ctx.fill();
        }
      }
    }

    // 河流（蜿蜒多段贝塞尔）
    for (const r of (this.rivers||[])) {
      if (!r.pts||r.pts.length<2) continue;
      // 河床底色（略深）
      ctx.strokeStyle='rgba(25,95,155,0.55)'; ctx.lineWidth=r.w*2.2;
      ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(r.pts[0].x, r.pts[0].y);
      for (let i=1; i<r.pts.length-1; i++) {
        const mx = (r.pts[i].x + r.pts[i+1].x)/2;
        const my = (r.pts[i].y + r.pts[i+1].y)/2;
        ctx.quadraticCurveTo(r.pts[i].x, r.pts[i].y, mx, my);
      }
      ctx.lineTo(r.pts[r.pts.length-1].x, r.pts[r.pts.length-1].y);
      ctx.stroke();
      // 河水主色
      ctx.strokeStyle='rgba(45,130,200,0.72)'; ctx.lineWidth=r.w*1.7;
      ctx.beginPath();
      ctx.moveTo(r.pts[0].x, r.pts[0].y);
      for (let i=1; i<r.pts.length-1; i++) {
        const mx = (r.pts[i].x + r.pts[i+1].x)/2;
        const my = (r.pts[i].y + r.pts[i+1].y)/2;
        ctx.quadraticCurveTo(r.pts[i].x, r.pts[i].y, mx, my);
      }
      ctx.lineTo(r.pts[r.pts.length-1].x, r.pts[r.pts.length-1].y);
      ctx.stroke();
      // 水面高光（中心细线）
      ctx.strokeStyle='rgba(130,200,255,0.28)'; ctx.lineWidth=r.w*0.4;
      ctx.setLineDash([r.w*0.6, r.w*0.9]);
      ctx.beginPath();
      ctx.moveTo(r.pts[0].x, r.pts[0].y);
      for (let i=1; i<r.pts.length-1; i++) {
        const mx = (r.pts[i].x + r.pts[i+1].x)/2;
        const my = (r.pts[i].y + r.pts[i+1].y)/2;
        ctx.quadraticCurveTo(r.pts[i].x, r.pts[i].y, mx, my);
      }
      ctx.lineTo(r.pts[r.pts.length-1].x, r.pts[r.pts.length-1].y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineCap='butt'; ctx.lineJoin='miter';
    }

    // 资源
    for (const d of this.drops) d.render(ctx);

    // 陷阱
    for (const t of this.traps) {
      ctx.globalAlpha=0.55;
      const tg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.radius);
      tg.addColorStop(0,'rgba(243,156,18,0.85)'); tg.addColorStop(1,'transparent');
      ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(t.x,t.y,t.radius,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1; ctx.font='18px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(t.pull>0?'🌀':'🍯', t.x, t.y);
    }

    // 抛射物
    for (const p of this.projectiles) {
      ctx.fillStyle=p.color; ctx.shadowBlur=10; ctx.shadowColor=p.color;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // 随从
    for (const m of this.minions) {
      ctx.fillStyle='#f1c40f'; ctx.strokeStyle='#e67e22'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(m.x,m.y,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🐝',m.x,m.y);
    }

    // 实体
    for (const b of this.bots) if(b.alive) b.render(ctx);
    if (this.player&&this.player.alive) this.player.render(ctx);

    // 技能指示器
    this._renderSkillIndicator();

    // 安全区
    const sz = this.safeZone;
    ctx.strokeStyle='#3498db'; ctx.lineWidth=3; ctx.setLineDash([10,5]);
    ctx.beginPath(); ctx.arc(sz.x,sz.y,sz.radius,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.save();
    ctx.beginPath();
    ctx.rect(0,0,this.worldW,this.worldH);
    ctx.arc(sz.x,sz.y,sz.radius,0,Math.PI*2,true);
    ctx.fillStyle='rgba(231,76,60,0.22)'; ctx.fill();
    ctx.restore();

    // 天灾效果（世界空间，相机变换生效中）
    this.ui._renderDisasters();

    ctx.restore();

    // 天灾屏幕空间UI（警告条/倒计时/边缘提示）
    this.ui._renderDisasterUI();

    // 粒子
    this.par.render(ctx);

    // UI
    this.ui.render();

    // 进化动画
    if (this.evoAnim) this._renderEvoAnim();
  },

  _renderSkillIndicator() {
    const ind = this.skillIndicator;
    if (!ind) return;
    const pulse = 0.6 + Math.sin(Date.now() / 150) * 0.2;
    ctx.globalAlpha = ind.alpha * pulse;

    if (ind.type === 'circle') {
      // 范围圆圈
      ctx.strokeStyle = ind.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.arc(ind.x, ind.y, ind.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = ind.color + '30';
      ctx.beginPath();
      ctx.arc(ind.x, ind.y, ind.radius, 0, Math.PI * 2);
      ctx.fill();
      // 中心图标
      if (ind.icon) {
        ctx.font = '28px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ind.icon, ind.x, ind.y);
      }
    } else if (ind.type === 'cone') {
      // 扇形
      const ang = Math.atan2(ind.ty - ind.y, ind.tx - ind.x);
      const half = (ind.angle / 2) * Math.PI / 180;
      ctx.fillStyle = ind.color + '40';
      ctx.strokeStyle = ind.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ind.x, ind.y);
      ctx.arc(ind.x, ind.y, ind.range, ang - half, ang + half);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    } else if (ind.type === 'line') {
      // 冲刺路径线：从玩家到实际冲刺终点
      ctx.strokeStyle = ind.color;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.globalAlpha = ind.alpha * pulse * 0.6;
      ctx.beginPath();
      ctx.moveTo(ind.x1, ind.y1);
      ctx.lineTo(ind.x2, ind.y2);
      ctx.stroke();
      // 终点标记
      ctx.globalAlpha = ind.alpha * pulse;
      ctx.fillStyle = ind.color;
      ctx.beginPath();
      ctx.arc(ind.x2, ind.y2, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ind.x2, ind.y2, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.globalAlpha = ind.alpha * pulse;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(ind.x1, ind.y1);
      ctx.lineTo(ind.x2, ind.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      // 起点和终点标记
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ind.x1, ind.y1, 6, 0, Math.PI * 2);
      ctx.fill();
      if (ind.icon) {
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ind.icon, ind.x2, ind.y2);
      }
    }
    ctx.globalAlpha = 1;

    // PC/手机瞄准模式：屏幕顶部提示条（屏幕坐标，需跳出世界变换）
    if (ind.aimMode) {
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0); // 重置为屏幕坐标
      const pulse2 = 0.85 + Math.sin(Date.now() / 200) * 0.15;
      const tipW = this.isMobile ? 300 : 320;
      const tipH = 44, tipX = (W - tipW) / 2, tipY = 16;
      const cancelHint = this.isMobile ? '再点技能取消' : 'ESC取消';
      ctx.globalAlpha = pulse2;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(tipX, tipY, tipW, tipH, 10);
      else ctx.rect(tipX, tipY, tipW, tipH);
      ctx.fill();
      ctx.strokeStyle = '#f1c40f';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#f1c40f';
      ctx.font = 'bold 15px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(
        this.isMobile
          ? '👆 点击屏幕释放  ✕ ' + cancelHint
          : '左键点击释放  ESC/' + cancelHint,
        W / 2, tipY + tipH / 2
      );
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  },

  _renderBg() {
    const g = ctx.createRadialGradient(3000,3000,0,3000,3000,3200);
    g.addColorStop(0,'#4a8060'); g.addColorStop(0.5,'#3a6e4e'); g.addColorStop(1,'#28503a');
    ctx.fillStyle=g; ctx.fillRect(0,0,this.worldW,this.worldH);
    // 草地纹理（简单网格）
    ctx.strokeStyle='rgba(50,100,60,0.1)'; ctx.lineWidth=1;
    const gs=120;
    for (let gx=0; gx<this.worldW; gx+=gs) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,this.worldH); ctx.stroke(); }
    for (let gy=0; gy<this.worldH; gy+=gs) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(this.worldW,gy); ctx.stroke(); }
    // 水域（不规则湖泊）
    for (const w of (this.waterZones||[])) {
      const screenX = w.x - this.cam.x, screenY = w.y - this.cam.y;
      if (screenX<-w.r-50||screenX>W+w.r+50||screenY<-w.r-50||screenY>H+w.r+50) continue;
      if (!w.pts||w.pts.length<3) continue;
      const t = Date.now()/1800;
      // 不规则轮廓填充
      const wg=ctx.createRadialGradient(w.x,w.y,0,w.x,w.y,w.r);
      wg.addColorStop(0,'rgba(35,110,175,0.92)'); wg.addColorStop(0.55,'rgba(45,130,200,0.78)'); wg.addColorStop(1,'rgba(25,85,140,0.42)');
      ctx.fillStyle=wg;
      ctx.beginPath();
      ctx.moveTo(w.pts[0].x, w.pts[0].y);
      for (let i=1; i<w.pts.length; i++) {
        // 用曲线连接顶点，更圆润
        const prev = w.pts[(i-1+w.pts.length)%w.pts.length];
        const cur  = w.pts[i];
        const next = w.pts[(i+1)%w.pts.length];
        const cpx = (prev.x + cur.x)/2, cpy = (prev.y + cur.y)/2;
        ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
      }
      ctx.closePath(); ctx.fill();
      // 水岸线（略深）
      ctx.strokeStyle='rgba(20,80,140,0.55)'; ctx.lineWidth=3;
      ctx.stroke();
      // 动态水纹（随时间平移的短线段）
      ctx.save();
      ctx.clip();
      ctx.strokeStyle='rgba(130,200,255,0.22)'; ctx.lineWidth=1.5;
      for (let wi=0; wi<5; wi++) {
        const wa = wi * 1.2 + t * 0.5;
        const wx0 = w.x + Math.cos(wa) * w.r * 0.45;
        const wy0 = w.y + Math.sin(wa) * w.r * 0.35;
        const wlen = w.r*(0.15+0.12*Math.sin(t+wi));
        ctx.beginPath();
        ctx.moveTo(wx0 - Math.cos(wa+Math.PI/2)*wlen, wy0 - Math.sin(wa+Math.PI/2)*wlen);
        ctx.lineTo(wx0 + Math.cos(wa+Math.PI/2)*wlen, wy0 + Math.sin(wa+Math.PI/2)*wlen);
        ctx.stroke();
      }
      ctx.restore();
      // 重置clip状态
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }
  },

  _renderMenu() {
    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0d1b0e'); bg.addColorStop(1,'#1a3522');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#2ecc71'; ctx.font='bold 58px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.shadowBlur=25; ctx.shadowColor='#27ae60';
    ctx.fillText('🧬 进化战场', W/2, H/2-90);
    ctx.shadowBlur=0;

    ctx.fillStyle='#95a5a6'; ctx.font='21px "Microsoft YaHei",sans-serif';
    ctx.fillText('Evolution Battleground', W/2, H/2-45);

    ctx.fillStyle='#ecf0f1'; ctx.font='16px "Microsoft YaHei",sans-serif';
    ctx.fillText('收集物资 → 进化物种 → 成为最后的幸存者', W/2, H/2+5);

    const p = Math.sin(Date.now()/500)*0.3+0.7;
    ctx.globalAlpha=p; ctx.fillStyle='#2ecc71';
    ctx.font='bold 26px "Microsoft YaHei",sans-serif';
    ctx.fillText('[ 按 SPACE 或点击屏幕开始游戏 ]', W/2, H/2+80);
    ctx.globalAlpha=1;

    // 物种展示
    const icons=['🦠','🐇','🐱','🦎','🦌','🐺','🐊','🦣','🐯','🦑','🗿','🐈‍⬛','🔱','⛰️','💀','🌑','🌍','☠️','🌊'];
    ctx.font='26px serif'; ctx.textBaseline='middle';
    icons.forEach((ic,i) => {
      const x=(W/(icons.length+1))*(i+1);
      const y=H/2+170+Math.sin(Date.now()/800+i*0.5)*8;
      ctx.fillText(ic, x, y);
    });

    // 玩法说明
    ctx.textBaseline='alphabetic';
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.font='13px "Microsoft YaHei",sans-serif';
    const guides=[
      '28种物种 · 8级进化树 · 三大主线(草食/猎食/水栖) · 旁支虫族/飞行/两栖路线',
      '至少进化7次才能达到最高等级！ · WASD/QE/R操作 | 手机摇杆+技能按钮'
    ];
    guides.forEach((g,i)=>ctx.fillText(g, W/2, H/2+230+i*22));

    // 音效开关按钮
    const sBtn = { x: W-120, y: 15, w: 105, h: 36 };
    const sMx = this.mouse.x, sMy = this.mouse.y;
    const sHov = sMx>=sBtn.x&&sMx<=sBtn.x+sBtn.w&&sMy>=sBtn.y&&sMy<=sBtn.y+sBtn.h;
    ctx.fillStyle = sound.enabled ? (sHov?'rgba(46,204,113,0.9)':'rgba(46,204,113,0.65)') : (sHov?'rgba(231,76,60,0.9)':'rgba(231,76,60,0.55)');
    ctx.beginPath(); ctx.roundRect(sBtn.x, sBtn.y, sBtn.w, sBtn.h, 8); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 14px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sound.enabled ? '🔊 音效:开' : '🔇 音效:关', sBtn.x + sBtn.w/2, sBtn.y + sBtn.h/2);
    ctx.textBaseline='alphabetic';
    game._soundBtn = sBtn;
  },

  _renderEvoAnim() {
    const a = this.evoAnim;
    const prog = 1 - a.timer/2.5;
    const alpha = prog<0.5 ? prog*2 : (1-prog)*2;
    ctx.globalAlpha=Math.max(0,alpha);
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0, H/2-100, W, 210);
    ctx.fillStyle='#2ecc71'; ctx.font='bold 38px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center'; ctx.shadowBlur=15; ctx.shadowColor='#27ae60';
    ctx.fillText('🧬 进化！', W/2, H/2-30);
    ctx.shadowBlur=0;
    ctx.font='55px serif';
    ctx.fillText(`${a.from?.icon||'🦠'} → ${a.to.icon}`, W/2, H/2+25);
    ctx.fillStyle='#f1c40f'; ctx.font='bold 18px "Microsoft YaHei",sans-serif';
    ctx.fillText(a.to.name, W/2, H/2+55);
    const tierNames=['◇tier0','◈tier1','★tier2','★★tier3','★★★tier4','✦tier5','✦✦tier6','✦✦✦tier7','💎tier8','👑tier9','🌟神格tier10'];
    const tProgress = a.to.tier===10 ? '🏆 已达神格形态！' : `${tierNames[a.to.tier||0]} → 还需 ${10-(a.to.tier||0)} 次进化达到神格`;
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='13px "Microsoft YaHei",sans-serif';
    ctx.fillText(tProgress, W/2, H/2+76);
    ctx.globalAlpha=1;
  },

  _renderGameOver() {
    const win = this.state==='gameover_win';
    ctx.fillStyle=win?'rgba(0,25,0,0.97)':'rgba(25,0,0,0.97)';
    ctx.fillRect(0,0,W,H);

    ctx.shadowBlur=30;
    ctx.shadowColor=win?'#f1c40f':'#e74c3c';
    ctx.fillStyle=win?'#f1c40f':'#e74c3c';
    ctx.font=`bold ${win?65:55}px "Microsoft YaHei",sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(win?'🏆 胜利！最后的幸存者！':'💀 已被淘汰', W/2, H/2-100);
    ctx.shadowBlur=0;

    const s=this.stats, p=this.player;
    const sn = p?EVODATA[p.specId]?.name:'未知';
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.font='20px "Microsoft YaHei",sans-serif';
    const lines=[
      `最终形态：${p?.icon||'🦠'} ${sn}`,
      `击杀数：${s.kills}  |  进化次数：${s.evoCount}`,
      `收集物资：${s.resCollected}  |  存活：${Math.floor(s.time/60)}m${Math.floor(s.time%60)}s`,
      `剩余存活：${this.aliveCount} 人`,
    ];
    lines.forEach((l,i)=>ctx.fillText(l, W/2, H/2+i*34));

    // 重玩
    const bx=W/2-100, by=H/2+160, bw=200, bh=52;
    const hov=this.mouse.x>=bx&&this.mouse.x<=bx+bw&&this.mouse.y>=by&&this.mouse.y<=by+bh;
    ctx.fillStyle=hov?'#27ae60':'#2ecc71'; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 20px "Microsoft YaHei",sans-serif';
    ctx.fillText('🔄 再来一局', W/2, by+34);

    if (hov && this.mouse.btn[0]) { this.mouse.btn[0]=false; this.state='menu'; }
  },
};

// ==================== UI ====================
game.ui = {
  msgs: [],
  resPickups: [],

  msg(text, dur=2000, color='#f1c40f') {
    this.msgs.unshift({text,timer:dur,dur,color});
    if (this.msgs.length>4) this.msgs.length=4;
  },
  resPickup(type, amount) {
    this.resPickups.unshift({type,amount,timer:2000});
    if (this.resPickups.length>5) this.resPickups.length=5;
  },

  update(dt) {
    this.msgs = this.msgs.filter(m=>{m.timer-=dt*1000;return m.timer>0;});
    this.resPickups = this.resPickups.filter(p=>{p.timer-=dt*1000;return p.timer>0;});
  },

  render() {
    if (game.state!=='playing') return;
    this._renderMinimap();
    if (game.player&&game.player.alive) this._renderHUD();
    this._renderGameInfo();
    this._renderSzTimer();
    this._renderMsgs();
    this._renderResPickups();
    if (game.evoPanelOpen) this._renderEvoPanel();
    if (game.isMobile) this._renderMobileHUD();
  },

  _renderMinimap() {
    const ms=180, mx=W-ms-12, my=12;
    const sx=ms/game.worldW, sy=ms/game.worldH;

    // 背景和边框
    ctx.fillStyle='rgba(5,18,8,0.90)';
    ctx.strokeStyle='#27ae60'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(mx-2,my-2,ms+4,ms+4+28,6); ctx.fill(); ctx.stroke();
    // 地图底色
    ctx.fillStyle='rgba(50,90,60,0.92)';
    ctx.fillRect(mx,my,ms,ms);

    // 沼泽
    for (const s of (game.swamps||[])) {
      ctx.fillStyle='rgba(60,80,20,0.55)';
      ctx.beginPath(); ctx.arc(mx+s.x*sx, my+s.y*sy, Math.max(2,s.r*sx),0,Math.PI*2); ctx.fill();
    }
    // 山地
    for (const m of (game.mountains||[])) {
      ctx.fillStyle='rgba(130,110,90,0.65)';
      ctx.beginPath(); ctx.arc(mx+m.x*sx, my+m.y*sy, Math.max(2,m.r*sx),0,Math.PI*2); ctx.fill();
    }
    // 水域
    for (const w of (game.waterZones||[])) {
      ctx.fillStyle='rgba(41,128,185,0.65)';
      ctx.beginPath(); ctx.arc(mx+w.x*sx, my+w.y*sy, Math.max(2,w.r*sx),0,Math.PI*2); ctx.fill();
    }
    // 河流
    for (const r of (game.rivers||[])) {
      ctx.strokeStyle='rgba(41,128,185,0.6)'; ctx.lineWidth=Math.max(2,r.w*sx*2);
      ctx.beginPath(); ctx.moveTo(mx+r.x1*sx, my+r.y1*sy); ctx.lineTo(mx+r.x2*sx, my+r.y2*sy); ctx.stroke();
    }
    // 森林（树木集群）
    for (const t of (game.terrain||[])) {
      if (t.type==='tree') {
        ctx.fillStyle='rgba(20,100,40,0.45)';
        ctx.beginPath(); ctx.arc(mx+t.x*sx, my+t.y*sy, Math.max(1,t.r*sx*0.7),0,Math.PI*2); ctx.fill();
      }
    }

    // 安全区（圆形）
    const sz=game.safeZone;
    ctx.strokeStyle='rgba(52,152,219,0.9)'; ctx.lineWidth=2; ctx.setLineDash([6,3]);
    ctx.beginPath(); ctx.arc(mx+sz.x*sx, my+sz.y*sy, sz.radius*sx,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // 安全区外红色填充
    ctx.save();
    ctx.beginPath(); ctx.rect(mx,my,ms,ms);
    ctx.arc(mx+sz.x*sx, my+sz.y*sy, sz.radius*sx,0,Math.PI*2,true);
    ctx.fillStyle='rgba(231,76,60,0.2)'; ctx.fill();
    ctx.restore();

    // 资源点
    for (const d of game.drops.slice(0,80)) {
      ctx.fillStyle=d.type.color+'90';
      ctx.beginPath(); ctx.arc(mx+d.x*sx, my+d.y*sy, 1.2,0,Math.PI*2); ctx.fill();
    }
    // 天灾区域标记
    for (const d of game.disasters) {
      const dx2 = mx+d.cx*sx, dy2=my+d.cy*sy;
      if (d.phase==='warn') {
        ctx.strokeStyle = d.cfg.color; ctx.lineWidth=1.5; ctx.setLineDash([2,2]);
        ctx.beginPath(); ctx.arc(dx2,dy2,d.radius*sx,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      } else if (d.phase==='active') {
        ctx.fillStyle = d.cfg.color+'60';
        ctx.beginPath(); ctx.arc(dx2,dy2,d.radius*sx,0,Math.PI*2); ctx.fill();
      }
    }
    // Bot位置
    for (const b of game.bots) if(b.alive) {
      // 已进化的Bot标记更大
      const dot = b.spec&&b.spec.tier>=5 ? 3.5 : 2.2;
      ctx.fillStyle = b.spec&&b.spec.tier>=5 ? '#e74c3c' : '#c0392b';
      ctx.beginPath(); ctx.arc(mx+b.x*sx, my+b.y*sy, dot,0,Math.PI*2); ctx.fill();
    }
    // 玩家位置（金色突出）
    if (game.player&&game.player.alive) {
      const pulse = 0.8+Math.sin(Date.now()/300)*0.2;
      ctx.fillStyle='#f1c40f'; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
      ctx.shadowBlur=6; ctx.shadowColor='#f1c40f';
      ctx.beginPath(); ctx.arc(mx+game.player.x*sx, my+game.player.y*sy, 4.5*pulse,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
    }
    // 视口框
    ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(mx+game.cam.x*sx, my+game.cam.y*sy, W*sx, H*sy);

    // 地图边界标注
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.font='7px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(`0`, mx, my+ms+1);
    ctx.fillText(`${game.worldW}`, mx+ms, my+ms+1);

    // 图例行
    const legY = my+ms+18;
    ctx.font='8px "Microsoft YaHei",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
    const legends = [
      {color:'rgba(41,128,185,0.8)', label:'水域'},
      {color:'rgba(130,110,90,0.8)', label:'山地'},
      {color:'rgba(60,80,20,0.8)',   label:'沼泽'},
      {color:'#f1c40f',              label:'你'},
      {color:'#e74c3c',              label:'敌人'},
    ];
    legends.forEach((l,i)=>{
      const lx = mx + i*37;
      ctx.fillStyle=l.color;
      ctx.beginPath(); ctx.rect(lx, legY-5, 9, 9); ctx.fill();
      ctx.fillStyle='rgba(220,220,220,0.7)';
      ctx.fillText(l.label, lx+11, legY);
    });

    // 标题
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='9px "Microsoft YaHei",sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='alphabetic';
    ctx.fillText(`小地图  ${game.aliveCount}人`, mx+ms, my+ms-2);
  },

  _renderHUD() {
    const p = game.player;
    const spec = EVODATA[p.specId];
    const PH = 128, PY = H-PH;

    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,PY,W,PH);
    ctx.strokeStyle='rgba(46,204,113,0.35)'; ctx.lineWidth=1; ctx.strokeRect(0,PY,W,PH);

    // 玩家所在天灾警告
    for (const d of game.disasters) {
      if (d.phase==='active') {
        const dist = Math.hypot(p.x-d.cx, p.y-d.cy);
        if (dist <= d.radius) {
          const pulse = 0.5+Math.sin(Date.now()/100)*0.5;
          ctx.fillStyle=`rgba(231,76,60,${pulse*0.4})`;
          ctx.fillRect(0, 0, W, PY);
          const bw=200, bx=(W-bw)/2, by2=85;
          ctx.fillStyle=`rgba(231,76,60,0.9)`;
          ctx.fillRect(bx, by2, bw, 24);
          ctx.fillStyle='#fff';
          ctx.font='bold 12px "Microsoft YaHei",sans-serif';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(`⛔ ${d.cfg.name}！快逃离！`, W/2, by2+12);
        }
      }
    }

    // 物种头像
    ctx.font='50px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.icon, 50, PY+50);
    ctx.fillStyle=p.color; ctx.font='bold 14px "Microsoft YaHei",sans-serif'; ctx.textBaseline='alphabetic';
    ctx.fillText(spec.name, 50, PY+88);
    const tierColors=['#95a5a6','#95a5a6','#7dcea0','#58d68d','#f39c12','#e67e22','#e74c3c','#c0392b','#9b59b6','#f1c40f','#00bcd4'];
    const tierIcons=['◇','◈','★','★★','★★★','✦','✦✦','✦✦✦','💎','👑','🌟'];
    const tierStr = tierIcons[spec.tier||0];
    ctx.fillStyle=tierColors[spec.tier||0]; ctx.font='13px serif';
    ctx.fillText(`Lv.${spec.tier||0} ${tierStr}`, 50, PY+104);

    // HP
    const hbx=100, hby=PY+10, hbw=200, hbh=15;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(hbx-1,hby-1,hbw+2,hbh+2);
    const hpp=Math.max(0,p.hp/p.maxHp);
    ctx.fillStyle=hpp>0.5?'#2ecc71':hpp>0.25?'#f39c12':'#e74c3c';
    ctx.fillRect(hbx,hby,hbw*hpp,hbh);
    ctx.fillStyle='#fff'; ctx.font='bold 10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`❤️ ${Math.ceil(p.hp)}/${p.maxHp}`, hbx+hbw/2, hby+hbh/2);

    // 属性
    const atrs=[`⚔️${Math.round(p.curAtk)}`,`🛡️${p.baseDef}`,`💨${p.curSpd.toFixed(1)}`,`⚔️${p.kills}`];
    atrs.forEach((a,i)=>{
      ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.font='12px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText(a, 100+i*52+20, PY+38);
    });

    // 资源
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='10px "Microsoft YaHei",sans-serif'; ctx.textAlign='left';
    ctx.fillText('物资：',97,PY+60);
    let rx=130;
    for (const [id,amt] of Object.entries(p.resources)) {
      if(amt<=0) continue;
      const res=RESOURCES[id];
      ctx.font='14px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(res.icon, rx, PY+58);
      ctx.fillStyle=amt>=5?'#f1c40f':'#ecf0f1'; ctx.font='bold 10px sans-serif'; ctx.textBaseline='alphabetic';
      ctx.fillText(amt, rx, PY+72);
      ctx.fillStyle='rgba(255,255,255,0.55)';
      rx+=34;
    }

    // 进化选项（中部）
    if (spec.evolvesTo.length) {
      const centerX = W/2;
      ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText('进化路线：', centerX, PY+14);

      spec.evolvesTo.forEach((id, i) => {
        const tgt=EVODATA[id], req=spec.evoReqs[id], ok=canEvolve(p.resources,req);
        const cx = centerX - (spec.evolvesTo.length-1)*65 + i*130;
        ctx.fillStyle=ok?'rgba(46,204,113,0.25)':'rgba(0,0,0,0.4)';
        ctx.strokeStyle=ok?'#2ecc71':'rgba(255,255,255,0.15)'; ctx.lineWidth=ok?2:1;
        ctx.beginPath(); ctx.roundRect(cx-58,PY+18,116,102,7); ctx.fill(); ctx.stroke();
        ctx.font='28px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(tgt.icon, cx, PY+40);
        ctx.fillStyle=tgt.color; ctx.font='bold 11px "Microsoft YaHei",sans-serif'; ctx.textBaseline='alphabetic';
        ctx.fillText(tgt.name, cx, PY+62);
        // 需求
        let reqX=cx-50;
        for (const [rk,need] of Object.entries(req)) {
          const rd=RESOURCES[rk]; const have=p.resources[rk]||0;
          ctx.fillStyle=have>=need?'#2ecc71':'#e74c3c'; ctx.font='10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
          ctx.fillText(`${rd?.icon}${have}/${need}`, reqX+20, PY+78);
          reqX+=40;
        }
        if (ok) {
          const pa=Math.sin(Date.now()/300)*0.3+0.7; ctx.globalAlpha=pa;
          ctx.fillStyle='#2ecc71';
          ctx.beginPath(); ctx.roundRect(cx-45,PY+86,90,24,5); ctx.fill();
          ctx.globalAlpha=1; ctx.fillStyle='#000'; ctx.font='bold 11px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('进化！按R', cx, PY+98);
        }
      });
    } else {
      ctx.fillStyle='#f1c40f'; ctx.font='bold 13px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('👑 最终进化形态！', W/2, PY+65);
    }

    // 技能（右侧）
    const skills=spec.skills||[];
    skills.forEach((sk,i) => {
      const bsx=W-275+i*135, bsy=PY+8;
      const cd=p.skillCds[i]||0, ready=cd<=0;
      const hov = game.mouse.x>=bsx && game.mouse.x<=bsx+125 && game.mouse.y>=bsy && game.mouse.y<=bsy+108;
      const aiming = game.pcSkillAim === i; // PC两步技能：瞄准中高亮

      // 瞄准时背景脉冲
      if (aiming) {
        const p2 = 0.5 + Math.sin(Date.now()/150)*0.3;
        ctx.shadowColor = '#f1c40f'; ctx.shadowBlur = 20 * p2;
        ctx.fillStyle='rgba(241,196,15,0.35)';
      } else {
        ctx.shadowBlur = 0;
        ctx.fillStyle=ready?'rgba(46,204,113,0.22)':'rgba(0,0,0,0.5)';
      }
      ctx.strokeStyle=aiming?'#f1c40f':(hov?'#f1c40f':(ready?'#2ecc71':'rgba(255,255,255,0.2)'));
      ctx.lineWidth=aiming?3:(hov?2:1.5);
      ctx.beginPath(); ctx.roundRect(bsx,bsy,125,108,8); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.fillText(sk.icon, bsx+18, bsy+22);
      ctx.fillStyle=ready?'#f1c40f':'rgba(255,255,0,0.4)'; ctx.font='bold 11px "Microsoft YaHei",sans-serif'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
      ctx.fillText(sk.name, bsx+35, bsy+18);
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px "Microsoft YaHei",sans-serif';
      ctx.fillText(i===0?'[Q]':'[E]', bsx+35, bsy+32);
      // 冷却时间标注
      ctx.fillStyle='rgba(200,200,200,0.5)'; ctx.font='9px "Microsoft YaHei",sans-serif';
      ctx.fillText(`CD: ${sk.cd}s`, bsx+72, bsy+32);
      // 技能描述（多行显示）
      ctx.fillStyle='rgba(220,220,220,0.7)'; ctx.font='9px "Microsoft YaHei",sans-serif';
      const descWords = sk.desc;
      const lineLen = 18;
      let dl = 0;
      while (dl * lineLen < descWords.length && dl < 4) {
        ctx.fillText(descWords.slice(dl*lineLen, (dl+1)*lineLen), bsx+4, bsy+46+dl*12);
        dl++;
      }
      if (!ready) {
        const cdProg=1-cd/sk.cd;
        ctx.fillStyle='rgba(52,152,219,0.55)'; ctx.fillRect(bsx+4, bsy+94, 117*cdProg, 8);
        ctx.fillStyle='#e74c3c'; ctx.font='bold 10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText(`${cd.toFixed(1)}s`, bsx+62, bsy+102);
      } else if (aiming) {
        // 瞄准中：显示特殊状态
        ctx.fillStyle='#f1c40f'; ctx.font='bold 10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText('瞄准中...', bsx+62, bsy+102);
      } else {
        ctx.fillStyle='#2ecc71'; ctx.font='bold 10px "Microsoft YaHei",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
        ctx.fillText('就绪 ✓', bsx+62, bsy+102);
      }
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
      ctx.strokeRect(bsx+4, bsy+94, 117, 8);

      // 悬停详情弹框
      if (hov) {
        const pw=300, ph=130;
        const px2 = Math.max(0, Math.min(W-pw-10, bsx-88));
        const py2 = PY - ph - 8;
        ctx.fillStyle='rgba(8,25,12,0.97)';
        ctx.strokeStyle='#f1c40f'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(px2, py2, pw, ph, 10); ctx.fill(); ctx.stroke();
        ctx.fillStyle='#f1c40f'; ctx.font=`bold 14px "Microsoft YaHei",sans-serif`; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
        ctx.fillText(`${sk.icon} ${sk.name}`, px2+12, py2+24);
        ctx.fillStyle='rgba(200,200,200,0.6)'; ctx.font='10px "Microsoft YaHei",sans-serif';
        ctx.fillText(`快捷键: ${i===0?'[Q]':'[E]'}   冷却时间: ${sk.cd}s`, px2+12, py2+40);
        // 分割线
        ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px2+10,py2+46); ctx.lineTo(px2+pw-10,py2+46); ctx.stroke();
        // 完整描述
        ctx.fillStyle='rgba(240,240,240,0.85)'; ctx.font='11px "Microsoft YaHei",sans-serif';
        const fullDesc = sk.desc;
        const chunkLen = 28;
        let fRow = 0;
